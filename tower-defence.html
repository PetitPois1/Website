<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple TD - HTML5</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #333; border: 4px solid #555; cursor: crosshair; }
        .controls { margin: 10px; display: flex; gap: 10px; }
        button { padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #777; }
        button:hover { background: #666; }
        .stats { font-size: 1.2rem; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="stats">
        Money: $<span id="money">200</span> | Lives: <span id="lives">20</span> | Wave: <span id="wave">1</span>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="controls">
        <button onclick="setMap('easy')">Easy Map</button>
        <button onclick="setMap('medium')">Medium Map</button>
        <button onclick="setMap('hard')">Hard Map</button>
        <button onclick="placeTowerMode()" style="background: #2e7d32;">Buy Tower ($50)</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const moneyEl = document.getElementById('money');
const livesEl = document.getElementById('lives');
const waveEl = document.getElementById('wave');

// Game State
let money = 200;
let lives = 20;
let wave = 1;
let enemies = [];
let towers = [];
let projectiles = [];
let isPlacingTower = false;
let spawnTimer = 0;

// Map Definitions (Path Waypoints)
const maps = {
    easy: [[0, 250], [800, 250]],
    medium: [[0, 100], [400, 100], [400, 400], [800, 400]],
    hard: [[400, 0], [400, 100], [100, 100], [100, 400], [700, 400], [700, 100], [800, 100]]
};
let currentPath = maps.easy;

function setMap(level) {
    currentPath = maps[level];
    resetGame();
}

function resetGame() {
    enemies = []; towers = []; projectiles = [];
    money = 200; lives = 20; wave = 1;
    updateUI();
}

function updateUI() {
    moneyEl.innerText = money;
    livesEl.innerText = lives;
    waveEl.innerText = wave;
}

// Classes
class Enemy {
    constructor() {
        this.x = currentPath[0][0];
        this.y = currentPath[0][1];
        this.health = 10 + (wave * 5);
        this.speed = 1 + (wave * 0.1);
        this.targetIndex = 1;
        this.radius = 12;
    }

    update() {
        let target = currentPath[this.targetIndex];
        let dx = target[0] - this.x;
        let dy = target[1] - this.y;
        let dist = Math.hypot(dx, dy);

        if (dist < 5) {
            this.targetIndex++;
            if (this.targetIndex >= currentPath.length) {
                lives--;
                this.health = 0; // Remove
                updateUI();
                return;
            }
        }

        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
    }

    draw() {
        ctx.fillStyle = '#ff5252';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Tower {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.range = 120;
        this.cooldown = 0;
        this.fireRate = 30; // Frames
    }

    update() {
        if (this.cooldown > 0) this.cooldown--;

        if (this.cooldown === 0) {
            let target = enemies.find(e => Math.hypot(e.x - this.x, e.y - this.y) < this.range);
            if (target) {
                projectiles.push(new Projectile(this.x, this.y, target));
                this.cooldown = this.fireRate;
            }
        }
    }

    draw() {
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(this.x - 15, this.y - 15, 30, 30);
        // Range indicator
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
        ctx.stroke();
    }
}

class Projectile {
    constructor(x, y, target) {
        this.x = x; this.y = y;
        this.target = target;
        this.speed = 5;
        this.active = true;
    }

    update() {
        let dx = this.target.x - this.x;
        let dy = this.target.y - this.y;
        let dist = Math.hypot(dx, dy);

        if (dist < 10) {
            this.target.health -= 5;
            this.active = false;
            if (this.target.health <= 0) {
                money += 10;
                updateUI();
            }
        }

        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
    }

    draw() {
        ctx.fillStyle = 'yellow';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Game Loop
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Path
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 40;
    ctx.beginPath();
    ctx.moveTo(currentPath[0][0], currentPath[0][1]);
    currentPath.forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.stroke();

    // Spawn Logic
    spawnTimer++;
    if (spawnTimer > 100 - (wave * 2)) {
        enemies.push(new Enemy());
        spawnTimer = 0;
    }

    // Update & Draw
    enemies = enemies.filter(e => e.health > 0);
    enemies.forEach(e => { e.update(); e.draw(); });

    towers.forEach(t => { t.update(); t.draw(); });

    projectiles = projectiles.filter(p => p.active);
    projectiles.forEach(p => { p.update(); p.draw(); });

    if (lives <= 0) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 300, 250);
        return;
    }

    requestAnimationFrame(gameLoop);
}

// Interactions
function placeTowerMode() {
    if (money >= 50) isPlacingTower = true;
}

canvas.addEventListener('mousedown', (e) => {
    if (isPlacingTower) {
        const rect = canvas.getBoundingClientRect();
        towers.push(new Tower(e.clientX - rect.left, e.clientY - rect.top));
        money -= 50;
        isPlacingTower = false;
        updateUI();
    }
});

gameLoop();
</script>
</body>
</html>
