<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloonz TDS</title>
    <style>
        :root { --sidebar-w: 180px; }
        body { 
            background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui; 
            margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; touch-action: none;
        }
        #menu, #stats-page { 
            position: absolute; inset: 0; background: rgba(10,10,10,0.95); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; 
        }
        .game-wrapper { display: flex; width: 100%; height: 100%; position: relative; }
        
        /* Main Game Area */
        #game-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; position: relative; }
        canvas { background: #263238; border: 2px solid #444; box-shadow: 0 0 30px rgba(0,0,0,0.5); cursor: crosshair; max-width: 95%; max-height: 80%; }

        /* Sidebar UI */
        .sidebar { width: var(--sidebar-w); background: #212121; border-left: 2px solid #333; display: flex; flex-direction: column; padding: 10px; z-index: 10; }
        .shop { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        .inspector { height: 180px; background: #1a1a1a; margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 0.8rem; border-top: 3px solid #1e88e5; }
        
        /* HUD */
        .stats-bar { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.7); padding: 8px 25px; border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid #444; }
        
        button { padding: 10px; cursor: pointer; background: #1e88e5; color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .shop-item { display: flex; flex-direction: column; align-items: center; padding: 8px; background: #333; border-radius: 8px; transition: 0.2s; border: 2px solid transparent; }
        .shop-item:hover:not(:disabled) { border-color: #ffca28; background: #444; }
        
        .map-card { border: 2px solid #444; padding: 15px; text-align: center; cursor: pointer; width: 120px; border-radius: 10px; background: #1a1a1a; margin-bottom: 10px; }
        .hidden { display: none !important; }
        b { color: #ffca28; }
        #wave-btn { background: #43a047; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="letter-spacing: 8px; color: #ffca28; font-size: 3rem; text-shadow: 0 0 20px rgba(255,202,40,0.3);">BLOONZ TDS</h1>
        <div style="display: flex; gap: 15px;">
            <div class="map-card" onclick="startGame('easy')"><h3>EASY</h3><small>Meadows</small></div>
            <div class="map-card" onclick="startGame('medium')"><h3>MEDIUM</h3><small>S-Loop</small></div>
            <div class="map-card" onclick="startGame('hard')"><h3>HARD</h3><small>Zig-Zag</small></div>
        </div>
        <button onclick="toggleStats(true)">Archives</button>
    </div>

    <div id="stats-page" class="hidden">
        <h1>Global Stats</h1>
        <div id="stats-content"></div>
        <button onclick="toggleStats(false)" style="margin-top: 20px;">Return</button>
    </div>

    <div class="game-wrapper">
        <div id="game-container">
            <div class="stats-bar">
                <span>💰 <b id="money">400</b></span>
                <span>❤️ <b id="lives">50</b></span>
                <span>🌊 <b id="wave">1</b></span>
            </div>
            <canvas id="gameCanvas" width="800" height="500"></canvas>
        </div>

        <div class="sidebar">
            <h3 style="margin: 0 0 10px 0; text-align: center; color: #90caf9;">SHOP</h3>
            <div class="shop" id="shop"></div>
            <button id="wave-btn" onclick="toggleWave()">NEXT WAVE</button>
            <div class="inspector" id="inspect-content">
                <p>Select a tower to upgrade.</p>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let money, lives, wave, enemies, towers, projectiles, selectedTower, placingType, particles;
let mousePos = { x: 0, y: 0 };
let currentPath = [];
let gameState = 'MENU';
let waveActive = false;
let enemiesSpawned = 0;
let spawnTimer = 0;

let globalStats = JSON.parse(localStorage.getItem('bloonsStatsPro')) || {
    totalKills: 0, totalSpent: 0, wavesCompleted: 0, gamesPlayed: 0
};

const TOWER_TYPES = {
    dart: { name: "Dart", cost: 50, range: 110, fireRate: 35, damage: 12, color: '#8d6e63' },
    tack: { name: "Tack", cost: 150, range: 90, fireRate: 50, damage: 10, color: '#ef5350' },
    ice: { name: "Ice", cost: 300, range: 100, fireRate: 45, damage: 5, color: '#81d4fa', slow: 0.5 },
    bomb: { name: "Bomb", cost: 500, range: 130, fireRate: 80, damage: 40, color: '#424242', isAoE: true },
    sniper: { name: "Sniper", cost: 600, range: 800, fireRate: 110, damage: 80, color: '#2e7d32' },
    super: { name: "Super", cost: 3000, range: 220, fireRate: 4, damage: 8, color: '#ffca28' }
};

const MAPS = {
    easy: [[0, 250], [800, 250]],
    medium: [[0, 100], [650, 100], [650, 400], [150, 400], [150, 500]],
    hard: [[400, 0], [400, 180], [100, 180], [100, 350], [700, 350], [700, 100], [800, 100]]
};

function initShop() {
    const shop = document.getElementById('shop');
    shop.innerHTML = '';
    for (let id in TOWER_TYPES) {
        const t = TOWER_TYPES[id];
        const btn = document.createElement('div');
        btn.className = 'shop-item';
        btn.id = `buy-${id}`;
        btn.innerHTML = `<span style="font-size:0.8rem">${t.name}</span><b>$${t.cost}</b>`;
        btn.onclick = (e) => { 
            if(money >= t.cost) { placingType = id; selectedTower = null; }
        };
        shop.appendChild(btn);
    }
}

function startGame(level) {
    currentPath = MAPS[level];
    money = 500; lives = 100; wave = 1;
    enemies = []; towers = []; projectiles = []; particles = [];
    gameState = 'PLAYING'; waveActive = false;
    globalStats.gamesPlayed++;
    document.getElementById('menu').classList.add('hidden');
    saveStats(); updateUI();
}

function toggleWave() {
    if (waveActive || gameState !== 'PLAYING') return;
    waveActive = true;
    enemiesSpawned = 0;
    document.getElementById('wave-btn').disabled = true;
}

function updateUI() {
    document.getElementById('money').innerText = Math.floor(money);
    document.getElementById('lives').innerText = lives;
    document.getElementById('wave').innerText = wave;
    for (let id in TOWER_TYPES) {
        const btn = document.getElementById(`buy-${id}`);
        if(btn) btn.style.opacity = money < TOWER_TYPES[id].cost ? "0.4" : "1";
    }
    if (selectedTower) {
        const upCost = selectedTower.level * 250;
        document.getElementById('inspect-content').innerHTML = `
            <h3 style="margin:0;color:#ffca28">${selectedTower.type.name}</h3>
            <p>LVL: ${selectedTower.level} | Kills: ${selectedTower.kills || 0}</p>
            <button onclick="upgradeTower()" style="width:100%" ${money < upCost ? 'disabled' : ''}>
                UPGRADE ($${upCost})
            </button>
        `;
    }
}

class Enemy {
    constructor(tier) {
        this.x = currentPath[0][0]; this.y = currentPath[0][1];
        this.tier = tier;
        // WAVE SCALING: Health increases per wave
        this.maxHealth = (10 + (tier * 30)) * (1 + (wave * 0.15));
        this.health = this.maxHealth;
        this.speed = 1 + (tier * 0.2) + (wave * 0.05);
        this.color = tier === 1 ? '#ff5252' : tier === 2 ? '#448aff' : '#4caf50';
        this.targetIndex = 1;
        this.distTraveled = 0;
    }
    update() {
        let target = currentPath[this.targetIndex];
        let dx = target[0] - this.x; let dy = target[1] - this.y;
        let dist = Math.hypot(dx, dy);
        if (dist < 5) {
            this.targetIndex++;
            if (this.targetIndex >= currentPath.length) {
                lives -= this.tier; this.health = 0; return;
            }
        }
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
        this.distTraveled += this.speed;
    }
    draw() {
        // Draw health bar
        ctx.fillStyle = '#444'; ctx.fillRect(this.x - 10, this.y - 18, 20, 4);
        ctx.fillStyle = '#66bb6a'; ctx.fillRect(this.x - 10, this.y - 18, (this.health/this.maxHealth)*20, 4);
        // Draw Bloon
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.ellipse(this.x, this.y, 10, 13, 0, 0, Math.PI*2); ctx.fill();
    }
}

class Tower {
    constructor(x, y, typeId) {
        this.x = x; this.y = y; this.typeId = typeId;
        this.type = TOWER_TYPES[typeId];
        this.damage = this.type.damage; this.range = this.type.range;
        this.cooldown = 0; this.level = 1; this.kills = 0;
    }
    draw() {
        if (selectedTower === this || (placingType && this === towers[towers.length-1] && !placingType)) {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke();
        }
        ctx.fillStyle = this.type.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, 15, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();
    }
}

// Global logic functions
function upgradeTower() {
    let cost = selectedTower.level * 250;
    if (money >= cost) {
        money -= cost; selectedTower.level++;
        selectedTower.damage *= 1.4; selectedTower.range += 10;
        updateUI();
    }
}

function isPosClear(x, y) {
    // Check if on track (crude check)
    for(let i=0; i < currentPath.length-1; i++) {
        let p1 = currentPath[i], p2 = currentPath[i+1];
        // Dist from point to line segment
        let L2 = Math.pow(p2[0]-p1[0], 2) + Math.pow(p2[1]-p1[1], 2);
        let t = ((x-p1[0])*(p2[0]-p1[0]) + (y-p1[1])*(p2[1]-p1[1])) / L2;
        t = Math.max(0, Math.min(1, t));
        let dx = x - (p1[0] + t*(p2[0]-p1[0]));
        let dy = y - (p1[1] + t*(p2[1]-p1[1]));
        if(Math.hypot(dx, dy) < 40) return false;
    }
    // Check other towers
    return !towers.some(t => Math.hypot(t.x - x, t.y - y) < 35);
}

function gameLoop() {
    if (gameState !== 'PLAYING') { requestAnimationFrame(gameLoop); return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Track
    ctx.strokeStyle = '#37474f'; ctx.lineWidth = 40; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(currentPath[0][0], currentPath[0][1]);
    currentPath.forEach(p => ctx.lineTo(p[0], p[1])); ctx.stroke();

    if (waveActive) {
        spawnTimer++;
        if (spawnTimer > 30) {
            let tier = wave > 5 ? (Math.random() > 0.7 ? 2 : 1) : 1;
            enemies.push(new Enemy(tier)); spawnTimer = 0; enemiesSpawned++;
        }
        if (enemiesSpawned > 10 + wave) {
            if (enemies.length === 0) {
                wave++; waveActive = false; 
                document.getElementById('wave-btn').disabled = false;
                updateUI();
            }
        }
    }

    enemies.forEach((e, i) => {
        e.update(); e.draw();
        if (e.health <= 0) {
            money += (10 + wave); 
            enemies.splice(i, 1);
            updateUI();
        }
    });

    towers.forEach(t => {
        t.draw();
        if (t.cooldown > 0) t.cooldown--;
        else {
            let targets = enemies.filter(e => Math.hypot(e.x - t.x, e.y - t.y) < t.range);
            if (targets.length > 0) {
                let target = targets[0];
                target.health -= t.damage;
                t.cooldown = t.type.fireRate;
                // Simple bullet line
                ctx.strokeStyle = t.type.color; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(target.x, target.y); ctx.stroke();
            }
        }
    });

    if (placingType) {
        let clear = isPosClear(mousePos.x, mousePos.y);
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = clear ? '#fff' : '#f00';
        ctx.beginPath(); ctx.arc(mousePos.x, mousePos.y, 15, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    if (lives <= 0) { alert("Game Over!"); location.reload(); }
    requestAnimationFrame(gameLoop);
}

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mousePos.x = (e.clientX - rect.left) * (canvas.width / rect.width);
    mousePos.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener('mousedown', () => {
    if (placingType) {
        if (isPosClear(mousePos.x, mousePos.y)) {
            towers.push(new Tower(mousePos.x, mousePos.y, placingType));
            money -= TOWER_TYPES[placingType].cost;
            placingType = null; updateUI();
        }
    } else {
        selectedTower = towers.find(t => Math.hypot(t.x - mousePos.x, t.y - mousePos.y) < 20);
        updateUI();
    }
});

function toggleStats(s){ document.getElementById('stats-page').classList.toggle('hidden', !s); }
function saveStats() { localStorage.setItem('bloonsStatsPro', JSON.stringify(globalStats)); }

initShop();
gameLoop();
</script>
</body>
</html>
