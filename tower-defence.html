<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloons JS - Pro Edition</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        #menu, #stats-page { position: absolute; width: 100%; height: 100%; background: rgba(15,15,15,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.3s; }
        canvas { background: #1e1e1e; border: 4px solid #333; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 4px; }
        .ui-container { display: flex; gap: 20px; margin-top: 15px; width: 850px; height: 180px; }
        .shop, .inspector { background: #252525; padding: 15px; border-radius: 12px; border: 1px solid #444; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .shop { flex: 3; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; }
        .inspector { flex: 2; font-size: 0.9rem; line-height: 1.4; border-left: 4px solid #1565c0; }
        .stats-bar { font-size: 1.1rem; margin: 15px 0; background: #333; padding: 10px 40px; border-radius: 50px; display: flex; gap: 30px; border: 1px solid #555; }
        button { padding: 10px; cursor: pointer; background: #1e88e5; color: white; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { background: #42a5f5; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
        .map-card { border: 2px solid #444; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; width: 140px; border-radius: 10px; background: #1a1a1a; }
        .map-card:hover { border-color: #66bb6a; background: #2e7d32; transform: scale(1.05); }
        .hidden { display: none !important; }
        b { color: #ffca28; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="letter-spacing: 5px; color: #ffca28;">BLOONS JS: PRO</h1>
        <div style="display: flex; gap: 25px; margin-bottom: 40px;">
            <div class="map-card" onclick="startGame('easy')"><h3>EASY</h3><small>Meadows</small></div>
            <div class="map-card" onclick="startGame('medium')"><h3>MEDIUM</h3><small>S-Loop</small></div>
            <div class="map-card" onclick="startGame('hard')"><h3>HARD</h3><small>Zig-Zag</small></div>
        </div>
        <button onclick="toggleStats(true)">Global Data Archive</button>
    </div>

    <div id="stats-page" class="hidden">
        <h1>All-Time Statistics</h1>
        <div id="stats-content" style="font-size: 1.4rem; line-height: 2; text-align: center;"></div>
        <button onclick="toggleStats(false)" style="margin-top: 30px; width: 200px;">Return</button>
    </div>

    <div class="stats-bar">
        <span>💰 <b id="money">300</b></span>
        <span>❤️ <b id="lives">20</b></span>
        <span>🌊 Wave: <b id="wave">1</b></span>
    </div>

    <canvas id="gameCanvas" width="850" height="450"></canvas>

    <div class="ui-container">
        <div class="shop" id="shop"></div>
        <div class="inspector" id="inspect-content">
            <h3 style="margin-top:0">Intelligence Report</h3>
            <p>Select a monkey on the field to see tactical data and upgrades.</p>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Configuration ---
let money, lives, wave, enemies, towers, projectiles, selectedTower, placingType;
let mousePos = { x: 0, y: 0 };
let currentPath = [];
let gameState = 'MENU';
let enemiesSpawned = 0;
let spawnTimer = 0;

let globalStats = JSON.parse(localStorage.getItem('bloonsStatsPro')) || {
    totalKills: 0, totalSpent: 0, wavesCompleted: 0, gamesPlayed: 0
};

const TOWER_TYPES = {
    dart: { name: "Dart Monkey", cost: 50, range: 110, fireRate: 35, damage: 10, color: '#8d6e63', desc: "Reliable and cheap." },
    tack: { name: "Tack Shooter", cost: 150, range: 80, fireRate: 50, damage: 8, color: '#ef5350', desc: "Shoots in 8 directions." },
    sniper: { name: "Elite Sniper", cost: 250, range: 850, fireRate: 90, damage: 50, color: '#2e7d32', desc: "Infinite range, slow fire." },
    ninja: { name: "Ninja Monkey", cost: 320, range: 140, fireRate: 15, damage: 12, color: '#5c6bc0', desc: "Very fast attack speed." },
    bomb: { name: "Bomb Tower", cost: 400, range: 130, fireRate: 60, damage: 30, color: '#424242', desc: "High impact, heavy hits.", isAoE: true },
    super: { name: "Super Monkey", cost: 2000, range: 200, fireRate: 3, damage: 5, color: '#ffca28', desc: "Unmatched fire rate." }
};

const MAPS = {
    easy: [[0, 225], [850, 225]],
    medium: [[0, 100], [600, 100], [600, 350], [200, 350], [200, 450]],
    hard: [[425, 0], [425, 150], [100, 150], [100, 300], [750, 300], [750, 100], [850, 100]]
};

// --- Initialization ---
function initShop() {
    const shop = document.getElementById('shop');
    shop.innerHTML = '';
    for (let id in TOWER_TYPES) {
        const t = TOWER_TYPES[id];
        const btn = document.createElement('button');
        btn.id = `buy-${id}`;
        btn.innerHTML = `<div style="font-size:0.8rem">${t.name}</div><b>$${t.cost}</b>`;
        btn.onclick = (e) => { 
            e.stopPropagation();
            if(money >= t.cost) placingType = id; 
        };
        shop.appendChild(btn);
    }
}

function startGame(level) {
    currentPath = MAPS[level];
    money = 400; lives = 50; wave = 1;
    enemies = []; towers = []; projectiles = [];
    gameState = 'PLAYING';
    globalStats.gamesPlayed++;
    document.getElementById('menu').classList.add('hidden');
    saveStats();
    updateUI();
}

function toggleStats(show) {
    const page = document.getElementById('stats-page');
    if (show) {
        document.getElementById('stats-content').innerHTML = `
            Confirmed Pops: <b>${globalStats.totalKills}</b><br>
            Military Spending: <b>$${globalStats.totalSpent}</b><br>
            Operational Successes: <b>${globalStats.wavesCompleted}</b><br>
            Deployments: <b>${globalStats.gamesPlayed}</b>
        `;
        page.classList.remove('hidden');
    } else { page.classList.add('hidden'); }
}

// --- Core Engines ---
function drawAsset(type, x, y, color, size = 15) {
    ctx.save();
    ctx.translate(x, y);
    if (type === 'monkey') {
        ctx.fillStyle = "#5d4037"; // Body
        ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#d7ccc8"; // Face
        ctx.beginPath(); ctx.arc(0, 2, size*0.7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = color; // Accessory
        ctx.fillRect(-size*0.6, -size*0.9, size*1.2, size*0.4);
    } else if (type === 'bloon') {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, size);
        ctx.bezierCurveTo(size, size, size, -size, 0, -size);
        ctx.bezierCurveTo(-size, -size, -size, size, 0, size);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.stroke();
    }
    ctx.restore();
}

class Enemy {
    constructor(tier = 1) {
        this.x = currentPath[0][0];
        this.y = currentPath[0][1];
        this.tier = tier;
        this.maxHealth = 15 + (tier * 20) + (wave * 8);
        this.health = this.maxHealth;
        this.speed = 0.7 + (tier * 0.3) + (wave * 0.05);
        this.color = tier === 1 ? '#ff5252' : tier === 2 ? '#448aff' : '#4caf50';
        this.targetIndex = 1;
        this.distTraveled = 0;
    }

    update() {
        let target = currentPath[this.targetIndex];
        let dx = target[0] - this.x;
        let dy = target[1] - this.y;
        let dist = Math.hypot(dx, dy);

        if (dist < 5) {
            this.targetIndex++;
            if (this.targetIndex >= currentPath.length) {
                lives--; this.health = 0; updateUI(); return;
            }
        }
        let vx = (dx / dist) * this.speed;
        let vy = (dy / dist) * this.speed;
        this.x += vx;
        this.y += vy;
        this.distTraveled += this.speed;
    }

    draw() {
        drawAsset('bloon', this.x, this.y, this.color, 12);
        // Health Bar logic fix
        let barW = 24;
        ctx.fillStyle = "#444";
        ctx.fillRect(this.x - barW/2, this.y - 22, barW, 4);
        ctx.fillStyle = this.health > this.maxHealth * 0.5 ? "#66bb6a" : "#ffa726";
        ctx.fillRect(this.x - barW/2, this.y - 22, (this.health / this.maxHealth) * barW, 4);
    }
}

class Projectile {
    constructor(x, y, target, parent) {
        this.x = x; this.y = y;
        this.target = target;
        this.parent = parent;
        this.active = true;
        this.speed = 10;
        this.isAoE = parent.type.isAoE;
    }

    update() {
        if (!this.target || this.target.health <= 0) {
            // Seek new target if old one died
            this.target = enemies.find(e => Math.hypot(e.x - this.x, e.y - this.y) < 100);
            if (!this.target) { this.active = false; return; }
        }

        let dx = this.target.x - this.x;
        let dy = this.target.y - this.y;
        let dist = Math.hypot(dx, dy);

        if (dist < 10) {
            this.hit(this.target);
            this.active = false;
        }
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
    }

    hit(enemy) {
        if (this.isAoE) {
            enemies.forEach(e => {
                if (Math.hypot(e.x - this.x, e.y - this.y) < 60) {
                    this.applyDamage(e);
                }
            });
        } else {
            this.applyDamage(enemy);
        }
    }

    applyDamage(e) {
        e.health -= this.parent.damage;
        if (e.health <= 0) {
            money += 12; globalStats.totalKills++; updateUI();
        }
    }

    draw() {
        ctx.fillStyle = this.isAoE ? "#ff7043" : "#ffee58";
        ctx.beginPath(); ctx.arc(this.x, this.y, this.isAoE ? 6 : 3, 0, Math.PI*2); ctx.fill();
    }
}

class Tower {
    constructor(x, y, typeId) {
        this.x = x; this.y = y;
        this.typeId = typeId;
        this.type = TOWER_TYPES[typeId];
        this.damage = this.type.damage;
        this.range = this.type.range;
        this.cooldown = 0;
        this.level = 1;
        this.totalDamageDealt = 0;
    }

    update() {
        if (this.cooldown > 0) this.cooldown--;
        else {
            // Priority Targeting Logic Fix: Aim for the bloon furthest along the path
            let inRange = enemies.filter(e => Math.hypot(e.x - this.x, e.y - this.y) < this.range);
            if (inRange.length > 0) {
                let target = inRange.sort((a, b) => b.distTraveled - a.distTraveled)[0];
                
                if (this.typeId === 'tack') {
                    // Unique Tack Shooter Logic
                    for(let i=0; i<8; i++) {
                        let fakeTarget = { x: this.x + Math.cos(i * Math.PI/4)*100, y: this.y + Math.sin(i * Math.PI/4)*100, health: 1 };
                        projectiles.push(new Projectile(this.x, this.y, fakeTarget, this));
                    }
                } else {
                    projectiles.push(new Projectile(this.x, this.y, target, this));
                }
                
                this.totalDamageDealt += this.damage;
                this.cooldown = this.type.fireRate;
            }
        }
    }

    draw() {
        if (selectedTower === this) {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI*2);
            ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fill();
        }
        drawAsset('monkey', this.x, this.y, this.type.color, selectedTower === this ? 18 : 15);
    }
}

// --- Main Loop ---
function gameLoop() {
    if (gameState !== 'PLAYING') { requestAnimationFrame(gameLoop); return; }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Path (Smoother visuals)
    ctx.strokeStyle = '#2c2c2c'; ctx.lineWidth = 44; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(currentPath[0][0], currentPath[0][1]);
    currentPath.forEach(p => ctx.lineTo(p[0], p[1])); ctx.stroke();
    ctx.strokeStyle = '#383838'; ctx.lineWidth = 36; ctx.stroke();

    // Spawning
    spawnTimer++;
    if (spawnTimer > Math.max(10, 50 - (wave * 2))) {
        let tier = wave > 12 ? 3 : (wave > 5 ? Math.floor(Math.random() * 2) + 1 : 1);
        enemies.push(new Enemy(tier));
        spawnTimer = 0; enemiesSpawned++;
    }
    if (enemiesSpawned > 10 + (wave * 2)) {
        wave++; enemiesSpawned = 0; globalStats.wavesCompleted++; updateUI();
    }

    enemies = enemies.filter(e => e.health > 0);
    enemies.forEach(e => { e.update(); e.draw(); });
    towers.forEach(t => { t.update(); t.draw(); });
    projectiles = projectiles.filter(p => p.active);
    projectiles.forEach(p => { p.update(); p.draw(); });

    if (placingType) {
        ctx.globalAlpha = 0.4;
        let conf = TOWER_TYPES[placingType];
        ctx.beginPath(); ctx.arc(mousePos.x, mousePos.y, conf.range, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fill();
        drawAsset('monkey', mousePos.x, mousePos.y, conf.color);
        ctx.globalAlpha = 1;
    }

    if (lives <= 0) {
        alert("Mission Failed. You reached Wave " + wave);
        location.reload();
    }

    requestAnimationFrame(gameLoop);
}

// --- UI & Interactions ---
function updateUI() {
    document.getElementById('money').innerText = Math.floor(money);
    document.getElementById('lives').innerText = lives;
    document.getElementById('wave').innerText = wave;
    
    // Update Shop button availability
    for (let id in TOWER_TYPES) {
        const btn = document.getElementById(`buy-${id}`);
        if(btn) btn.disabled = money < TOWER_TYPES[id].cost;
    }

    if (selectedTower) {
        let dps = (selectedTower.damage / (selectedTower.type.fireRate / 60)).toFixed(1);
        document.getElementById('inspect-content').innerHTML = `
            <h3 style="margin:0; color:${selectedTower.type.color}">${selectedTower.type.name}</h3>
            <small>${selectedTower.type.desc}</small><br>
            <div style="margin: 10px 0; background:#1a1a1a; padding:8px; border-radius:5px;">
                Rank: <b>${selectedTower.level}</b> | Damage: <b>${selectedTower.damage.toFixed(0)}</b><br>
                Est. DPS: <b>${dps}</b> | Range: <b>${selectedTower.range}</b>
            </div>
            <button onclick="upgradeTower()" style="width:100%" ${money < selectedTower.level * 150 ? 'disabled' : ''}>
                Upgrade to Rank ${selectedTower.level + 1} ($${selectedTower.level * 150})
            </button>
        `;
    }
}

function upgradeTower() {
    let cost = selectedTower.level * 150;
    if (money >= cost) {
        money -= cost; globalStats.totalSpent += cost;
        selectedTower.level++; 
        selectedTower.damage *= 1.4; 
        selectedTower.range += 10;
        updateUI(); saveStats();
    }
}

function saveStats() { localStorage.setItem('bloonsStatsPro', JSON.stringify(globalStats)); }

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mousePos.x = e.clientX - rect.left; mousePos.y = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', () => {
    if (placingType) {
        // Collision logic fix
        const collision = towers.some(t => Math.hypot(t.x - mousePos.x, t.y - mousePos.y) < 35);
        if (!collision) {
            towers.push(new Tower(mousePos.x, mousePos.y, placingType));
            money -= TOWER_TYPES[placingType].cost;
            globalStats.totalSpent += TOWER_TYPES[placingType].cost;
            placingType = null; updateUI(); saveStats();
        }
    } else {
        selectedTower = towers.find(t => Math.hypot(t.x - mousePos.x, t.y - mousePos.y) < 25);
        updateUI();
    }
});

window.addEventListener('keydown', (e) => {
    if (e.key === "Escape") { placingType = null; selectedTower = null; updateUI(); }
});

initShop();
gameLoop();
</script>
</body>
</html>
