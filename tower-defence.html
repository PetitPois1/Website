<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloons JS - Pro Edition</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        #menu, #stats-page { position: absolute; width: 100%; height: 100%; background: rgba(15,15,15,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.3s; }
        canvas { background: #1e1e1e; border: 4px solid #333; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 4px; }
        .ui-container { display: flex; gap: 20px; margin-top: 15px; width: 850px; height: 180px; }
        .shop, .inspector { background: #252525; padding: 15px; border-radius: 12px; border: 1px solid #444; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .shop { flex: 3; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; overflow-y: auto; }
        .inspector { flex: 2; font-size: 0.9rem; line-height: 1.4; border-left: 4px solid #1565c0; }
        .stats-bar { font-size: 1.1rem; margin: 15px 0; background: #333; padding: 10px 40px; border-radius: 50px; display: flex; gap: 30px; border: 1px solid #555; align-items: center; }
        button { padding: 10px; cursor: pointer; background: #1e88e5; color: white; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { background: #42a5f5; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
        .map-card { border: 2px solid #444; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; width: 140px; border-radius: 10px; background: #1a1a1a; }
        .map-card:hover { border-color: #66bb6a; background: #2e7d32; transform: scale(1.05); }
        .hidden { display: none !important; }
        b { color: #ffca28; }
        #wave-btn { background: #43a047; padding: 8px 20px; border-radius: 4px; }
        #wave-btn.stop { background: #e53935; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="letter-spacing: 5px; color: #ffca28;">BLOONS JS: PRO</h1>
        <div style="display: flex; gap: 25px; margin-bottom: 40px;">
            <div class="map-card" onclick="startGame('easy')"><h3>EASY</h3><small>Meadows</small></div>
            <div class="map-card" onclick="startGame('medium')"><h3>MEDIUM</h3><small>S-Loop</small></div>
            <div class="map-card" onclick="startGame('hard')"><h3>HARD</h3><small>Zig-Zag</small></div>
        </div>
        <button onclick="toggleStats(true)">Global Data Archive</button>
    </div>

    <div id="stats-page" class="hidden">
        <h1>All-Time Statistics</h1>
        <div id="stats-content" style="font-size: 1.4rem; line-height: 2; text-align: center;"></div>
        <button onclick="toggleStats(false)" style="margin-top: 30px; width: 200px;">Return</button>
    </div>

    <div class="stats-bar">
        <span>💰 <b id="money">400</b></span>
        <span>❤️ <b id="lives">50</b></span>
        <span>🌊 Wave: <b id="wave">1</b></span>
        <button id="wave-btn" onclick="toggleWave()">START WAVE</button>
    </div>

    <canvas id="gameCanvas" width="850" height="450"></canvas>

    <div class="ui-container">
        <div class="shop" id="shop"></div>
        <div class="inspector" id="inspect-content">
            <h3 style="margin-top:0">Intelligence Report</h3>
            <p>Select a monkey on the field to see tactical data and upgrades.</p>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let money, lives, wave, enemies, towers, projectiles, selectedTower, placingType, particles;
let mousePos = { x: 0, y: 0 };
let currentPath = [];
let gameState = 'MENU';
let waveActive = false;
let enemiesSpawned = 0;
let spawnTimer = 0;

let globalStats = JSON.parse(localStorage.getItem('bloonsStatsPro')) || {
    totalKills: 0, totalSpent: 0, wavesCompleted: 0, gamesPlayed: 0
};

const TOWER_TYPES = {
    dart: { name: "Rock Picker Monkey", cost: 50, range: 110, fireRate: 35, damage: 10, color: '#8d6e63', desc: "Throws heavy stones." },
    tack: { name: "Tack Shooter", cost: 150, range: 90, fireRate: 60, damage: 8, color: '#ef5350', desc: "8-way spray." },
    ice: { name: "Ice Monkey", cost: 280, range: 100, fireRate: 50, damage: 2, color: '#81d4fa', desc: "Freezes and slows enemies.", slow: 0.4 },
    glue: { name: "Glue Gunner", cost: 250, range: 130, fireRate: 40, damage: 1, color: '#dce775', desc: "Permanent movement penalty.", slow: 0.6 },
    ninja: { name: "Ninja Monkey", cost: 320, range: 140, fireRate: 15, damage: 12, color: '#5c6bc0', desc: "Very fast attack speed." },
    bomb: { name: "Bomb Tower", cost: 450, range: 130, fireRate: 70, damage: 35, color: '#424242', desc: "Heavy area damage.", isAoE: true },
    sniper: { name: "Elite Sniper", cost: 500, range: 850, fireRate: 100, damage: 60, color: '#2e7d32', desc: "Infinite range." },
    super: { name: "Super Monkey", cost: 2500, range: 220, fireRate: 3, damage: 6, color: '#ffca28', desc: "The ultimate weapon." }
};

const MAPS = {
    easy: [[0, 225], [850, 225]],
    medium: [[0, 100], [600, 100], [600, 350], [200, 350], [200, 450]],
    hard: [[425, 0], [425, 150], [100, 150], [100, 300], [750, 300], [750, 100], [850, 100]]
};

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.life = 1.0;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= 0.03; }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 3, 3);
        ctx.restore();
    }
}

function initShop() {
    const shop = document.getElementById('shop');
    shop.innerHTML = '';
    for (let id in TOWER_TYPES) {
        const t = TOWER_TYPES[id];
        const btn = document.createElement('button');
        btn.id = `buy-${id}`;
        btn.innerHTML = `<div style="font-size:0.75rem">${t.name}</div><b>$${t.cost}</b>`;
        btn.onclick = (e) => { e.stopPropagation(); if(money >= t.cost) placingType = id; };
        shop.appendChild(btn);
    }
}

function startGame(level) {
    currentPath = MAPS[level];
    money = 400; lives = 50; wave = 1;
    enemies = []; towers = []; projectiles = []; particles = [];
    gameState = 'PLAYING'; waveActive = false;
    globalStats.gamesPlayed++;
    document.getElementById('menu').classList.add('hidden');
    saveStats(); updateUI();
}

function toggleWave() {
    if (gameState !== 'PLAYING') return;
    waveActive = !waveActive;
    const btn = document.getElementById('wave-btn');
    btn.innerText = waveActive ? "STOP WAVE" : "START WAVE";
    btn.className = waveActive ? "stop" : "";
}

function toggleStats(show) {
    const page = document.getElementById('stats-page');
    if (show) {
        document.getElementById('stats-content').innerHTML = `
            Confirmed Pops: <b>${globalStats.totalKills}</b><br>
            Military Spending: <b>$${globalStats.totalSpent}</b><br>
            Operational Successes: <b>${globalStats.wavesCompleted}</b><br>
            Deployments: <b>${globalStats.gamesPlayed}</b>
        `;
        page.classList.remove('hidden');
    } else { page.classList.add('hidden'); }
}

function drawAsset(type, x, y, color, size = 15) {
    ctx.save();
    ctx.translate(x, y);
    if (type === 'monkey') {
        ctx.fillStyle = "#5d4037"; 
        ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#d7ccc8"; 
        ctx.beginPath(); ctx.arc(0, 2, size*0.7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = color; 
        ctx.fillRect(-size*0.6, -size*0.9, size*1.2, size*0.4);
    } else if (type === 'bloon') {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, size);
        ctx.bezierCurveTo(size, size, size, -size, 0, -size);
        ctx.bezierCurveTo(-size, -size, -size, size, 0, size);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.stroke();
    }
    ctx.restore();
}

class Enemy {
    constructor(tier = 1) {
        this.x = currentPath[0][0]; this.y = currentPath[0][1];
        this.tier = tier;
        this.maxHealth = 15 + (tier * 25) + (wave * 10);
        this.health = this.maxHealth;
        this.baseSpeed = 0.8 + (tier * 0.3) + (wave * 0.04);
        this.speed = this.baseSpeed;
        this.color = tier === 1 ? '#ff5252' : tier === 2 ? '#448aff' : '#4caf50';
        this.targetIndex = 1; this.distTraveled = 0;
        this.slowTimer = 0;
    }
    update() {
        if (this.slowTimer > 0) this.slowTimer--;
        else this.speed = this.baseSpeed;

        let target = currentPath[this.targetIndex];
        let dx = target[0] - this.x; let dy = target[1] - this.y;
        let dist = Math.hypot(dx, dy);

        if (dist < 5) {
            this.targetIndex++;
            if (this.targetIndex >= currentPath.length) {
                lives--; this.health = 0; updateUI(); return;
            }
        }
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
        this.distTraveled += this.speed;
    }
    draw() {
        drawAsset('bloon', this.x, this.y, this.color, 12);
        if (this.slowTimer > 0) { // Visual cue for slow
            ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2;
            ctx.strokeRect(this.x - 14, this.y - 14, 28, 28);
        }
    }
}

class Projectile {
    constructor(x, y, target, parent, isFixed = false) {
        this.x = x; this.y = y; this.target = target; this.parent = parent;
        this.active = true; this.speed = 12;
        this.isAoE = parent.type.isAoE;
        this.isFixed = isFixed;
        if (isFixed) {
            let angle = Math.atan2(target.y - y, target.x - x);
            this.vx = Math.cos(angle) * this.speed;
            this.vy = Math.sin(angle) * this.speed;
        }
    }
    update() {
        if (this.isFixed) {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > 850 || this.y < 0 || this.y > 450) this.active = false;
            enemies.forEach(e => {
                if (Math.hypot(e.x - this.x, e.y - this.y) < 15) { this.hit(e); this.active = false; }
            });
        } else {
            if (!this.target || this.target.health <= 0) { this.active = false; return; }
            let dx = this.target.x - this.x; let dy = this.target.y - this.y;
            let dist = Math.hypot(dx, dy);
            if (dist < 10) { this.hit(this.target); this.active = false; }
            this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
        }
    }
    hit(enemy) {
        if (this.isAoE) {
            enemies.forEach(e => {
                if (Math.hypot(e.x - this.x, e.y - this.y) < 70) this.applyDamage(e);
            });
        } else this.applyDamage(enemy);
    }
    applyDamage(e) {
        e.health -= this.parent.damage;
        if (this.parent.type.slow) {
            e.speed = e.baseSpeed * this.parent.type.slow;
            e.slowTimer = 60;
        }
        if (e.health <= 0) {
            money += 12; globalStats.totalKills++; 
            for(let i=0; i<6; i++) particles.push(new Particle(e.x, e.y, e.color));
            updateUI();
        }
    }
    draw() {
        ctx.fillStyle = this.parent.type.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.isAoE ? 6 : 3, 0, Math.PI*2); ctx.fill();
    }
}

class Tower {
    constructor(x, y, typeId) {
        this.x = x; this.y = y; this.typeId = typeId;
        this.type = TOWER_TYPES[typeId];
        this.damage = this.type.damage; this.range = this.type.range;
        this.cooldown = 0; this.level = 1;
    }
    update() {
        if (this.cooldown > 0) this.cooldown--;
        else if (waveActive) {
            let inRange = enemies.filter(e => Math.hypot(e.x - this.x, e.y - this.y) < this.range);
            if (inRange.length > 0) {
                let target = inRange.sort((a, b) => b.distTraveled - a.distTraveled)[0];
                if (this.typeId === 'tack') {
                    for(let i=0; i<8; i++) {
                        let tx = this.x + Math.cos(i * Math.PI/4) * 100;
                        let ty = this.y + Math.sin(i * Math.PI/4) * 100;
                        projectiles.push(new Projectile(this.x, this.y, {x:tx, y:ty}, this, true));
                    }
                } else {
                    projectiles.push(new Projectile(this.x, this.y, target, this));
                }
                this.cooldown = this.type.fireRate;
            }
        }
    }
    draw() {
        if (selectedTower === this) {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI*2);
            ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
        }
        drawAsset('monkey', this.x, this.y, this.type.color, selectedTower === this ? 18 : 15);
    }
}

function gameLoop() {
    if (gameState !== 'PLAYING') { requestAnimationFrame(gameLoop); return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = '#2c2c2c'; ctx.lineWidth = 44; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(currentPath[0][0], currentPath[0][1]);
    currentPath.forEach(p => ctx.lineTo(p[0], p[1])); ctx.stroke();

    if (waveActive) {
        spawnTimer++;
        if (spawnTimer > Math.max(10, 50 - (wave * 2))) {
            let tier = wave > 10 ? Math.floor(Math.random() * 3) + 1 : (wave > 4 ? Math.floor(Math.random() * 2) + 1 : 1);
            enemies.push(new Enemy(tier)); spawnTimer = 0; enemiesSpawned++;
        }
        if (enemiesSpawned > 12 + (wave * 3)) {
            wave++; enemiesSpawned = 0; globalStats.wavesCompleted++; updateUI();
            toggleWave(); // Pause between waves
        }
    }

    enemies = enemies.filter(e => e.health > 0);
    enemies.forEach(e => { e.update(); e.draw(); });
    towers.forEach(t => { t.update(); t.draw(); });
    projectiles = projectiles.filter(p => p.active);
    projectiles.forEach(p => { p.update(); p.draw(); });
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(); });

    if (placingType) {
        ctx.globalAlpha = 0.4;
        drawAsset('monkey', mousePos.x, mousePos.y, TOWER_TYPES[placingType].color);
        ctx.globalAlpha = 1;
    }
    if (lives <= 0) { alert("Game Over! Wave: " + wave); location.reload(); }
    requestAnimationFrame(gameLoop);
}

function updateUI() {
    document.getElementById('money').innerText = Math.floor(money);
    document.getElementById('lives').innerText = lives;
    document.getElementById('wave').innerText = wave;
    for (let id in TOWER_TYPES) {
        const btn = document.getElementById(`buy-${id}`);
        if(btn) btn.disabled = money < TOWER_TYPES[id].cost;
    }
    if (selectedTower) {
        document.getElementById('inspect-content').innerHTML = `
            <h3>${selectedTower.type.name}</h3>
            <p>${selectedTower.type.desc}</p>
            Rank: <b>${selectedTower.level}</b><br>
            <button onclick="upgradeTower()" style="width:100%" ${money < selectedTower.level * 200 ? 'disabled' : ''}>
                Upgrade ($${selectedTower.level * 200})
            </button>
        `;
    }
}

function upgradeTower() {
    let cost = selectedTower.level * 200;
    if (money >= cost) {
        money -= cost; selectedTower.level++;
        selectedTower.damage *= 1.5; selectedTower.range += 15;
        updateUI(); saveStats();
    }
}

function saveStats() { localStorage.setItem('bloonsStatsPro', JSON.stringify(globalStats)); }

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mousePos.x = e.clientX - rect.left; mousePos.y = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', () => {
    if (placingType) {
        towers.push(new Tower(mousePos.x, mousePos.y, placingType));
        money -= TOWER_TYPES[placingType].cost;
        placingType = null; updateUI();
    } else {
        selectedTower = towers.find(t => Math.hypot(t.x - mousePos.x, t.y - mousePos.y) < 25);
        updateUI();
    }
});

initShop();
gameLoop();
</script>
</body>
</html>
