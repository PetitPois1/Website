<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Stack Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Poppins', sans-serif;
            touch-action: none; /* Prevents pull-to-refresh and zooming */
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.5s ease;
        }

        /* Mobile-First Glassmorphism UI */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 8%;
            font-size: 100px;
            font-weight: 900;
            color: white;
            text-shadow: 0px 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
        }

        .panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            width: 80%;
            max-width: 320px;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            pointer-events: auto;
            transform: translateY(0);
            animation: floatUp 0.5s ease-out;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { margin: 0 0 5px 0; color: white; font-size: 42px; line-height: 1.2; }
        p { color: #e0e0e0; font-size: 16px; margin-bottom: 25px; }
        
        .high-score-badge {
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            color: #ffd700;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        button {
            width: 100%;
            padding: 18px 0;
            font-size: 22px;
            font-weight: 900;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(0, 114, 255, 0.4);
        }

        #main-menu, #game-over { display: flex; flex-direction: column; align-items: center; }
        #game-over { display: none; }
        .hidden { display: none !important; }
        
        #combo-text {
            position: absolute;
            top: 22%;
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            text-shadow: 0px 4px 15px rgba(255, 215, 0, 0.6);
            letter-spacing: 2px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>

    <div class="ui-layer">
        <div id="score-display" class="hidden">0</div>
        <div id="combo-text">PERFECT</div>

        <div id="main-menu" class="panel">
            <h1>STACK</h1>
            <div id="auth-status" class="text-xs text-slate-400 mb-2">Sign in to save progress</div>
            <div class="high-score-badge">BEST: <span id="menu-high-score">0</span></div>
            <p>Tap anywhere to drop.</p>
            <button id="btn-play">PLAY</button>
        </div>

        <div id="game-over" class="panel">
            <h1>GAME OVER</h1>
            <div class="high-score-badge">BEST: <span id="over-high-score">0</span></div>
            <p>Score: <span id="final-score" style="font-weight: bold; color: white; font-size: 24px;">0</span></p>
            <button id="btn-restart">RESTART</button>
            <button onclick="window.location.href='index.html'" style="margin-top: 10px; background: rgba(255,255,255,0.1); box-shadow: none; font-size: 16px; padding: 12px 0;">EXIT</button>
        </div>
    </div>

    <script>
        // --- GAME HUB INTEGRATION ---
        let highScore = 0;
        const GAME_ID = 'stack';

        async function syncProgress() {
            if (window.gameHubProgress) {
                const progress = await window.gameHubProgress.loadGameProgress(GAME_ID);
                if (progress && progress.highScore) {
                    highScore = progress.highScore;
                    document.getElementById('menu-high-score').innerText = highScore;
                    document.getElementById('over-high-score').innerText = highScore;
                }
            }
        }

        // Wait for auth and sync
        setTimeout(syncProgress, 1000);

        // Update auth status text
        if (window.gameHubAuth) {
            window.gameHubAuth.onAuthStateChanged(user => {
                const statusEl = document.getElementById('auth-status');
                if (user) {
                    statusEl.innerText = "Signed in as " + (user.displayName || user.email.split('@')[0]);
                    statusEl.style.color = "#4ade80";
                    syncProgress();
                } else {
                    statusEl.innerText = "Sign in to save progress";
                    statusEl.style.color = "";
                }
            });
        }

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'drop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'perfect') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1000, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        // --- GAME VARIABLES ---
        let scene, camera, renderer;
        let stack = [];
        let overhangs = [];
        let particles = [];
        const boxHeight = 1;
        const originalBoxSize = 3;
        let gameEnded = true;
        let currentScore = 0;
        let speed = 0.12;
        let hue = Math.random() * 360;
        
        // Smooth Camera Variables
        let targetCameraY = 10;

        // --- SETUP SCENE ---
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);
            
            const aspect = window.innerWidth / window.innerHeight;
            const d = 12;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 100);
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -15;
            dirLight.shadow.camera.right = 15;
            dirLight.shadow.camera.top = 15;
            dirLight.shadow.camera.bottom = -15;
            scene.add(dirLight);

            animate();
        }

        function updateBackground() {
            hue = (hue + 12) % 360;
            document.body.style.backgroundColor = `hsl(${hue}, 45%, 15%)`;
            scene.fog.color.setHSL(hue / 360, 0.45, 0.15);
        }

        function startGame(e) {
            if(e) e.stopPropagation(); // Prevents the start click from dropping a block
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('score-display').classList.remove('hidden');
            currentScore = 0;
            updateScoreText();

            stack.forEach(b => scene.remove(b.mesh));
            overhangs.forEach(o => scene.remove(o));
            particles.forEach(p => scene.remove(p.mesh));
            stack = [];
            overhangs = [];
            particles = [];
            speed = 0.12;
            gameEnded = false;
            
            // Reset Smooth Camera
            targetCameraY = 10;
            camera.position.set(10, 10, 10);
            updateBackground();

            addLayer(0, 0, originalBoxSize, originalBoxSize, 'x');
            addLayer(-10, 0, originalBoxSize, originalBoxSize, 'x');
        }

        function addLayer(x, z, width, depth, direction) {
            const y = boxHeight * stack.length;
            const geometry = new THREE.BoxGeometry(width, boxHeight, depth);
            const color = new THREE.Color(`hsl(${hue + stack.length * 5}, 85%, 60%)`);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, metalness: 0.1 });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            stack.push({ mesh, width, depth, direction });
        }

        function spawnParticles(x, y, z, color) {
            const particleCount = 15;
            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const material = new THREE.MeshStandardMaterial({ color: color });

            for (let i = 0; i < particleCount; i++) {
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(x + (Math.random() - 0.5), y, z + (Math.random() - 0.5));
                scene.add(mesh);
                particles.push({
                    mesh: mesh,
                    velocity: new THREE.Vector3((Math.random() - 0.5) * 0.4, Math.random() * 0.4 + 0.2, (Math.random() - 0.5) * 0.4),
                    life: 1.0
                });
            }
        }

        // UNIFIED INPUT HANDLING (Perfect for Mobile & Desktop)
        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName !== 'BUTTON' && !gameEnded) {
                placeBlock();
            }
        });
        
        document.getElementById('btn-play').addEventListener('pointerdown', startGame);
        document.getElementById('btn-restart').addEventListener('pointerdown', startGame);

        function showPerfectCombo() {
            const comboText = document.getElementById('combo-text');
            comboText.style.opacity = '1';
            comboText.style.transform = 'translateY(-20px) scale(1.1)';
            setTimeout(() => {
                comboText.style.opacity = '0';
                comboText.style.transform = 'translateY(0px) scale(1)';
            }, 500);
        }

        function updateScoreText() {
            const scoreEl = document.getElementById('score-display');
            scoreEl.innerText = currentScore;
            scoreEl.style.transform = 'scale(1.2)';
            setTimeout(() => scoreEl.style.transform = 'scale(1)', 150);
        }

        function placeBlock() {
            if (gameEnded) return;

            const topLayer = stack[stack.length - 1];
            const previousLayer = stack[stack.length - 2];
            const direction = topLayer.direction;
            const size = direction === 'x' ? topLayer.width : topLayer.depth;
            const delta = topLayer.mesh.position[direction] - previousLayer.mesh.position[direction];
            const overhangSize = Math.abs(delta);
            const tolerance = 0.15;
            let overlap = size - overhangSize;

            if (overhangSize < tolerance) {
                // PERFECT
                playSound('perfect');
                showPerfectCombo();
                spawnParticles(topLayer.mesh.position.x, topLayer.mesh.position.y, topLayer.mesh.position.z, topLayer.mesh.material.color);
                topLayer.mesh.position[direction] = previousLayer.mesh.position[direction];
                overlap = size; 
            } else if (overlap > 0) {
                // SLICE
                playSound('drop');
                const newWidth = direction === 'x' ? overlap : topLayer.width;
                const newDepth = direction === 'z' ? overlap : topLayer.depth;

                topLayer.width = newWidth;
                topLayer.depth = newDepth;
                topLayer.mesh.scale[direction] = overlap / size;
                topLayer.mesh.position[direction] -= delta / 2;

                const overhangShift = (overlap / 2 + overhangSize / 2) * Math.sign(delta);
                const overhangX = direction === 'x' ? topLayer.mesh.position.x + overhangShift : topLayer.mesh.position.x;
                const overhangZ = direction === 'z' ? topLayer.mesh.position.z + overhangShift : topLayer.mesh.position.z;
                const overhangW = direction === 'x' ? overhangSize : newWidth;
                const overhangD = direction === 'z' ? overhangSize : newDepth;

                createOverhang(overhangX, topLayer.mesh.position.y, overhangZ, overhangW, overhangD, topLayer.mesh.material);
            }

            if (overlap > 0) {
                // SUCCESS
                currentScore++;
                updateScoreText();
                updateBackground();
                speed += 0.003; 

                const nextDirection = direction === 'x' ? 'z' : 'x';
                const nextX = nextDirection === 'x' ? -12 : topLayer.mesh.position.x;
                const nextZ = nextDirection === 'z' ? -12 : topLayer.mesh.position.z;
                
                addLayer(nextX, nextZ, topLayer.width, topLayer.depth, nextDirection);
                
                // Set the new target height for the smooth camera
                targetCameraY += boxHeight;
            } else {
                // GAME OVER
                playSound('gameover');
                gameEnded = true;
                topLayer.mesh.material.transparent = true;
                topLayer.mesh.material.opacity = 0.5; 
                overhangs.push(topLayer.mesh);
                
                // Check and Update High Score
                if (currentScore > highScore) {
                    highScore = currentScore;
                    if (window.gameHubProgress) {
                        window.gameHubProgress.saveGameProgress(GAME_ID, { highScore: highScore });
                    }
                }

                // Check achievements
                if (window.gameHubProgress) {
                    if (currentScore >= 10) window.gameHubProgress.unlockAchievement(GAME_ID, 'stack_score_10');
                    if (currentScore >= 25) window.gameHubProgress.unlockAchievement(GAME_ID, 'stack_score_25');
                    if (currentScore >= 50) window.gameHubProgress.unlockAchievement(GAME_ID, 'stack_score_50');
                    if (currentScore >= 100) window.gameHubProgress.unlockAchievement(GAME_ID, 'stack_score_100');
                }
                
                document.getElementById('final-score').innerText = currentScore;
                document.getElementById('over-high-score').innerText = highScore;
                document.getElementById('menu-high-score').innerText = highScore;
                document.getElementById('score-display').classList.add('hidden');
                
                setTimeout(() => {
                    document.getElementById('game-over').style.display = 'flex';
                }, 1000);
            }
        }

        function createOverhang(x, y, z, width, depth, material) {
            const geometry = new THREE.BoxGeometry(width, boxHeight, depth);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            overhangs.push(mesh);
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Smooth Camera Interpolation (Lerp)
            camera.position.y += (targetCameraY - camera.position.y) * 0.1;

            if (!gameEnded && stack.length > 1) {
                const topLayer = stack[stack.length - 1];
                topLayer.mesh.position[topLayer.direction] += speed;

                if (topLayer.mesh.position[topLayer.direction] > 15 || topLayer.mesh.position[topLayer.direction] < -15) {
                    speed = -speed;
                }
            }

            for (let i = 0; i < overhangs.length; i++) {
                overhangs[i].position.y -= 0.2;
                overhangs[i].rotation.x += 0.03;
                overhangs[i].rotation.y += 0.03;
                
                if (overhangs[i].position.y < camera.position.y - 20) {
                    scene.remove(overhangs[i]);
                    overhangs.splice(i, 1);
                    i--;
                }
            }

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.velocity.y -= 0.02;
                p.mesh.rotation.x += 0.1;
                p.mesh.rotation.y += 0.1;
                p.life -= 0.02;
                
                p.mesh.material.transparent = true;
                p.mesh.material.opacity = p.life;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                    i--;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 12;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
