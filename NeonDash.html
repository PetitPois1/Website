<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
            user-select: none;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        canvas {
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.1);
            position: relative;
        }

        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .pointer-events-auto { pointer-events: auto; }
        .text-neon-cyan { color: #00f3ff; text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff; }
        .text-neon-pink { color: #ff003c; text-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c; }

        .btn-neon {
            background: rgba(0, 243, 255, 0.05);
            border: 2px solid #00f3ff;
            color: #00f3ff;
            text-shadow: 0 0 5px #00f3ff;
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.2), 0 0 15px rgba(0, 243, 255, 0.4);
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-neon:hover, .btn-neon:active, .btn-neon.active {
            background: #00f3ff;
            color: #050510;
            text-shadow: none;
            box-shadow: 0 0 25px #00f3ff;
        }

        .btn-neon-pink {
            background: rgba(255, 0, 60, 0.05);
            border: 2px solid #ff003c;
            color: #ff003c;
            text-shadow: 0 0 5px #ff003c;
            box-shadow: inset 0 0 10px rgba(255, 0, 60, 0.2), 0 0 15px rgba(255, 0, 60, 0.4);
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-neon-pink:hover, .btn-neon-pink:active {
            background: #ff003c;
            color: #050510;
            text-shadow: none;
            box-shadow: 0 0 25px #ff003c;
        }

        .menu-box {
            background: rgba(11, 12, 16, 0.95);
            border: 2px solid #1f2833;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #editor-toolbar {
            background: rgba(5, 5, 16, 0.9);
            border-bottom: 2px solid #00f3ff;
        }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .level-grid::-webkit-scrollbar { width: 8px; }
        .level-grid::-webkit-scrollbar-track { background: #050510; }
        .level-grid::-webkit-scrollbar-thumb { background: #00f3ff; border-radius: 4px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer" class="ui-layer">
        
        <!-- HUD Exit Button (Test Mode) -->
        <button id="hud-exit-btn" onclick="exitToEditor()" class="absolute top-6 left-8 btn-neon-pink px-4 py-2 hidden text-xs font-bold uppercase tracking-widest cursor-pointer pointer-events-auto shadow-xl z-50">
            Exit to Editor
        </button>

        <!-- Score HUD -->
        <div id="score-hud" class="absolute top-6 right-8 text-right hidden z-50 pointer-events-none">
            <div id="score-text-container" class="text-xl text-white opacity-80">SCORE <span id="current-score" class="font-bold text-neon-cyan text-2xl ml-2">0</span></div>
            <div id="best-score-container" class="text-sm text-white opacity-50 mt-1">BEST <span id="high-score-hud" class="font-bold ml-2">0</span></div>
        </div>

        <!-- MAIN MENU -->
        <div id="main-menu" class="flex flex-col items-center pointer-events-auto transition-opacity duration-300 menu-box p-12 rounded-xl">
            <h1 class="text-6xl md:text-8xl font-black text-neon-cyan mb-2 tracking-wider">NEON</h1>
            <h1 class="text-6xl md:text-8xl font-black text-neon-pink mb-10 tracking-wider">DASH</h1>
            <div class="flex flex-col gap-4 w-full min-w-[300px]">
                <button onclick="startGame('ENDLESS')" class="btn-neon px-8 py-4 text-xl font-bold uppercase tracking-widest cursor-pointer w-full">Play Endless</button>
                <button onclick="showMenu('level-select')" class="btn-neon px-8 py-4 text-xl font-bold uppercase tracking-widest cursor-pointer w-full">Play Levels</button>
                <button onclick="startEditor()" class="btn-neon-pink px-8 py-4 text-xl font-bold uppercase tracking-widest cursor-pointer w-full">Level Editor</button>
            </div>
        </div>

        <!-- LEVEL SELECT MENU -->
        <div id="level-select-menu" class="hidden flex-col items-center pointer-events-auto transition-opacity duration-300 menu-box p-8 rounded-xl w-[90%] max-w-[800px]">
            <h2 class="text-4xl font-black text-neon-cyan mb-2">SELECT LEVEL</h2>
            <p id="level-status-text" class="text-gray-400 text-xs mb-6 uppercase tracking-widest">Loading levels from server...</p>
            
            <div id="dynamic-levels-container" class="level-grid mb-6"></div>
            
            <div class="w-full border-t border-gray-700 pt-6 flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <h3 class="text-sm text-gray-400 mb-2 uppercase tracking-widest">Custom Level Code</h3>
                    <div class="flex gap-2">
                        <input type="text" id="single-level-code" class="flex-1 bg-gray-900 text-cyan-300 px-3 rounded border border-gray-700 focus:border-cyan-400 outline-none font-mono text-xs" placeholder="Paste single level string here...">
                        <button onclick="playSingleCode()" class="btn-neon px-4 py-3 text-sm font-bold uppercase cursor-pointer">Play</button>
                    </div>
                </div>
            </div>
            
            <button onclick="showMenu('main')" class="text-gray-400 hover:text-white uppercase tracking-widest text-sm mt-8 cursor-pointer">Back to Main Menu</button>
        </div>

        <!-- LEVEL EDITOR UI -->
        <div id="editor-ui" class="hidden absolute top-0 left-0 w-full pointer-events-auto flex flex-col">
            <div id="editor-toolbar" class="w-full p-4 flex flex-col gap-3">
                <div class="flex flex-wrap justify-between items-center gap-4">
                    <div class="flex gap-2 items-center flex-wrap">
                        <span class="text-white text-sm opacity-70 mr-1 uppercase tracking-widest hidden lg:block">Tools:</span>
                        <button id="tool-block" onclick="setEditorTool('block')" class="btn-neon active px-3 py-2 text-xs font-bold uppercase cursor-pointer">Block</button>
                        <button id="tool-halfblock" onclick="setEditorTool('halfblock')" class="btn-neon px-3 py-2 text-xs font-bold uppercase cursor-pointer">Half</button>
                        <button id="tool-spike" onclick="setEditorTool('spike')" class="btn-neon px-3 py-2 text-xs font-bold uppercase cursor-pointer">Spike</button>
                        <button id="tool-sawblade" onclick="setEditorTool('sawblade')" class="btn-neon px-3 py-2 text-xs font-bold uppercase cursor-pointer text-red-400 border-red-500 shadow-red-500">Saw</button>
                        <button id="tool-bouncepad" onclick="setEditorTool('bouncepad')" class="btn-neon px-3 py-2 text-xs font-bold uppercase cursor-pointer text-green-300 border-green-400">Pad</button>
                        <button id="tool-orb" onclick="setEditorTool('orb')" class="btn-neon px-3 py-2 text-xs font-bold uppercase cursor-pointer text-fuchsia-400 border-fuchsia-500">Orb</button>
                        <button id="tool-erase" onclick="setEditorTool('erase')" class="btn-neon-pink px-3 py-2 text-xs font-bold uppercase cursor-pointer ml-2">Erase</button>
                    </div>
                    <div class="flex gap-4 items-center">
                        <button id="pan-left" class="bg-gray-800 text-white px-4 py-2 rounded text-xl cursor-pointer hover:bg-gray-700">&lt;</button>
                        <span class="text-white text-xs font-mono w-24 text-center">CAM: <span id="cam-pos">0</span></span>
                        <button id="pan-right" class="bg-gray-800 text-white px-4 py-2 rounded text-xl cursor-pointer hover:bg-gray-700">&gt;</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="testLevel()" class="btn-neon px-4 py-2 text-sm font-bold uppercase cursor-pointer bg-green-900 bg-opacity-30">Test</button>
                        <button onclick="openExportModal()" class="btn-neon px-4 py-2 text-sm font-bold uppercase cursor-pointer">Export</button>
                        <button onclick="quitEditor()" class="text-gray-400 hover:text-white px-2 text-xs uppercase cursor-pointer">Quit</button>
                    </div>
                </div>
                <!-- Custom Colors Row -->
                <div class="flex gap-4 items-center border-t border-gray-800 pt-2 flex-wrap">
                    <span class="text-white text-xs opacity-70 uppercase tracking-widest">Colors:</span>
                    <div class="flex items-center gap-1">
                        <label class="text-gray-400 text-[10px] uppercase">Sky Top</label>
                        <input type="color" id="col-bg1" value="#050510" class="w-6 h-6 border-none cursor-pointer bg-transparent" onchange="updateColors()">
                    </div>
                    <div class="flex items-center gap-1">
                        <label class="text-gray-400 text-[10px] uppercase">Sky Bot</label>
                        <input type="color" id="col-bg2" value="#1a0b2e" class="w-6 h-6 border-none cursor-pointer bg-transparent" onchange="updateColors()">
                    </div>
                    <div class="flex items-center gap-1">
                        <label class="text-gray-400 text-[10px] uppercase">Floor</label>
                        <input type="color" id="col-floor" value="#1f2833" class="w-6 h-6 border-none cursor-pointer bg-transparent" onchange="updateColors()">
                    </div>
                    <div class="flex items-center gap-1">
                        <label class="text-gray-400 text-[10px] uppercase">Outline</label>
                        <input type="color" id="col-outline" value="#00f3ff" class="w-6 h-6 border-none cursor-pointer bg-transparent" onchange="updateColors()">
                    </div>
                </div>
            </div>
            
            <div class="absolute top-[140px] left-4 text-white opacity-50 text-xs max-w-xs pointer-events-none hidden md:block">
                Click grid to place. <br>Use A/D or arrows to pan camera.
            </div>
        </div>

        <!-- MODAL: Export Level -->
        <div id="export-modal" class="hidden absolute inset-0 bg-black bg-opacity-80 flex justify-center items-center pointer-events-auto z-50">
            <div class="menu-box p-8 rounded-xl w-[90%] max-w-[500px] flex flex-col items-center">
                <h3 class="text-2xl text-neon-cyan font-bold mb-2">EXPORT LEVEL</h3>
                <p class="text-gray-400 text-xs text-center mb-4">Name your level, then copy the string to your repository.</p>
                
                <input type="text" id="export-level-name" class="w-full bg-gray-900 text-white p-3 rounded border border-gray-700 focus:border-cyan-400 outline-none mb-4 font-bold" placeholder="Level Name" value="My Custom Level" oninput="updateExportString()">
                
                <textarea id="export-textarea" class="w-full bg-gray-900 text-green-400 p-4 rounded border border-gray-700 h-32 mb-6 font-mono text-xs outline-none" readonly></textarea>
                <div class="flex gap-4 w-full">
                    <button onclick="copyExportCode()" class="btn-neon flex-1 py-3 font-bold uppercase cursor-pointer">Copy String</button>
                    <button onclick="closeExportModal()" class="text-gray-400 hover:text-white px-4 uppercase cursor-pointer">Close</button>
                </div>
            </div>
        </div>

        <!-- GAME OVER / WIN SCREEN -->
        <div id="game-over-screen" class="hidden absolute inset-0 bg-black bg-opacity-80 flex flex-col justify-center items-center pointer-events-auto opacity-0 transition-opacity duration-300 z-40">
            <h2 id="end-title" class="text-5xl md:text-7xl font-black text-neon-pink mb-4">CRASHED</h2>
            <div class="menu-box p-8 rounded-lg mb-8 text-center min-w-[300px] shadow-2xl">
                <div id="end-score-label" class="text-gray-400 text-lg mb-1">SCORE</div>
                <div id="final-score" class="text-4xl text-neon-cyan font-bold mb-6">0</div>
                <div id="end-high-label" class="text-gray-400 text-lg mb-1">HIGH SCORE</div>
                <div id="high-score" class="text-3xl text-white font-bold">0</div>
            </div>
            <div class="flex flex-col gap-4 w-full max-w-[300px] items-center">
                <button id="restart-btn" onclick="retryGame()" class="btn-neon px-10 py-4 text-xl font-bold rounded-sm uppercase tracking-widest cursor-pointer w-full text-center">
                    Try Again
                </button>
                <button id="go-menu-btn" onclick="quitToMenu()" class="text-gray-400 hover:text-white uppercase tracking-widest text-sm py-2 cursor-pointer w-full text-center">
                    Main Menu
                </button>
            </div>
        </div>

    </div>
</div>

<script>
    /**
     * Constants & Configuration
     */
    const GAME_WIDTH = 1200;
    const GAME_HEIGHT = 600;
    const FLOOR_Y = 520; 
    const GRAVITY = 5500; 
    const JUMP_VELOCITY = -1300; 
    const BASE_SPEED = 500; 
    const SPEED_INCREMENT = 10; 
    const MAX_SPEED = 1200;
    const GRID_SIZE = 40;
    
    // Dynamic Level Colors
    let levelColors = {
        bgTop: '#050510',
        bgBot: '#1a0b2e',
        floor: '#1f2833',
        outline: '#00f3ff'
    };
    
    const COLOR_PLAYER = '#00f3ff';
    const COLOR_SPIKE = '#ff003c';

    // Levels Object
    let BUILT_IN_LEVELS = {};

    /**
     * Engine Variables
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let lastTime = 0;
    let animationId;
    
    const menus = {
        'main': document.getElementById('main-menu'),
        'level-select': document.getElementById('level-select-menu'),
        'game-over': document.getElementById('game-over-screen'),
        'editor': document.getElementById('editor-ui')
    };
    const scoreHud = document.getElementById('score-hud');
    
    // Game State
    let state = 'MAIN_MENU'; 
    let gameMode = 'ENDLESS'; 
    let currentLevelCode = "";
    let isTesting = false; 
    
    // Physics & World
    let cameraX = 0;
    let currentSpeed = BASE_SPEED;
    let score = 0;
    let highScore = localStorage.getItem('neondash_highscore') || 0;
    let levelEndX = 0;
    
    const player = {
        screenX: 200,
        y: FLOOR_Y - 40,
        lastY: FLOOR_Y - 40,
        size: 40,
        vy: 0,
        rotation: 0,
        isGrounded: true,
        coyoteTimer: 0,
        trail: []
    };

    let obstacles = [];
    let editorBackupObstacles = []; 
    let particles = [];
    
    // Editor State
    let editorTool = 'block';
    let editorMouseX = 0;
    let editorMouseY = 0;
    let isPanningLeft = false;
    let isPanningRight = false;
    const EDITOR_PAN_SPEED = 800;

    /**
     * Level Loading
     */
    async function loadBackgroundLevels() {
        const statusText = document.getElementById('level-status-text');
        try {
            const response = await fetch('NeonDashLevels.txt');
            if (response.ok) {
                const text = await response.text();
                parseFetchedLevels(text);
                statusText.innerText = `Loaded ${Object.keys(BUILT_IN_LEVELS).length} levels successfully.`;
                statusText.className = "text-neon-cyan text-xs mb-6 uppercase tracking-widest";
            } else {
                throw new Error("File not found");
            }
        } catch (error) {
            console.warn("Could not fetch levels. Using fallback.", error);
            BUILT_IN_LEVELS = {
                "Offline Level 1": "C,#050510,#1a0b2e,#1f2833,#00f3ff;S,800,480,40,40;S,840,480,40,40;S,1200,480,40,40;B,1560,440,120,40;S,1760,480,40,40;S,2160,480,40,40;B,2560,400,80,80;P,2800,490,40,10",
                "Offline Level 2": "C,#1a0000,#330000,#4d0000,#ffaa00;H,600,500,40,20;B,760,440,40,40;H,920,420,40,20;S,1120,480,40,40;S,1160,480,40,40;B,1320,440,80,40;P,1480,490,40,10;W,1700,480,40,40;O,1950,400,40,40"
            };
            statusText.innerText = "Offline Mode: Using fallback levels.";
            statusText.className = "text-neon-pink text-xs mb-6 uppercase tracking-widest";
            renderLevelGrid();
        }
    }

    function parseFetchedLevels(text) {
        const lines = text.split('\n');
        BUILT_IN_LEVELS = {}; 
        for(let line of lines) {
            line = line.trim();
            if(!line || line.startsWith('#')) continue; 
            const separatorIndex = line.indexOf('|');
            if(separatorIndex > 0) {
                const name = line.substring(0, separatorIndex).trim();
                const data = line.substring(separatorIndex + 1).trim();
                if(name && data) BUILT_IN_LEVELS[name] = data;
            }
        }
        renderLevelGrid();
    }

    function renderLevelGrid() {
        const container = document.getElementById('dynamic-levels-container');
        container.innerHTML = '';
        Object.keys(BUILT_IN_LEVELS).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'btn-neon py-3 px-2 text-sm font-bold uppercase cursor-pointer rounded truncate';
            btn.innerText = name;
            btn.title = name;
            btn.onclick = () => startGame('LEVEL', BUILT_IN_LEVELS[name]);
            container.appendChild(btn);
        });
    }

    /**
     * Initialization & Resize
     */
    function resizeCanvas() {
        const windowRatio = window.innerWidth / window.innerHeight;
        const gameRatio = GAME_WIDTH / GAME_HEIGHT;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        if (windowRatio < gameRatio) {
            canvas.style.width = '100vw';
            canvas.style.height = `${100 / gameRatio}vw`;
        } else {
            canvas.style.height = '100vh';
            canvas.style.width = `${100 * gameRatio}vh`;
        }
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    document.getElementById('high-score-hud').innerText = highScore;
    loadBackgroundLevels();

    /**
     * Decoding / Encoding Level Strings
     */
    function updateColors() {
        levelColors.bgTop = document.getElementById('col-bg1').value;
        levelColors.bgBot = document.getElementById('col-bg2').value;
        levelColors.floor = document.getElementById('col-floor').value;
        levelColors.outline = document.getElementById('col-outline').value;
    }

    function syncColorPickers() {
        document.getElementById('col-bg1').value = levelColors.bgTop;
        document.getElementById('col-bg2').value = levelColors.bgBot;
        document.getElementById('col-floor').value = levelColors.floor;
        document.getElementById('col-outline').value = levelColors.outline;
    }

    const typeMap = { 'spike': 'S', 'block': 'B', 'halfblock': 'H', 'bouncepad': 'P', 'sawblade': 'W', 'orb': 'O' };
    const invMap = { 'S': 'spike', 'B': 'block', 'H': 'halfblock', 'P': 'bouncepad', 'W': 'sawblade', 'O': 'orb' };

    function decodeLevel(codeStr) {
        let obs = [];
        if(!codeStr) return obs;
        
        levelColors = { bgTop: '#050510', bgBot: '#1a0b2e', floor: '#1f2833', outline: '#00f3ff' };
        
        const parts = codeStr.split(';');
        for(let p of parts) {
            if(!p) continue;
            const d = p.split(',');
            if (d[0] === 'C' && d.length >= 5) {
                levelColors.bgTop = d[1];
                levelColors.bgBot = d[2];
                levelColors.floor = d[3];
                levelColors.outline = d[4];
            } else if(d.length === 5 && invMap[d[0]]) {
                obs.push({
                    type: invMap[d[0]],
                    x: parseFloat(d[1]),
                    y: parseFloat(d[2]),
                    width: parseFloat(d[3]),
                    height: parseFloat(d[4]),
                    passed: false
                });
            }
        }
        syncColorPickers();
        return obs;
    }

    function encodeLevel(obsList) {
        let colorStr = `C,${levelColors.bgTop},${levelColors.bgBot},${levelColors.floor},${levelColors.outline}`;
        let piecesStr = obsList.map(o => `${typeMap[o.type]},${o.x},${o.y},${o.width},${o.height}`).join(';');
        return piecesStr ? colorStr + ';' + piecesStr : colorStr;
    }

    /**
     * Menu & Navigation Handling
     */
    function showMenu(menuId) {
        Object.values(menus).forEach(m => {
            m.classList.add('hidden');
            m.classList.remove('flex');
        });
        
        if(menus[menuId]) {
            menus[menuId].classList.remove('hidden');
            menus[menuId].classList.remove('opacity-0');
            if (menuId === 'game-over') {
                menus[menuId].classList.add('flex'); 
            }
        }
        scoreHud.classList.add('hidden');
        document.getElementById('hud-exit-btn').classList.add('hidden');
    }

    function quitToMenu() {
        state = 'MAIN_MENU';
        isTesting = false;
        
        // Reset player out of view so background isn't obstructed
        player.y = FLOOR_Y - player.size;
        
        if(animationId) cancelAnimationFrame(animationId);
        showMenu('main');
        // Resume gameLoop for background scrolling
        lastTime = performance.now();
        animationId = requestAnimationFrame(gameLoop);
    }

    function exitToEditor() {
        state = 'EDITOR';
        isTesting = false;
        obstacles = JSON.parse(JSON.stringify(editorBackupObstacles)); 
        player.y = FLOOR_Y - player.size;
        player.vy = 0;
        showMenu('editor');
        draw();
    }

    function playSingleCode() {
        const code = document.getElementById('single-level-code').value.trim();
        if(code) {
            if(code.includes('|')) startGame('LEVEL', code.split('|')[1]);
            else startGame('LEVEL', code);
        }
    }

    /**
     * Core Mechanics: Starting Games
     */
    function startGame(mode, codeStr = "") {
        gameMode = mode;
        currentLevelCode = codeStr;
        state = 'PLAYING';
        showMenu(''); 
        
        scoreHud.classList.remove('hidden');
        if (isTesting) {
            document.getElementById('hud-exit-btn').classList.remove('hidden');
        }

        if(mode === 'ENDLESS') {
            document.getElementById('score-text-container').classList.remove('hidden');
            document.getElementById('best-score-container').classList.remove('hidden');
            document.getElementById('current-score').innerText = '0';
            levelColors = { bgTop: '#050510', bgBot: '#1a0b2e', floor: '#1f2833', outline: '#00f3ff' };
            syncColorPickers();
        } else {
            document.getElementById('score-text-container').classList.remove('hidden');
            document.getElementById('best-score-container').classList.add('hidden');
            document.getElementById('current-score').innerText = '0%';
        }

        cameraX = 0;
        player.y = FLOOR_Y - player.size;
        player.lastY = player.y;
        player.vy = 0;
        player.rotation = 0;
        player.isGrounded = true;
        player.coyoteTimer = 0;
        player.trail = [];
        particles = [];
        score = 0;
        currentSpeed = BASE_SPEED;
        
        if (mode === 'ENDLESS') {
            obstacles = [];
            nextSpawnDistance = 0;
        } else {
            obstacles = decodeLevel(codeStr);
            if (obstacles.length > 0) {
                levelEndX = Math.max(...obstacles.map(o => o.x)) + 800;
            } else {
                levelEndX = 1000;
            }
        }
        
        lastTime = performance.now();
        if (!animationId) animationId = requestAnimationFrame(gameLoop);
    }

    function retryGame() {
        if(isTesting) startGame('LEVEL', currentLevelCode);
        else if(state === 'EDITOR') quitToMenu(); 
        else startGame(gameMode, currentLevelCode);
    }

    /**
     * End Game Handling
     */
    function triggerGameOver(won = false) {
        state = 'GAMEOVER';
        
        const titleEl = document.getElementById('end-title');
        const endScoreLabel = document.getElementById('end-score-label');
        const endHighLabel = document.getElementById('end-high-label');
        const finalScoreEl = document.getElementById('final-score');
        const highScoreEl = document.getElementById('high-score');
        const goMenuBtn = document.getElementById('go-menu-btn');
        
        if (isTesting) {
            goMenuBtn.innerText = "RETURN TO EDITOR";
            goMenuBtn.onclick = exitToEditor;
        } else {
            goMenuBtn.innerText = "MAIN MENU";
            goMenuBtn.onclick = quitToMenu;
        }

        if (won) {
            titleEl.innerText = "LEVEL CLEAR";
            titleEl.className = "text-5xl md:text-7xl font-black text-neon-cyan mb-4";
            endScoreLabel.classList.add('hidden');
            endHighLabel.classList.add('hidden');
            finalScoreEl.innerText = "100%";
            highScoreEl.innerText = "";
        } else {
            titleEl.innerText = "CRASHED";
            titleEl.className = "text-5xl md:text-7xl font-black text-neon-pink mb-4";
            
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: player.screenX + cameraX + player.size / 2, // Spawns in WORLD coords
                    y: player.y + player.size / 2,
                    vx: (Math.random() - 0.5) * 800,
                    vy: (Math.random() - 0.5) * 800,
                    life: 1.0,
                    color: Math.random() > 0.5 ? COLOR_PLAYER : '#ffffff',
                    size: Math.random() * 8 + 4
                });
            }

            if (gameMode === 'ENDLESS') {
                endScoreLabel.classList.remove('hidden');
                endHighLabel.classList.remove('hidden');
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('neondash_highscore', highScore);
                    document.getElementById('high-score-hud').innerText = highScore;
                }
                finalScoreEl.innerText = Math.floor(score);
                highScoreEl.innerText = Math.floor(highScore);
            } else {
                endScoreLabel.classList.remove('hidden');
                endHighLabel.classList.add('hidden');
                endScoreLabel.innerText = "PROGRESS";
                let percent = Math.min(99, Math.floor((cameraX / levelEndX) * 100));
                finalScoreEl.innerText = isNaN(percent) ? "0%" : percent + "%";
                highScoreEl.innerText = "";
            }
        }
        
        setTimeout(() => showMenu('game-over'), won ? 0 : 500);
    }

    /**
     * Endless Generation
     */
    let nextSpawnDistance = 0;
    const obstaclePatterns = [
        (x) => {
            const count = Math.floor(Math.random() * 4) + 1;
            for(let i=0; i<count; i++) obstacles.push({ type: 'spike', x: x + (i*GRID_SIZE), y: FLOOR_Y - GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, passed: false });
            return count * GRID_SIZE;
        },
        (x) => {
            obstacles.push({ type: 'block', x: x, y: FLOOR_Y - 90, width: 250, height: 20, passed: false });
            for(let i=1; i<=4; i++) obstacles.push({ type: 'spike', x: x + (i*GRID_SIZE), y: FLOOR_Y - GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, passed: false });
            return 250;
        },
        (x) => {
            obstacles.push({ type: 'block', x: x, y: FLOOR_Y - 40, width: 80, height: 40, passed: false });
            obstacles.push({ type: 'block', x: x + 80, y: FLOOR_Y - 80, width: 80, height: 80, passed: false });
            obstacles.push({ type: 'block', x: x + 160, y: FLOOR_Y - 120, width: 80, height: 120, passed: false });
            return 240;
        },
        (x) => {
            obstacles.push({ type: 'block', x: x, y: FLOOR_Y - 20, width: 250, height: 20, passed: false }); 
            obstacles.push({ type: 'bouncepad', x: x + 100, y: FLOOR_Y - 30, width: 40, height: 10, passed: false });
            obstacles.push({ type: 'spike', x: x + 400, y: FLOOR_Y - GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, passed: false }); 
            return 440;
        },
        (x) => {
            obstacles.push({ type: 'sawblade', x: x, y: FLOOR_Y - GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, passed: false });
            obstacles.push({ type: 'sawblade', x: x + 80, y: FLOOR_Y - GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, passed: false });
            return 120;
        },
        (x) => {
            obstacles.push({ type: 'block', x: x, y: FLOOR_Y - 40, width: 80, height: 40, passed: false });
            obstacles.push({ type: 'orb', x: x + 200, y: FLOOR_Y - 120, width: 40, height: 40, passed: false });
            obstacles.push({ type: 'block', x: x + 400, y: FLOOR_Y - 40, width: 80, height: 40, passed: false });
            return 480;
        },
        (x) => {
            obstacles.push({ type: 'halfblock', x: x, y: FLOOR_Y - 80, width: 80, height: 20, passed: false });
            obstacles.push({ type: 'sawblade', x: x + 120, y: FLOOR_Y - GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, passed: false });
            obstacles.push({ type: 'halfblock', x: x + 200, y: FLOOR_Y - 80, width: 80, height: 20, passed: false });
            return 280;
        },
        (x) => {
            obstacles.push({ type: 'bouncepad', x: x, y: FLOOR_Y - 10, width: 40, height: 10, passed: false });
            obstacles.push({ type: 'block', x: x + 300, y: FLOOR_Y - 200, width: 120, height: 40, passed: false });
            obstacles.push({ type: 'spike', x: x + 340, y: FLOOR_Y - 240, width: 40, height: 40, passed: false });
            return 420;
        },
        (x) => {
            obstacles.push({ type: 'block', x: x, y: FLOOR_Y - 40, width: 80, height: 40, passed: false });
            obstacles.push({ type: 'orb', x: x + 180, y: FLOOR_Y - 120, width: 40, height: 40, passed: false });
            obstacles.push({ type: 'orb', x: x + 360, y: FLOOR_Y - 160, width: 40, height: 40, passed: false });
            obstacles.push({ type: 'block', x: x + 540, y: FLOOR_Y - 40, width: 120, height: 40, passed: false });
            return 660;
        }
    ];

    function spawnEndlessObstacles() {
        let startX = cameraX + GAME_WIDTH;
        let totalWidth = 0;
        let currentX = startX;
        
        let maxChains = currentSpeed < BASE_SPEED + 200 ? 2 : 3;
        let chainCount = Math.floor(Math.random() * maxChains) + 1;

        for (let i = 0; i < chainCount; i++) {
            const patternIndex = Math.floor(Math.random() * obstaclePatterns.length);
            const pWidth = obstaclePatterns[patternIndex](currentX);
            const chainGap = 300 + (currentSpeed * 0.15); 
            currentX += pWidth + chainGap;
            totalWidth += pWidth + chainGap;
        }
        
        const minGap = 350 + (currentSpeed * 0.3); 
        const maxGap = minGap + 400;
        nextSpawnDistance = cameraX + totalWidth + Math.random() * (maxGap - minGap);
    }

    function handleEditorClick(ex, ey) {
        if(state !== 'EDITOR') return;
        if(ey < 140) return; 

        const worldX = Math.floor((ex + cameraX) / GRID_SIZE) * GRID_SIZE;
        let snapY = Math.floor(ey / GRID_SIZE) * GRID_SIZE;
        
        // Define sizes and offsets
        let objH = GRID_SIZE;
        let yOffset = 0;
        if (editorTool === 'halfblock') { objH = 20; yOffset = 20; }
        if (editorTool === 'bouncepad') { objH = 10; yOffset = 30; }
        
        let worldY = snapY + yOffset;
        if (worldY + objH > FLOOR_Y) {
            worldY = FLOOR_Y - objH;
        }

        if (editorTool === 'erase') {
            const eraseBox = { x: worldX, y: snapY, w: GRID_SIZE, h: GRID_SIZE };
            for(let i=obstacles.length-1; i>=0; i--) {
                let obs = obstacles[i];
                if(eraseBox.x < obs.x + obs.width && eraseBox.x + eraseBox.w > obs.x &&
                   eraseBox.y < obs.y + obs.height && eraseBox.y + eraseBox.h > obs.y) {
                    obstacles.splice(i, 1);
                }
            }
        } else {
            let occupied = false;
            for(let obs of obstacles) {
                if(obs.x === worldX && obs.y === worldY) {
                    occupied = true; break;
                }
            }
            
            if(!occupied) {
                obstacles.push({
                    type: editorTool,
                    x: worldX,
                    y: worldY,
                    width: GRID_SIZE,
                    height: objH,
                    passed: false
                });
            }
        }
    }

    /**
     * Input Handling
     */
    function jump() {
        if (state !== 'PLAYING') return;

        let pWorldX = player.screenX + cameraX;
        let pRect = { x: pWorldX, y: player.y, w: player.size, h: player.size };
        let hitOrb = false;

        // Check for Orb Trigger
        for (let obs of obstacles) {
            if (obs.type === 'orb') {
                let oRect = { x: obs.x, y: obs.y, w: obs.width, h: obs.height };
                if (pRect.x < oRect.x + oRect.w && pRect.x + pRect.w > oRect.x &&
                    pRect.y < oRect.y + oRect.h && pRect.h + pRect.y > oRect.y) {
                    
                    player.vy = JUMP_VELOCITY;
                    player.isGrounded = false;
                    player.coyoteTimer = 0;
                    hitOrb = true;
                    
                    // Consume orb effect (particles)
                    for(let k=0; k<15; k++) {
                        particles.push({
                            x: obs.x + obs.width/2, // World coords
                            y: obs.y + obs.height/2,
                            vx: (Math.random()-0.5)*400,
                            vy: (Math.random()-0.5)*400,
                            life: 1.0, color: '#e879f9', size: 4
                        });
                    }
                    break;
                }
            }
        }

        if (!hitOrb && (player.isGrounded || player.coyoteTimer > 0)) {
            player.vy = JUMP_VELOCITY;
            player.isGrounded = false;
            player.coyoteTimer = 0;
        }
    }

    canvas.addEventListener('mousedown', (e) => {

            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            handleEditorClick((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
        } else if(state === 'PLAYING') {
            jump();
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if(state === 'EDITOR') {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            editorMouseX = (e.clientX - rect.left) * scaleX;
            editorMouseY = (e.clientY - rect.top) * scaleY;
        }
    });

    canvas.addEventListener('touchstart', (e) => {
        if(e.target.tagName.toLowerCase() === 'button' || e.target.tagName.toLowerCase() === 'input') return;
        
        if(state === 'EDITOR' && e.touches.length > 0) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            handleEditorClick((e.touches[0].clientX - rect.left) * scaleX, (e.touches[0].clientY - rect.top) * scaleY);
        } else if(state === 'PLAYING') {
            e.preventDefault();
            jump();
        }
    }, {passive: false});

        if (state === 'EDITOR') {

        }

    /**
     * Game Loop & Rendering
     */
    function update(dt) {
        if (state === 'MAIN_MENU' || state === 'LEVEL_SELECT') {
            cameraX += (BASE_SPEED * 0.3) * dt; // Nice scrolling background in menus
            return;
        }

        if (state === 'EDITOR') {
            if (isPanningLeft) cameraX -= EDITOR_PAN_SPEED * dt;
            if (isPanningRight) cameraX += EDITOR_PAN_SPEED * dt;
            if (cameraX < 0) cameraX = 0;
            document.getElementById('cam-pos').innerText = Math.floor(cameraX);
            return;
        }

        if (state !== 'PLAYING') return;

        cameraX += currentSpeed * dt;

        player.lastY = player.y;
        player.vy += GRAVITY * dt;
        player.y += player.vy * dt;

        if (player.y + player.size >= FLOOR_Y) {
            player.y = FLOOR_Y - player.size;
            player.vy = 0;
            player.isGrounded = true;
            player.coyoteTimer = 0.15;
            let targetRot = Math.round(player.rotation / (Math.PI / 2)) * (Math.PI / 2);
            player.rotation = targetRot;
        } else {
            player.isGrounded = false;
            player.coyoteTimer -= dt;
            player.rotation += 4.5 * dt;
        }

        player.trail.push({ x: player.screenX + cameraX, y: player.y, rotation: player.rotation });
        if (player.trail.length > 10) player.trail.shift();

        if (gameMode === 'ENDLESS') {
            currentSpeed = Math.min(MAX_SPEED, BASE_SPEED + (score * SPEED_INCREMENT));
            if (cameraX > nextSpawnDistance) spawnEndlessObstacles();
        } else if (gameMode === 'LEVEL') {
            let percent = Math.min(100, Math.floor((cameraX / levelEndX) * 100));
            document.getElementById('current-score').innerText = percent + "%";
            if (cameraX + player.screenX > levelEndX) {
                triggerGameOver(true);
                return;
            }
        }

        let pWorldX = player.screenX + cameraX;
        let pRect = { x: pWorldX, y: player.y, w: player.size, h: player.size };

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            if (obs.x > pWorldX + GAME_WIDTH) continue;
            
            let oRect = {};

            if (obs.type === 'spike') {
                const hitWidth = obs.width * 0.4;
                const hitHeight = obs.height * 0.6;
                oRect = {
                    x: obs.x + (obs.width / 2) - (hitWidth / 2),
                    y: obs.y + (obs.height - hitHeight),
                    w: hitWidth,
                    h: hitHeight
                };
                
                if (pRect.x < oRect.x + oRect.w && pRect.x + pRect.w > oRect.x &&
                    pRect.y < oRect.y + oRect.h && pRect.h + pRect.y > oRect.y) {
                    triggerGameOver();
                }
            } else if (obs.type === 'block' || obs.type === 'halfblock') {
                oRect = { x: obs.x, y: obs.y, w: obs.width, h: obs.height };
                
                if (pRect.x < oRect.x + oRect.w && pRect.x + pRect.w > oRect.x &&
                    pRect.y < oRect.y + oRect.h && pRect.h + pRect.y > oRect.y) {
                    
                    const wasAbove = player.lastY + player.size <= obs.y + 20; 
                    
                    if (wasAbove && player.vy >= 0) {
                        player.y = obs.y - player.size;
                        player.vy = 0;
                        player.isGrounded = true;
                        player.coyoteTimer = 0.15;
                        let targetRot = Math.round(player.rotation / (Math.PI / 2)) * (Math.PI / 2);
                        player.rotation = targetRot;
                        pRect.y = player.y; 
                    } else {
                        triggerGameOver();
                    }
                }
            } else if (obs.type === 'bouncepad') {
                oRect = { x: obs.x, y: obs.y, w: obs.width, h: obs.height };
                if (pRect.x < oRect.x + oRect.w && pRect.x + pRect.w > oRect.x &&
                    pRect.y < oRect.y + oRect.h && pRect.h + pRect.y > oRect.y) {
                    player.vy = -1800;
                    player.isGrounded = false;
                    player.y = obs.y - player.size;
                    
                    for(let k=0; k<12; k++) {
                        particles.push({
                            x: obs.x + Math.random()*obs.width, // World coords
                            y: obs.y,
                            vx: (Math.random()-0.5)*300,
                            vy: -Math.random()*600,
                            life: 0.8, color: '#ccff00', size: 4
                        });
                    }
                }
            } else if (obs.type === 'sawblade') {
                const cx = obs.x + obs.width / 2;
                const cy = obs.y + obs.height / 2;
                const r = (obs.width / 2) * 0.8;
                const px = pRect.x + pRect.w / 2;
                const py = pRect.y + pRect.h / 2;
                const pr = (pRect.w / 2) * 0.8; 
                
                const dist = Math.sqrt(Math.pow(cx - px, 2) + Math.pow(cy - py, 2));
                if (dist < r + pr) {
                    triggerGameOver();
                }
            }

            if (gameMode === 'ENDLESS' && !obs.passed && obs.x + obs.width < pWorldX) {
                obs.passed = true;
                score += 1;
                document.getElementById('current-score').innerText = Math.floor(score);
            }

            if (obs.x + obs.width < cameraX - 100) {
                obstacles.splice(i, 1);
            }
        }
    }

    function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt * 1.5;
            p.vy += GRAVITY * 0.5 * dt;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        // Dynamic Gradient Background
        let grd = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
        grd.addColorStop(0, levelColors.bgTop);
        grd.addColorStop(1, levelColors.bgBot);
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // Editor / Menu Grid Lines
        ctx.strokeStyle = 'rgba(102, 252, 241, 0.05)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const gridOffset = cameraX % GRID_SIZE;
        for(let x = -gridOffset; x < GAME_WIDTH; x += GRID_SIZE) {
            ctx.moveTo(x, 0); ctx.lineTo(x, FLOOR_Y);
        }
        for(let y = 0; y <= FLOOR_Y; y += GRID_SIZE) {
            ctx.moveTo(0, y); ctx.lineTo(GAME_WIDTH, y);
        }
        ctx.stroke();

        // Floor
        ctx.fillStyle = levelColors.floor;
        ctx.fillRect(0, FLOOR_Y, GAME_WIDTH, GAME_HEIGHT - FLOOR_Y);
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = levelColors.outline;
        ctx.fillStyle = levelColors.outline;
        ctx.fillRect(0, FLOOR_Y, GAME_WIDTH, 4);
        ctx.shadowBlur = 0;

        // Render Obstacles
        for (let obs of obstacles) {
            let screenX = obs.x - cameraX;
            if (screenX + obs.width < -100 || screenX > GAME_WIDTH + 100) continue;

            if (obs.type === 'spike') {
                ctx.fillStyle = COLOR_SPIKE;
                ctx.shadowBlur = 10;
                ctx.shadowColor = COLOR_SPIKE;
                ctx.beginPath();
                ctx.moveTo(screenX, obs.y + obs.height);
                ctx.lineTo(screenX + obs.width / 2, obs.y);
                ctx.lineTo(screenX + obs.width, obs.y + obs.height);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(screenX + 10, obs.y + obs.height - 5);
                ctx.lineTo(screenX + obs.width / 2, obs.y + 15);
                ctx.lineTo(screenX + obs.width - 10, obs.y + obs.height - 5);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else if (obs.type === 'block' || obs.type === 'halfblock') {
                ctx.fillStyle = '#050a0f';
                ctx.fillRect(screenX, obs.y, obs.width, obs.height);
                ctx.strokeStyle = levelColors.outline;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = levelColors.outline;
                ctx.strokeRect(screenX, obs.y, obs.width, obs.height);
                ctx.shadowBlur = 0;
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for(let i = 15; i < obs.width; i += 20) {
                    ctx.moveTo(screenX + i, obs.y); ctx.lineTo(screenX + i, obs.y + obs.height);
                }
                for(let i = 15; i < obs.height; i += 20) {
                    ctx.moveTo(screenX, obs.y + i); ctx.lineTo(screenX + obs.width, obs.y + i);
                }
                ctx.stroke();
            } else if (obs.type === 'bouncepad') {
                ctx.fillStyle = '#ccff00';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ccff00';
                ctx.beginPath();
                ctx.roundRect(screenX, obs.y, obs.width, obs.height, [5, 5, 0, 0]);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else if (obs.type === 'sawblade') {
                ctx.save();
                ctx.translate(screenX + obs.width/2, obs.y + obs.height/2);
                ctx.rotate(cameraX * 0.01);
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.arc(0, 0, obs.width/2 * 0.7, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ff003c';
                for(let i=0; i<8; i++) {
                    ctx.rotate(Math.PI / 4);
                    ctx.beginPath();
                    ctx.moveTo(-5, -obs.width/2 * 0.6);
                    ctx.lineTo(5, -obs.width/2 * 0.6);
                    ctx.lineTo(0, -obs.width/2);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            } else if (obs.type === 'orb') {
                ctx.save();
                ctx.translate(screenX + obs.width/2, obs.y + obs.height/2);
                const pulse = 1 + Math.sin(Date.now() * 0.005) * 0.1;
                ctx.scale(pulse, pulse);
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#e879f9';
                ctx.strokeStyle = '#e879f9';
                ctx.lineWidth = 4;
                
                ctx.beginPath();
                ctx.arc(0, 0, obs.width/2 * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(232, 121, 249, 0.5)';
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(0, 0, obs.width/2 * 0.2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Editor Preview
        if (state === 'EDITOR') {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(200 - cameraX, 0, 2, FLOOR_Y);
            
            ctx.fillStyle = 'rgba(0, 243, 255, 0.3)';
            ctx.fillRect(200 - cameraX, FLOOR_Y - player.size, player.size, player.size);

            if (editorMouseY > 140) {
                let snapX = Math.floor((editorMouseX + cameraX) / GRID_SIZE) * GRID_SIZE;
                let snapY = Math.floor(editorMouseY / GRID_SIZE) * GRID_SIZE;
                
                let objH = GRID_SIZE; let yOffset = 0;
                if (editorTool === 'halfblock') { objH = 20; yOffset = 20; }
                if (editorTool === 'bouncepad') { objH = 10; yOffset = 30; }
                
                let drawY = snapY + yOffset;
                if (drawY + objH > FLOOR_Y) drawY = FLOOR_Y - objH;
                
                ctx.strokeStyle = editorTool === 'erase' ? 'rgba(255,0,60,0.8)' : 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                
                if (editorTool === 'spike') {
                    ctx.beginPath();
                    ctx.moveTo(snapX - cameraX, drawY + objH);
                    ctx.lineTo(snapX - cameraX + GRID_SIZE / 2, drawY);
                    ctx.lineTo(snapX - cameraX + GRID_SIZE, drawY + objH);
                    ctx.closePath();
                    ctx.stroke();
                } else if(editorTool !== 'erase') {
                    if (editorTool === 'sawblade' || editorTool === 'orb') {
                         ctx.beginPath();
                         ctx.arc(snapX - cameraX + GRID_SIZE/2, drawY + GRID_SIZE/2, GRID_SIZE/2, 0, Math.PI * 2);
                         ctx.stroke();
                    } else {
                        ctx.strokeRect(snapX - cameraX, drawY, GRID_SIZE, objH);
                    }
                } else {
                    ctx.strokeRect(snapX - cameraX, snapY, GRID_SIZE, GRID_SIZE); 
                }
                ctx.setLineDash([]);
            }
        }

        // Player Rendering
        if (state === 'PLAYING') {
            for (let i = 0; i < player.trail.length; i++) {
                let t = player.trail[i];
                let screenX = t.x - cameraX;
                ctx.save();
                ctx.translate(screenX + player.size / 2, t.y + player.size / 2);
                ctx.rotate(t.rotation);
                const alpha = (i / player.trail.length) * 0.3;
                ctx.fillStyle = `rgba(0, 243, 255, ${alpha})`;
                ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);
                ctx.restore();
            }

            ctx.save();
            ctx.translate(player.screenX + player.size / 2, player.y + player.size / 2);
            ctx.rotate(player.rotation);
            ctx.shadowBlur = 20;
            ctx.shadowColor = COLOR_PLAYER;
            ctx.fillStyle = COLOR_PLAYER;
            ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);
            ctx.fillStyle = levelColors.bgTop; 
            ctx.shadowBlur = 0;
            ctx.fillRect(-player.size / 2 + 8, -player.size / 2 + 8, player.size - 16, player.size - 16);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-player.size / 2 + 12, -player.size / 2 + 12, player.size - 24, player.size - 24);
            ctx.restore();
        }

        // Fix: Render Particles in World Coordinates (subtract cameraX)
        if (particles.length > 0) {
            for (let p of particles) {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillRect(p.x - cameraX, p.y, p.size, p.size); // Subtracted cameraX here!
            }
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
    }

    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; 
        lastTime = timestamp;

        update(dt);
        if (state === 'GAMEOVER') updateParticles(dt);
        draw();

        animationId = requestAnimationFrame(gameLoop);
    }

    draw();

</script>
</body>
</html>
