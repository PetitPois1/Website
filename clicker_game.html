<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Industrial Clicker: Evolution</title>
    <style>
        :root {
            --dynamic-accent: #66cc66; 
            --bg-dark: #0f1710;
            --panel-bg: #050505; 
            --border: rgba(255,255,255,0.08);
            --save-color: #44aaff;
            --quantum: #b300ff;
            --gold: #ffd700;
            --admin: #ff3333;
            --card-bg: rgba(255, 255, 255, 0.04);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            background-color: var(--bg-dark);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            overflow-x: hidden;
            transition: background-color 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
        }

        .fixed-top {
            position: sticky;
            top: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .ticker-wrap { 
            width: 100%; 
            background: rgba(0,0,0,0.4); 
            overflow: hidden; 
            white-space: nowrap; 
            padding: 6px 0; 
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        
        .ticker { 
            display: inline-block; 
            padding-left: 100%; 
            animation: ticker 30s linear infinite; 
            color: var(--dynamic-accent); 
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .header { text-align: center; padding: 15px; width: 100%; }

        .credit-box {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid var(--dynamic-accent);
            border-radius: 16px;
            padding: 12px 30px;
            display: inline-block;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .credit-display { font-size: 2.2rem; font-weight: 900; color: #fff; margin: 0; font-variant-numeric: tabular-nums; }
        .currency-label { font-size: 0.7rem; color: var(--dynamic-accent); letter-spacing: 3px; display: block; opacity: 0.8; }
        .production-display { color: #888; font-size: 0.85rem; margin-top: 8px; font-weight: 500; }
        .production-display span { color: var(--dynamic-accent); }

        .main-content { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ccc; 
            padding: 8px 16px; cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 0.75rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--dynamic-accent); color: white; }

        .buy-modes { display: flex; gap: 8px; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 10px; }
        .mode-btn { background: transparent; border: none; color: #666; padding: 8px 16px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .mode-btn.active { background: var(--dynamic-accent); color: #000; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

        .click-area { 
            height: 220px; display: flex; justify-content: center; align-items: center; 
            margin-bottom: 30px; position: relative; width: 100%; touch-action: manipulation; 
        }

        #circle { 
            width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; 
            font-weight: 900; cursor: pointer; user-select: none; transition: transform 0.05s, box-shadow 0.3s; 
            text-align: center; padding: 15px; z-index: 5; color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #circle:active { transform: scale(0.92); }

        .floating-text { 
            position: fixed; 
            pointer-events: none; 
            color: var(--dynamic-accent); 
            font-weight: 800; 
            animation: floatUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
            z-index: 2000; 
            font-size: 1.3rem; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.2); } }

        /* Tiers Styling */
        .tier-0 { border-radius: 50%; background: #4a4238; border: 8px solid #2d2822; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .tier-1 { border-radius: 50%; background: #cd7f32; border: 6px solid #8b4513; box-shadow: 0 0 25px rgba(205,127,50,0.3); }
        .tier-2 { border-radius: 25%; background: #9e9e9e; border: 6px solid #616161; }
        .tier-3 { border-radius: 12px; background: #4682b4; border: 6px solid #2c5272; }
        .tier-4 { border-radius: 0; background: #e0e0e0; border: 6px solid var(--gold); }
        .tier-5 { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); background: #1e90ff; }
        .tier-6 { border-radius: 50%; background: #ff4444; border: 4px double white; }
        .tier-7 { border-radius: 15px; background: #00ffff; box-shadow: 0 0 15px #00ffff; }
        .tier-9 { border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%; background: var(--quantum); animation: pulse 2s infinite ease-in-out; }
        .tier-10 { clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); background: white; color: black !important; }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 15px var(--quantum); } 50% { transform: scale(1.08); box-shadow: 0 0 40px var(--quantum); } 100% { transform: scale(1); box-shadow: 0 0 15px var(--quantum); } }

        .shop { width: 100%; padding-bottom: 80px; }
        .section-title { color: var(--dynamic-accent); border-bottom: 1px solid var(--border); margin: 30px 0 15px; padding-bottom: 8px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }
        
        .upgrade-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; 
            padding: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; 
            transition: transform 0.2s, background 0.2s;
        }
        .upgrade-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); }

        .buy-btn { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--dynamic-accent); 
            padding: 10px; border-radius: 8px; cursor: pointer; min-width: 110px; 
            font-weight: bold; font-size: 0.75rem; text-align: center; line-height: 1.4;
            transition: all 0.2s;
        }
        .buy-btn:not(.disabled):hover { background: var(--dynamic-accent); color: #000; transform: translateY(-2px); }
        .buy-btn.disabled { opacity: 0.15; cursor: not-allowed; border-color: #444; color: #888; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,10,5,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; padding: 25px; overflow-y: auto; }
        .ach-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; opacity: 0.3; transition: 0.5s; }
        .ach-card.unlocked { opacity: 1; border-color: var(--gold); background: rgba(255, 215, 0, 0.05); box-shadow: 0 4px 15px rgba(255,215,0,0.1); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--save-color); color: white; padding: 14px 28px; border-radius: 12px; font-weight: bold; opacity: 0; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 3000; pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

    <div id="toast">Saved</div>

    <div class="fixed-top">
        <div class="ticker-wrap"><div class="ticker" id="ticker-text">Initializing Industrial Simulation...</div></div>
        <div class="header">
            <div class="credit-box" id="credit-container">
                <div class="credit-display" id="creditCount">0</div>
                <span class="currency-label">CREDITS</span>
            </div>
            <div class="production-display">AUTOMATED: <span id="cpsCount">0</span>/SEC</div>
        </div>
    </div>

    <div class="main-content">
        <div class="nav-bar">
            <button class="nav-btn" onclick="openRecords()">RECORDS</button>
            <button class="nav-btn" onclick="saveGame(true)" style="color: var(--save-color); border-color: var(--save-color);">SAVE</button>
            <button id="admin-nav-btn" class="nav-btn" onclick="toggleOverlay('admin-overlay')" style="display:none; color:var(--admin); border-color:var(--admin);">DEBUG</button>
        </div>

        <div class="buy-modes">
            <button id="mode-1" class="mode-btn active" onclick="setBuyMode(1)">x1</button>
            <button id="mode-10" class="mode-btn" onclick="setBuyMode(10)">x10</button>
            <button id="mode-max" class="mode-btn" onclick="setBuyMode('max')">MAX</button>
        </div>

        <div class="click-area" id="click-parent">
            <div id="circle" class="tier-0">STONE</div>
        </div>

        <div class="shop">
            <h2 class="section-title">Evolution Pathway</h2>
            <div id="tier-container"></div>
            <h2 class="section-title">Industrial Infrastructure</h2>
            <div id="machine-container"></div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay">
        <button class="nav-btn" style="width:100%; padding: 15px; margin-bottom: 20px;" onclick="toggleOverlay('settings-overlay')">RETURN TO PRODUCTION</button>
        <h2 class="section-title">Milestones</h2>
        <div id="ach-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; width:100%;"></div>
        
        <h2 class="section-title">Management</h2>
        <div style="display: flex; gap: 10px; width: 100%;">
            <input type="text" id="promo-code" style="padding:12px; background:#000; color:white; border:1px solid var(--border); border-radius: 8px; flex-grow: 1;" placeholder="ENTER CODE">
            <button class="nav-btn" onclick="redeemCode()" style="border-color: var(--dynamic-accent)">REDEEM</button>
        </div>
        
        <button class="nav-btn" onclick="resetGame()" style="border-color:#ff5555; color:#ff5555; margin-top:40px; width: 100%; background: rgba(255,0,0,0.05)">TERMINATE ALL DATA</button>
    </div>

    <div id="admin-overlay" class="overlay">
        <button class="nav-btn" onclick="toggleOverlay('admin-overlay')">EXIT CONSOLE</button>
        <h2 class="section-title" style="color:var(--admin)">Cheat Console</h2>
        <div style="display:grid; grid-template-columns: 1fr; gap:10px; width: 100%;">
            <button class="nav-btn" onclick="credits *= 100; updateUI();">x100 Credits</button>
            <button class="nav-btn" onclick="credits += 1e15; updateUI();">Add 1 Quadrillion</button>
            <button class="nav-btn" onclick="currentTier = Math.min(currentTier + 1, tierUpgrades.length); applyTierVisuals(); updateUI();">Instant Evolve</button>
            <button class="nav-btn" onclick="unlockedAchievements = achievements.map(a => a.id); notify('All achievements unlocked'); updateUI();">Unlock All Achievements</button>
        </div>
    </div>

    <script>
        let credits = 0, totalEarned = 0, totalClicks = 0, currentTier = 0;
        let adminUnlocked = false, unlockedAchievements = [], buyMode = 1, usedCodes = [];
        const growthRate = 1.13; 
        let fractionalCredits = 0;

        window.currentCps = 0;
        window.currentClickValue = 1;

        function f(n) {
            if (n === undefined || isNaN(n) || n === null || n < 0) return "0";
            if (n < 1000) return Math.floor(n).toLocaleString();
            const units = ["k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd"];
            const unitIndex = Math.floor((Math.log10(n) / 3));
            const num = (n / Math.pow(10, unitIndex * 3)).toFixed(2);
            return num + (units[unitIndex - 1] || "e" + (unitIndex * 3));
        }

        const eraBackgrounds = ["#0f1710", "#1e140d", "#1a1a1a", "#121a24", "#252525", "#0a1525", "#1a0510", "#051a1a", "#000000", "#110022", "#000"];
        const eraAccents = ["#66cc66", "#cd7f32", "#9e9e9e", "#4682b4", "#ffd700", "#1e90ff", "#ff4444", "#00ffff", "#b300ff", "#ff00ff", "#ffffff"];
        
        const tickerData = {
            start: ["Local entrepreneur hits rock with rocks.", "Scientists wonder if 'wheel' is a fad."],
            bronze: ["Copper found! Shiny rocks are the new meta.", "Blacksmith accidentally invents the spoon."],
            iron: ["Iron tools now 30% pointier.", "Rock Pickers considered endangered species."],
            steel: ["Bridges are now 80% less likely to collapse.", "Steel beams don't melt, but profit does."],
            factory: ["Smog is the new 'clean air'.", "Steam engines outperforming horses 10 to 1."],
            digital: ["The internet: mostly just cat pictures.", "CEO is now 40% silicon."],
            atomic: ["Nuclear energy: Glowing in the dark is a feature.", "Fusion is still 20 years away."],
            plasma: ["Neon lights are now mandatory for all citizens.", "Plasma cutters making butter knives obsolete."],
            quantum: ["Reality successfully hacked.", "CEO exists in all offices simultaneously."],
            singularity: ["Time is just a suggestion now.", "The universe is being compressed into a zip file."]
        };

        const tierUpgrades = [
            { id: 't1', name: "Bronze Tools", cost: 300, clickValue: 10, label: "BRONZE", class: "tier-1" },
            { id: 't2', name: "Iron Workings", cost: 5000, clickValue: 80, label: "IRON", class: "tier-2" },
            { id: 't3', name: "Steel Forging", cost: 75000, clickValue: 600, label: "STEEL", class: "tier-3" },
            { id: 't4', name: "Steam Power", cost: 500000, clickValue: 3500, label: "FACTORY", class: "tier-4" },
            { id: 't5', name: "Digital Logic", cost: 10000000, clickValue: 25000, label: "DIGITAL", class: "tier-5" },
            { id: 't6', name: "Industrial Overdrive", cost: 500000000, clickValue: 150000, label: "ATOMIC", class: "tier-6" },
            { id: 't7', name: "Plasma Fusion", cost: 5000000000, clickValue: 1200000, label: "PLASMA", class: "tier-7" },
            { id: 't8', name: "Quantum Core", cost: 1e11, clickValue: 5e7, label: "QUANTUM", class: "tier-9" },
            { id: 't9', name: "Dimensional Rift", cost: 1e14, clickValue: 2e9, label: "RIFT", class: "tier-9" },
            { id: 't10', name: "The Singularity", cost: 1e17, clickValue: 1e12, label: "VOID", class: "tier-10" }
        ];

        const machineUpgrades = {
            picker: { name: "Rock Picker", addAuto: 1, baseCost: 15 },
            smith: { name: "Blacksmith", addAuto: 8, baseCost: 150 },
            mill: { name: "Water Wheel", addAuto: 45, baseCost: 1200 },
            engine: { name: "Steam Engine", addAuto: 250, baseCost: 15000 },
            generator: { name: "Electric Generator", addAuto: 1200, baseCost: 140000 },
            plant: { name: "Power Plant", addAuto: 6500, baseCost: 950000 },
            server: { name: "Data Centre", addAuto: 35000, baseCost: 7500000 },
            cloud: { name: "Cloud Computer", addAuto: 180000, baseCost: 45000000 },
            ai: { name: "AI Assistant", addAuto: 950000, baseCost: 350000000 },
            quantum: { name: "Quantum Rig", addAuto: 6000000, baseCost: 5000000000 },
            swarm: { name: "Dyson Swarm", addAuto: 45000000, baseCost: 80000000000 },
            moon: { name: "Moon Branch", addAuto: 2500000000, baseCost: 1e13 },
            void: { name: "Void Well", addAuto: 1000000000000, baseCost: 5e16 }
        };

        const achievements = [
            { id: 'a1', name: "Beginner", desc: "1st Click", icon: "🔨", check: () => totalClicks >= 1 },
            { id: 'a2', name: "Grinder", desc: "100 Clicks", icon: "🖱️", check: () => totalClicks >= 100 },
            { id: 'a3', name: "Millionaire", desc: "1M Earned", icon: "💰", check: () => totalEarned >= 1000000 },
            { id: 'a4', name: "Billionaire", desc: "1B Earned", icon: "💎", check: () => totalEarned >= 1000000000 },
            // Building Unlock Achievements
            { id: 'up1', name: "Manual Labor", desc: "Buy a Rock Picker", icon: "🪨", check: () => inventory.picker > 0 },
            { id: 'up2', name: "Hot Metal", desc: "Buy a Blacksmith", icon: "🔥", check: () => inventory.smith > 0 },
            { id: 'up3', name: "Hydraulic", desc: "Buy a Water Wheel", icon: "🌊", check: () => inventory.mill > 0 },
            { id: 'up4', name: "Full Steam", desc: "Buy a Steam Engine", icon: "🚂", check: () => inventory.engine > 0 },
            { id: 'up5', name: "Shocking", desc: "Buy an Electric Generator", icon: "⚡", check: () => inventory.generator > 0 },
            { id: 'up6', name: "Industrialist", desc: "Buy a Power Plant", icon: "🏭", check: () => inventory.plant > 0 },
            { id: 'up7', name: "IT Crowd", desc: "Buy a Data Centre", icon: "🖥️", check: () => inventory.server > 0 },
            { id: 'up8', name: "Up There", desc: "Buy a Cloud Computer", icon: "☁️", check: () => inventory.cloud > 0 },
            { id: 'up9', name: "Robot Master", desc: "Buy an AI Assistant", icon: "🤖", check: () => inventory.ai > 0 },
            { id: 'up10', name: "Sub-Atomic", desc: "Buy a Quantum Rig", icon: "⚛️", check: () => inventory.quantum > 0 },
            { id: 'up11', name: "Solar King", desc: "Buy a Dyson Swarm", icon: "☀️", check: () => inventory.swarm > 0 },
            { id: 'up12', name: "Colonizer", desc: "Buy a Moon Branch", icon: "🌙", check: () => inventory.moon > 0 },
            { id: 'up13', name: "The Abyss", desc: "Buy a Void Well", icon: "🕳️", check: () => inventory.void > 0 }
        ];

        let inventory = {};
        Object.keys(machineUpgrades).forEach(id => inventory[id] = 0);

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function openRecords() {
            const container = document.getElementById('ach-container');
            container.innerHTML = '';
            achievements.forEach(ach => {
                const isUnlocked = unlockedAchievements.includes(ach.id);
                container.innerHTML += `
                    <div class="ach-card ${isUnlocked ? 'unlocked' : ''}">
                        <div style="font-size:1.5rem">${ach.icon}</div>
                        <div style="font-weight:bold; font-size:0.8rem">${ach.name}</div>
                        <div style="font-size:0.6rem; color: #888">${ach.desc}</div>
                    </div>
                `;
            });
            toggleOverlay('settings-overlay');
        }

        function updateUI() {
            document.getElementById('creditCount').innerText = f(credits);
            
            let totalCps = 0;
            Object.keys(machineUpgrades).forEach(id => {
                totalCps += machineUpgrades[id].addAuto * (inventory[id] || 0);
            });
            document.getElementById('cpsCount').innerText = f(totalCps);
            window.currentCps = totalCps;

            let clickVal = (currentTier > 0) ? tierUpgrades[currentTier - 1].clickValue : 1;
            window.currentClickValue = clickVal;

            Object.keys(machineUpgrades).forEach(id => {
                const buyData = getCostOfMany(id, buyMode);
                const btn = document.getElementById(`btn-${id}`);
                const info = document.getElementById(`info-${id}`);
                
                if (btn) {
                    btn.innerHTML = `BUY ${buyData.count}<br>${f(buyData.cost)}`;
                    btn.classList.toggle("disabled", credits < buyData.cost || buyData.count <= 0);
                }
                if (info) {
                    info.innerHTML = `+${f(machineUpgrades[id].addAuto)}/s | Fleet: ${inventory[id]}`;
                }
            });

            const tBox = document.getElementById('tier-container');
            const next = tierUpgrades[currentTier];
            if (next) {
                tBox.innerHTML = `
                    <div class="upgrade-card">
                        <div>
                            <h3 style="margin:0;">${next.name}</h3>
                            <p style="font-size:0.7rem; margin:5px 0; color:#aaa;">Efficiency: ${f(next.clickValue)}/click</p>
                        </div>
                        <button class="buy-btn ${credits < next.cost ? 'disabled' : ''}" onclick="evolveTier()">
                            EVOLVE<br>${f(next.cost)}
                        </button>
                    </div>`;
            } else {
                tBox.innerHTML = `<p style="color:var(--quantum); text-align:center; font-weight:bold; width:100%">ULTIMATE EVOLUTION REACHED</p>`;
            }

            if(adminUnlocked) document.getElementById('admin-nav-btn').style.display = 'block';
            
            const accent = eraAccents[currentTier] || "#66cc66";
            document.documentElement.style.setProperty('--dynamic-accent', accent);
            document.body.style.backgroundColor = eraBackgrounds[currentTier] || "#000";
            
            checkAchievements();
        }

        function getCostOfMany(id, amount) {
            let n = inventory[id] || 0;
            let b = machineUpgrades[id].baseCost;
            let r = growthRate;
            let count = 0;
            let totalCost = 0;

            if (amount === 'max') {
                count = Math.floor(Math.log(((credits * (r - 1)) / (b * Math.pow(r, n))) + 1) / Math.log(r) + 1e-9);
                count = Math.max(0, count);
            } else {
                count = amount;
            }

            if (count > 0) {
                totalCost = b * (Math.pow(r, n) * (Math.pow(r, count) - 1)) / (r - 1);
            } else if (amount !== 'max') {
                totalCost = b * (Math.pow(r, n) * (Math.pow(r, amount) - 1)) / (r - 1);
                count = amount;
            }
            
            if (!isFinite(totalCost) || isNaN(totalCost)) totalCost = 1e60; 

            return { cost: totalCost, count: count };
        }

        function buyMachine(id) {
            const data = getCostOfMany(id, buyMode);
            if(credits >= data.cost && data.count > 0) { 
                credits -= data.cost; 
                inventory[id] += data.count; 
                updateUI(); 
            }
        }

        function evolveTier() {
            const next = tierUpgrades[currentTier];
            if(next && credits >= next.cost) { 
                credits -= next.cost; 
                currentTier++; 
                applyTierVisuals(); 
                updateUI(); 
                notify("ERA ADVANCED!");
                updateTicker(true);
            }
        }

        function applyTierVisuals() {
            const c = document.getElementById('circle');
            if(currentTier > 0) {
                const currentData = tierUpgrades[currentTier-1];
                c.className = currentData.class;
                c.innerText = currentData.label;
            } else {
                c.className = "tier-0";
                c.innerText = "STONE";
            }
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function setBuyMode(m) { 
            buyMode = m; 
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(typeof m === 'number' ? 'mode-'+m : 'mode-max').classList.add('active');
            updateUI(); 
        }

        function saveGame(manual = false) {
            const data = { credits, totalEarned, totalClicks, inventory, currentTier, unlockedAchievements, adminUnlocked, usedCodes };
            localStorage.setItem("IndusEvo_V2", JSON.stringify(data));
            if(manual) notify("System Progress Saved");
        }

        function loadGame() {
            const saved = localStorage.getItem("IndusEvo_V2");
            if(saved) {
                const data = JSON.parse(saved);
                credits = data.credits || 0; 
                totalEarned = data.totalEarned || 0; 
                totalClicks = data.totalClicks || 0;
                inventory = data.inventory || inventory; 
                currentTier = data.currentTier || 0;
                unlockedAchievements = data.unlockedAchievements || []; 
                adminUnlocked = data.adminUnlocked || false;
                usedCodes = data.usedCodes || [];
                applyTierVisuals();
            }
            updateUI();
            updateTicker(true);
        }

        function updateTicker(force = false) {
            const keys = ["start", "bronze", "iron", "steel", "factory", "digital", "atomic", "plasma", "quantum", "singularity"];
            const list = tickerData[keys[currentTier]] || tickerData.start;
            const tickerEl = document.getElementById('ticker-text');
            tickerEl.innerText = list[Math.floor(Math.random()*list.length)];
        }

        function checkAchievements() {
            achievements.forEach(ach => {
                if(!unlockedAchievements.includes(ach.id) && ach.check()) {
                    unlockedAchievements.push(ach.id);
                    notify(`MILESTONE: ${ach.name}`);
                }
            });
        }

        function redeemCode() {
            const input = document.getElementById('promo-code');
            const val = input.value.toUpperCase().trim();
            if(val === "FREEBIE" && !usedCodes.includes(val)) {
                credits += 5000; 
                usedCodes.push(val); 
                notify("+5,000 Credits!");
                input.value = "";
            } else if (val === "DEBUG" || val === "AA1") {
                adminUnlocked = true; 
                notify("Console Access Granted");
                input.value = "";
            } else {
                notify("Invalid or Expired Code");
            }
            updateUI();
        }

        function resetGame() { if(confirm("This will permanently erase all industrial progress. Proceed?")) { localStorage.clear(); location.reload(); } }

        document.getElementById('circle').addEventListener('click', (e) => {
            let multiplier = 1;
            let isCrit = false;
            if (Math.random() < 0.05) { 
                multiplier = 5;
                isCrit = true;
            }

            const gain = window.currentClickValue * multiplier;
            credits += gain; 
            totalEarned += gain; 
            totalClicks++;
            
            const container = document.getElementById('credit-container');
            container.style.transform = "scale(1.05)";
            setTimeout(() => container.style.transform = "scale(1)", 50);

            const text = document.createElement('div');
            text.className = 'floating-text';
            
            if(isCrit) {
                text.style.color = "var(--gold)";
                text.style.fontSize = "1.8rem";
                text.innerText = `CRIT! +${f(gain)}`;
            } else {
                text.innerText = `+${f(gain)}`;
            }
            
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            text.style.left = (x - 20) + 'px';
            text.style.top = (y - 20) + 'px';
            
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 700);
            
            document.getElementById('creditCount').innerText = f(credits);
            updateButtonAvailability();
        });

        function updateButtonAvailability() {
            Object.keys(machineUpgrades).forEach(id => {
                const buyData = getCostOfMany(id, buyMode);
                const btn = document.getElementById(`btn-${id}`);
                if(btn) btn.classList.toggle("disabled", credits < buyData.cost || buyData.count <= 0);
            });
        }

        const mBox = document.getElementById('machine-container');
        mBox.innerHTML = ""; 
        Object.keys(machineUpgrades).forEach(id => {
            mBox.innerHTML += `
                <div class="upgrade-card">
                    <div>
                        <h3 style="margin:0; font-size:0.9rem;">${machineUpgrades[id].name}</h3>
                        <p id="info-${id}" style="margin:5px 0; font-size:0.7rem; color:#888;"></p>
                    </div>
                    <button class="buy-btn" id="btn-${id}" onclick="buyMachine('${id}')"></button>
                </div>`;
        });

        setInterval(() => { 
            if(window.currentCps > 0) { 
                let gainPerTick = window.currentCps / 10;
                fractionalCredits += (gainPerTick % 1);
                
                let carry = Math.floor(fractionalCredits);
                credits += Math.floor(gainPerTick) + carry;
                totalEarned += Math.floor(gainPerTick) + carry;
                
                fractionalCredits %= 1;
                document.getElementById('creditCount').innerText = f(credits);
            } 
        }, 100);

        setInterval(updateButtonAvailability, 500);
        setInterval(updateTicker, 15000);
        setInterval(() => saveGame(false), 60000);
        
        loadGame();
    </script>
</body>
</html>
