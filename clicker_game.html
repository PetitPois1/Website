<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Industrial Clicker: Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dynamic-accent: #66cc66; 
            --bg-dark: #0a0a0b;
            --panel-bg: rgba(20, 20, 22, 0.95); 
            --border: rgba(255,255,255,0.1);
            --save-color: #44aaff;
            --quantum: #b300ff;
            --gold: #ffd700;
            --admin: #ff3333;
            --card-bg: rgba(255, 255, 255, 0.03);
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            background-color: var(--bg-dark);
            font-family: var(--font-main);
            color: #e0e0e0;
            overflow-x: hidden;
            transition: background-color 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
        }

        .fixed-top {
            position: sticky;
            top: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .ticker-wrap { 
            width: 100%; 
            background: rgba(0,0,0,0.6); 
            overflow: hidden; 
            padding: 8px 0; 
            border-bottom: 1px solid var(--border);
        }
        
        .ticker { 
            display: inline-block; 
            white-space: nowrap;
            padding-left: 100%;
            /* Faster speed for better engagement */
            animation: ticker-scrolling 10s linear infinite; 
            color: var(--dynamic-accent); 
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        
        @keyframes ticker-scrolling {
            0% { transform: translateX(0); }
            100% { transform: translateX(-200%); }
        }

        .header { text-align: center; padding: 20px 15px; width: 100%; }

        .credit-box {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid var(--dynamic-accent);
            border-radius: 12px;
            padding: 15px 40px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 10px rgba(var(--dynamic-accent), 0.1);
            transition: transform 0.1s;
        }

        .credit-display { font-size: 2.5rem; font-weight: 900; color: #fff; margin: 0; font-family: var(--font-mono); }
        .currency-label { font-size: 0.75rem; color: var(--dynamic-accent); letter-spacing: 4px; display: block; margin-top: 5px; opacity: 0.8; font-weight: 700; }
        .production-display { color: #888; font-size: 0.9rem; margin-top: 12px; font-weight: 500; font-family: var(--font-mono); }
        .production-display span { color: var(--dynamic-accent); }

        .main-content { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .nav-bar { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; }
        .nav-btn { 
            flex: 1;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ccc; 
            padding: 12px; cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 0.75rem;
            transition: all 0.2s; text-transform: uppercase;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--dynamic-accent); color: white; }

        .buy-modes { display: flex; gap: 8px; margin-bottom: 30px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; width: 100%; }
        .mode-btn { flex: 1; background: transparent; border: none; color: #666; padding: 10px; cursor: pointer; border-radius: 6px; font-weight: 800; transition: 0.2s; }
        .mode-btn.active { background: var(--dynamic-accent); color: #000; }

        .click-area { 
            height: 240px; display: flex; justify-content: center; align-items: center; 
            margin-bottom: 40px; position: relative; width: 100%; touch-action: manipulation; 
        }

        #circle { 
            width: 160px; height: 160px; display: flex; justify-content: center; align-items: center; 
            font-weight: 900; cursor: pointer; user-select: none; transition: transform 0.05s; 
            text-align: center; padding: 15px; z-index: 5; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        #circle:active { transform: scale(0.95); }

        .floating-text { 
            position: fixed; pointer-events: none; 
            color: var(--dynamic-accent); font-weight: 900; 
            animation: floatUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
            z-index: 2000; font-size: 1.4rem; font-family: var(--font-mono);
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        .tier-0 { border-radius: 50%; background: #4a4238; border: 8px solid #332d26; }
        .tier-1 { border-radius: 50%; background: #cd7f32; border: 6px solid #8b4513; }
        .tier-2 { border-radius: 15%; background: #9e9e9e; border: 6px solid #555; }
        .tier-3 { border-radius: 8px; background: #4682b4; border: 4px solid #fff; }
        .tier-4 { border-radius: 0; background: #333; border: 5px solid var(--gold); }
        .tier-9 { animation: pulse 2s infinite; border-radius: 40%; background: var(--quantum); }

        @keyframes pulse { 0% { box-shadow: 0 0 10px var(--quantum); } 50% { box-shadow: 0 0 30px var(--quantum); } 100% { box-shadow: 0 0 10px var(--quantum); } }

        .shop { width: 100%; padding-bottom: 100px; }
        .section-title { 
            color: var(--dynamic-accent); border-bottom: 1px solid var(--border); 
            margin: 40px 0 20px; padding-bottom: 10px; font-size: 0.8rem; 
            text-transform: uppercase; letter-spacing: 3px; font-weight: 900;
        }
        
        .upgrade-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; 
            padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; 
        }

        .buy-btn { 
            background: rgba(255,255,255,0.03); color: white; border: 1px solid var(--dynamic-accent); 
            padding: 12px; border-radius: 8px; cursor: pointer; min-width: 120px; 
            font-weight: 800; font-size: 0.7rem; font-family: var(--font-mono);
        }
        .buy-btn.disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 2000; display: none; flex-direction: column; align-items: center; padding: 30px 20px; overflow-y: auto; }
        
        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 30px;
        }
        .stat-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .stat-value { font-family: var(--font-mono); color: var(--dynamic-accent); font-weight: bold; }

        .ach-grid { display: grid; grid-template-columns: 1fr; gap: 8px; width: 100%; }
        .ach-card { 
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; 
            border: 1px solid var(--border); text-align: left; opacity: 0.3; 
        }
        .ach-card.unlocked { opacity: 1; border-color: var(--gold); background: rgba(255,215,0,0.05); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--save-color); color: white; padding: 14px 28px; border-radius: 12px; font-weight: bold; opacity: 0; z-index: 3000; pointer-events: none; transition: 0.4s; }
        #toast.show { opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

    <div id="toast">Saved</div>

    <div class="fixed-top">
        <div class="ticker-wrap"><div class="ticker" id="ticker-text">Initializing Industrial Simulation... System Ready.</div></div>
        <div class="header">
            <div class="credit-box" id="credit-container">
                <div class="credit-display" id="creditCount">0</div>
                <span class="currency-label">CREDITS</span>
            </div>
            <div class="production-display">AUTO: <span id="cpsCount">0</span>/SEC</div>
        </div>
    </div>

    <div class="main-content">
        <div class="nav-bar">
            <button class="nav-btn" onclick="openSettings()">SETTINGS</button>
            <button class="nav-btn" onclick="saveGame(true)" style="color: var(--save-color); border-color: var(--save-color);">SAVE</button>
            <button id="admin-nav-btn" class="nav-btn" onclick="toggleOverlay('admin-overlay')" style="display:none; color:var(--admin); border-color:var(--admin);">DEBUG</button>
        </div>

        <div class="buy-modes">
            <button id="mode-1" class="mode-btn active" onclick="setBuyMode(1)">x1</button>
            <button id="mode-10" class="mode-btn" onclick="setBuyMode(10)">x10</button>
            <button id="mode-max" class="mode-btn" onclick="setBuyMode('max')">MAX</button>
        </div>

        <div class="click-area">
            <div id="circle" class="tier-0">STONE</div>
        </div>

        <div class="shop">
            <h2 class="section-title">Evolution Pathway</h2>
            <div id="tier-container"></div>
            <h2 class="section-title">Industrial Infrastructure</h2>
            <div id="machine-container"></div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay">
        <button class="nav-btn" style="width:100%; padding: 15px; margin-bottom: 25px;" onclick="toggleOverlay('settings-overlay')">CLOSE SETTINGS</button>
        
        <h2 class="section-title">System Statistics</h2>
        <div class="stats-grid">
            <div class="stat-item"><span class="stat-label">Total Earned</span><div class="stat-value" id="stat-earned">0</div></div>
            <div class="stat-item"><span class="stat-label">Total Clicks</span><div class="stat-value" id="stat-clicks">0</div></div>
            <div class="stat-item"><span class="stat-label">Playtime</span><div class="stat-value" id="stat-time">0s</div></div>
            <div class="stat-item"><span class="stat-label">Current Tier</span><div class="stat-value" id="stat-tier">0</div></div>
        </div>

        <h2 class="section-title">Milestones (How to Unlock)</h2>
        <div id="ach-container" class="ach-grid"></div>
        
        <h2 class="section-title">Management</h2>
        <div style="display: flex; gap: 10px; width: 100%; margin-bottom: 20px;">
            <input type="text" id="promo-code" style="padding:12px; background:#000; color:white; border:1px solid var(--border); border-radius: 8px; flex-grow: 1;" placeholder="ENTER CODE">
            <button class="nav-btn" onclick="redeemCode()" style="border-color: var(--dynamic-accent)">REDEEM</button>
        </div>
        
        <button class="nav-btn" onclick="resetGame()" style="border-color:#ff5555; color:#ff5555; width: 100%; background: rgba(255,0,0,0.05)">TERMINATE ALL DATA</button>
    </div>

    <div id="admin-overlay" class="overlay">
        <button class="nav-btn" onclick="toggleOverlay('admin-overlay')">EXIT CONSOLE</button>
        <h2 class="section-title" style="color:var(--admin)">Cheat Console</h2>
        <div style="display:grid; grid-template-columns: 1fr; gap:10px; width: 100%;">
            <button class="nav-btn" onclick="credits *= 100; updateUI();">x100 Credits</button>
            <button class="nav-btn" onclick="credits += 1e15; updateUI();">Add 1 Quadrillion</button>
            <button class="nav-btn" onclick="currentTier = Math.min(currentTier + 1, tierUpgrades.length); applyTierVisuals(); updateUI();">Instant Evolve</button>
        </div>
    </div>

    <script>
        let credits = 0, totalEarned = 0, totalClicks = 0, currentTier = 0;
        let adminUnlocked = false, unlockedAchievements = [], buyMode = 1, usedCodes = [];
        let startTime = Date.now();
        let totalPlaytime = 0;
        const growthRate = 1.13; 
        let fractionalCredits = 0;

        window.currentCps = 0;
        window.currentClickValue = 1;

        function f(n) {
            if (n === undefined || isNaN(n) || n === null || n < 0) return "0";
            if (n < 1000) return Math.floor(n).toLocaleString();
            const units = ["k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd"];
            const unitIndex = Math.floor((Math.log10(n) / 3));
            const num = (n / Math.pow(10, unitIndex * 3)).toFixed(2);
            return num + (units[unitIndex - 1] || "e" + (unitIndex * 3));
        }

        const eraBackgrounds = ["#0a0a0b", "#1e140d", "#1a1a1a", "#0d1117", "#161b22", "#0d1117", "#1a0510", "#051a1a", "#000", "#110022", "#000"];
        const eraAccents = ["#66cc66", "#cd7f32", "#9e9e9e", "#4682b4", "#ffd700", "#1e90ff", "#ff4444", "#00ffff", "#b300ff", "#ff00ff", "#ffffff"];
        
        const tickerData = {
            start: ["Local entrepreneur hits rock with rocks.", "Scientists wonder if 'wheel' is a fad."],
            bronze: ["Copper found! Shiny rocks are the new meta.", "Blacksmith accidentally invents the spoon."],
            iron: ["Iron tools now 30% pointier.", "Rock Pickers considered endangered species."],
            steel: ["Bridges are now 80% less likely to collapse.", "Steel beams don't melt, but profit does."],
            factory: ["Smog is the new 'clean air'.", "Steam engines outperforming horses 10 to 1."],
            digital: ["The internet: mostly just cat pictures.", "CEO is now 40% silicon."],
            atomic: ["Nuclear energy: Glowing in the dark is a feature.", "Fusion is still 20 years away."],
            plasma: ["Neon lights are now mandatory for all citizens.", "Plasma cutters making butter knives obsolete."],
            quantum: ["Reality successfully hacked.", "CEO exists in all offices simultaneously."],
            singularity: ["Time is just a suggestion now.", "The universe is being compressed into a zip file."]
        };

        const tierUpgrades = [
            { id: 't1', name: "Bronze Tools", cost: 300, clickValue: 10, label: "BRONZE", class: "tier-1" },
            { id: 't2', name: "Iron Workings", cost: 5000, clickValue: 80, label: "IRON", class: "tier-2" },
            { id: 't3', name: "Steel Forging", cost: 75000, clickValue: 600, label: "STEEL", class: "tier-3" },
            { id: 't4', name: "Steam Power", cost: 500000, clickValue: 3500, label: "FACTORY", class: "tier-4" },
            { id: 't5', name: "Digital Logic", cost: 10000000, clickValue: 25000, label: "DIGITAL", class: "tier-5" },
            { id: 't6', name: "Industrial Overdrive", cost: 500000000, clickValue: 150000, label: "ATOMIC", class: "tier-6" },
            { id: 't7', name: "Plasma Fusion", cost: 5000000000, clickValue: 1200000, label: "PLASMA", class: "tier-7" },
            { id: 't8', name: "Quantum Core", cost: 1e11, clickValue: 5e7, label: "QUANTUM", class: "tier-9" },
            { id: 't9', name: "Dimensional Rift", cost: 1e14, clickValue: 2e9, label: "RIFT", class: "tier-9" },
            { id: 't10', name: "The Singularity", cost: 1e17, clickValue: 1e12, label: "VOID", class: "tier-10" }
        ];

        const machineUpgrades = {
            picker: { name: "Rock Picker", addAuto: 1, baseCost: 15 },
            smith: { name: "Blacksmith", addAuto: 8, baseCost: 150 },
            mill: { name: "Water Wheel", addAuto: 45, baseCost: 1200 },
            engine: { name: "Steam Engine", addAuto: 250, baseCost: 15000 },
            generator: { name: "Electric Generator", addAuto: 1200, baseCost: 140000 },
            plant: { name: "Power Plant", addAuto: 6500, baseCost: 950000 },
            server: { name: "Data Centre", addAuto: 35000, baseCost: 7500000 },
            cloud: { name: "Cloud Computer", addAuto: 180000, baseCost: 45000000 },
            ai: { name: "AI Assistant", addAuto: 950000, baseCost: 350000000 },
            quantum: { name: "Quantum Rig", addAuto: 6000000, baseCost: 5000000000 },
            swarm: { name: "Dyson Swarm", addAuto: 45000000, baseCost: 80000000000 },
            moon: { name: "Moon Branch", addAuto: 2500000000, baseCost: 1e13 },
            void: { name: "Void Well", addAuto: 1000000000000, baseCost: 5e16 }
        };

        const achievements = [
            { id: 'a1', name: "Novice", desc: "Click the main object 1 time", icon: "🔨", check: () => totalClicks >= 1 },
            { id: 'a2', name: "Grinder", desc: "Click the main object 100 times", icon: "🖱️", check: () => totalClicks >= 100 },
            { id: 'a3', name: "Wealthy", desc: "Earn a total of 1 Million Credits", icon: "💰", check: () => totalEarned >= 1000000 },
            { id: 'a4', name: "Tycoon", desc: "Earn a total of 1 Billion Credits", icon: "💎", check: () => totalEarned >= 1000000000 },
            { id: 'up1', name: "Manual Labor", desc: "Purchase 1 Rock Picker", icon: "🪨", check: () => inventory.picker > 0 },
            { id: 'up4', name: "Full Steam Ahead", desc: "Purchase 1 Steam Engine", icon: "🚂", check: () => inventory.engine > 0 },
            { id: 'up6', name: "The Big Boss", desc: "Purchase 1 Power Plant", icon: "🏭", check: () => inventory.plant > 0 },
            { id: 'up10', name: "Sub-Atomic", desc: "Purchase 1 Quantum Rig", icon: "⚛️", check: () => inventory.quantum > 0 }
        ];

        let inventory = {};
        Object.keys(machineUpgrades).forEach(id => inventory[id] = 0);

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function openSettings() {
            document.getElementById('stat-earned').innerText = f(totalEarned);
            document.getElementById('stat-clicks').innerText = totalClicks.toLocaleString();
            document.getElementById('stat-tier').innerText = currentTier;
            
            const totalSecs = Math.floor(totalPlaytime + (Date.now() - startTime)/1000);
            const h = Math.floor(totalSecs / 3600);
            const m = Math.floor((totalSecs % 3600) / 60);
            const s = totalSecs % 60;
            document.getElementById('stat-time').innerText = `${h}h ${m}m ${s}s`;

            const container = document.getElementById('ach-container');
            container.innerHTML = '';
            achievements.forEach(ach => {
                const isUnlocked = unlockedAchievements.includes(ach.id);
                container.innerHTML += `
                    <div class="ach-card ${isUnlocked ? 'unlocked' : ''}">
                        <div style="font-size:1.5rem">${ach.icon}</div>
                        <div>
                            <div style="font-weight:bold; font-size:0.8rem;">${ach.name} ${isUnlocked ? '(Unlocked)' : ''}</div>
                            <div style="font-size:0.65rem; color:#aaa; margin-top:2px">${ach.desc}</div>
                        </div>
                    </div>
                `;
            });
            toggleOverlay('settings-overlay');
        }

        function getCostOfMany(id, amount) {
            let n = inventory[id] || 0;
            let b = machineUpgrades[id].baseCost;
            let r = growthRate;
            let count = 0;
            let totalCost = 0;

            if (amount === 'max') {
                count = Math.floor(Math.log(((credits * (r - 1)) / (b * Math.pow(r, n))) + 1) / Math.log(r));
                count = Math.max(0, count);
            } else {
                count = amount;
            }

            if (count > 0) {
                totalCost = b * (Math.pow(r, n) * (Math.pow(r, count) - 1)) / (r - 1);
            }
            
            if (!isFinite(totalCost) || isNaN(totalCost)) totalCost = 1e60; 

            return { cost: totalCost, count: count };
        }

        function updateUI() {
            document.getElementById('creditCount').innerText = f(credits);
            
            let totalCps = 0;
            Object.keys(machineUpgrades).forEach(id => {
                totalCps += machineUpgrades[id].addAuto * (inventory[id] || 0);
            });
            document.getElementById('cpsCount').innerText = f(totalCps);
            window.currentCps = totalCps;

            let clickVal = (currentTier > 0) ? tierUpgrades[currentTier - 1].clickValue : 1;
            window.currentClickValue = clickVal;

            Object.keys(machineUpgrades).forEach(id => {
                const buyData = getCostOfMany(id, buyMode);
                const btn = document.getElementById(`btn-${id}`);
                const info = document.getElementById(`info-${id}`);
                
                if (btn) {
                    btn.innerHTML = `BUY ${buyData.count > 0 ? buyData.count : (buyMode === 'max' ? 0 : buyMode)}<br>${f(buyData.cost)}`;
                    btn.classList.toggle("disabled", credits < buyData.cost || buyData.count <= 0);
                }
                if (info) {
                    info.innerHTML = `+${f(machineUpgrades[id].addAuto)}/s | Fleet: ${inventory[id]}`;
                }
            });

            const tBox = document.getElementById('tier-container');
            const next = tierUpgrades[currentTier];
            if (next) {
                tBox.innerHTML = `
                    <div class="upgrade-card">
                        <div>
                            <h3 style="margin:0; font-size:0.9rem;">${next.name}</h3>
                            <p style="font-size:0.7rem; margin:5px 0; color:#aaa;">New Output: ${f(next.clickValue)}/click</p>
                        </div>
                        <button class="buy-btn ${credits < next.cost ? 'disabled' : ''}" onclick="evolveTier()">
                            EVOLVE<br>${f(next.cost)}
                        </button>
                    </div>`;
            } else {
                tBox.innerHTML = `<p style="color:var(--quantum); text-align:center; font-weight:900; width:100%">SINGULARITY ACHIEVED</p>`;
            }

            if(adminUnlocked) document.getElementById('admin-nav-btn').style.display = 'block';
            
            const accent = eraAccents[currentTier] || "#66cc66";
            document.documentElement.style.setProperty('--dynamic-accent', accent);
            document.body.style.backgroundColor = eraBackgrounds[currentTier] || "#000";
            
            checkAchievements();
        }

        function buyMachine(id) {
            const data = getCostOfMany(id, buyMode);
            if(credits >= data.cost && data.count > 0) { 
                credits -= data.cost; 
                inventory[id] += data.count; 
                updateUI(); 
            }
        }

        function evolveTier() {
            const next = tierUpgrades[currentTier];
            if(next && credits >= next.cost) { 
                credits -= next.cost; 
                currentTier++; 
                applyTierVisuals(); 
                updateUI(); 
                notify("ERA ADVANCED!");
                updateTicker();
            }
        }

        function applyTierVisuals() {
            const c = document.getElementById('circle');
            if(currentTier > 0) {
                const currentData = tierUpgrades[currentTier-1];
                c.className = currentData.class;
                c.innerText = currentData.label;
            } else {
                c.className = "tier-0";
                c.innerText = "STONE";
            }
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function setBuyMode(m) { 
            buyMode = m; 
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(typeof m === 'number' ? 'mode-'+m : 'mode-max').classList.add('active');
            updateUI(); 
        }

        function saveGame(manual = false) {
            totalPlaytime += (Date.now() - startTime) / 1000;
            startTime = Date.now();
            const data = { credits, totalEarned, totalClicks, inventory, currentTier, unlockedAchievements, adminUnlocked, usedCodes, totalPlaytime };
            localStorage.setItem("IndusEvo_V2", JSON.stringify(data));
            if(manual) notify("System Progress Saved");
        }

        function loadGame() {
            const saved = localStorage.getItem("IndusEvo_V2");
            if(saved) {
                const data = JSON.parse(saved);
                credits = data.credits || 0; 
                totalEarned = data.totalEarned || 0; 
                totalClicks = data.totalClicks || 0;
                inventory = data.inventory || inventory; 
                currentTier = data.currentTier || 0;
                unlockedAchievements = data.unlockedAchievements || []; 
                adminUnlocked = data.adminUnlocked || false;
                usedCodes = data.usedCodes || [];
                totalPlaytime = data.totalPlaytime || 0;
                applyTierVisuals();
            }
            updateUI();
            updateTicker();
        }

        function updateTicker() {
            const keys = ["start", "bronze", "iron", "steel", "factory", "digital", "atomic", "plasma", "quantum", "singularity"];
            const list = tickerData[keys[currentTier]] || tickerData.start;
            const tickerEl = document.getElementById('ticker-text');
            // Plays one at a time faster
            tickerEl.innerText = list[Math.floor(Math.random()*list.length)];
        }

        function checkAchievements() {
            achievements.forEach(ach => {
                if(!unlockedAchievements.includes(ach.id) && ach.check()) {
                    unlockedAchievements.push(ach.id);
                    notify(`MILESTONE: ${ach.name}`);
                }
            });
        }

        function redeemCode() {
            const input = document.getElementById('promo-code');
            const val = input.value.toUpperCase().trim();
            
            if(val === "FREEBIE") {
                if(!usedCodes.includes(val)) {
                    credits += 5000; usedCodes.push(val); notify("+5,000 Credits!");
                } else {
                    notify("Already Claimed");
                }
            } else if (val === "AA.01") {
                if(!adminUnlocked) {
                   adminUnlocked = true; notify("Console Access Granted");
                } else {
                   notify("Already Claimed");
                }
            } else {
                notify("Invalid Code");
            }
            input.value = "";
            updateUI();
        }

        function resetGame() { if(confirm("Permanently erase all data?")) { localStorage.clear(); location.reload(); } }

        document.getElementById('circle').addEventListener('click', (e) => {
            let multiplier = 1;
            if (Math.random() < 0.05) multiplier = 5;

            const gain = window.currentClickValue * multiplier;
            credits += gain; totalEarned += gain; totalClicks++;
            
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = multiplier > 1 ? `CRIT! +${f(gain)}` : `+${f(gain)}`;
            if(multiplier > 1) text.style.color = "var(--gold)";
            
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            text.style.left = (x - 20) + 'px';
            text.style.top = (y - 20) + 'px';
            
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 700);
            updateUI();
        });

        const mBox = document.getElementById('machine-container');
        mBox.innerHTML = ""; 
        Object.keys(machineUpgrades).forEach(id => {
            mBox.innerHTML += `
                <div class="upgrade-card">
                    <div>
                        <h3 style="margin:0; font-size:0.85rem;">${machineUpgrades[id].name}</h3>
                        <p id="info-${id}" style="margin:5px 0; font-size:0.65rem; color:#888;"></p>
                    </div>
                    <button class="buy-btn" id="btn-${id}" onclick="buyMachine('${id}')"></button>
                </div>`;
        });

        setInterval(() => { 
            if(window.currentCps > 0) { 
                let gainPerTick = window.currentCps / 10;
                fractionalCredits += (gainPerTick % 1);
                let carry = Math.floor(fractionalCredits);
                credits += Math.floor(gainPerTick) + carry;
                totalEarned += Math.floor(gainPerTick) + carry;
                fractionalCredits %= 1;
                document.getElementById('creditCount').innerText = f(credits);
            } 
        }, 100);

        setInterval(updateUI, 1000);
        setInterval(updateTicker, 10000); // 10 second refresh for news
        setInterval(() => saveGame(false), 30000);
        
        loadGame();
    </script>
</body>
</html>
