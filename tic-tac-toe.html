<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/auth.js"></script>
    <style>
        :root {
            --bg: #0f0c29;
            --cell-bg: #1b1b3a;
            --accent: #00f2ff;
            --x-color: #ec4899;
            --o-color: #00f2ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
        }

        .score-board {
            display: flex;
            gap: 40px;
            background: var(--glass);
            padding: 15px 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .score-item { text-align: center; font-weight: bold; min-width: 100px; }
        .score-val { display: block; font-size: 28px; color: var(--accent); }

        .controls { margin-bottom: 20px; }
        select {
            padding: 8px 15px;
            border-radius: 5px;
            background: var(--cell-bg);
            color: white;
            border: 1px solid var(--accent);
            cursor: pointer;
            outline: none;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            position: relative;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: var(--cell-bg);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .cell:hover { background: rgba(255, 255, 255, 0.05); transform: scale(1.02); }
        .cell.x { color: var(--x-color); text-shadow: 0 0 15px var(--x-color); }
        .cell.o { color: var(--o-color); text-shadow: 0 0 15px var(--o-color); }

        .game-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.95);
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 32px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
            border: 2px solid var(--accent);
            text-align: center;
            white-space: nowrap;
        }

        .show-status { opacity: 1; }

        .turn-indicator {
            margin-top: 20px;
            font-size: 18px;
            color: #ccc;
            height: 24px;
        }

        button {
            margin-top: 30px;
            padding: 12px 30px;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px var(--accent); }

        .online-lobby {
            text-align: center;
            padding: 24px;
            background: var(--glass);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 400px;
        }
        .online-lobby h3 { margin: 0 0 16px 0; font-size: 18px; color: var(--accent); }
        .online-lobby p { margin: 8px 0; font-size: 14px; color: #aaa; }
        .online-lobby button { margin: 8px; }
        .online-lobby input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--accent); background: var(--cell-bg); color: white; width: 120px; text-align: center; font-size: 14px; }
        .match-list { list-style: none; padding: 0; margin: 12px 0; max-height: 200px; overflow-y: auto; text-align: left; }
        .match-list li { padding: 10px 14px; margin: 4px 0; background: rgba(0,0,0,0.3); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .match-list li:hover { border-color: var(--accent); }
        .online-status { font-size: 12px; color: #8f8; margin-top: 8px; }

        /* Improved Multiplayer Score UI */
        .mp-score-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .mp-player-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        .mp-player-name {
            font-size: 14px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mp-player-score {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
        }

        .mp-vs-badge {
            background: var(--cell-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 12px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 99px;
            margin: 0 20px;
            position: relative;
        }

        .mp-vs-badge::after {
            content: 'FIRST TO ' attr(data-target);
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 8px;
            color: #64748b;
            margin-top: 4px;
        }

        .mp-score-card.x-active { border-left: 4px solid var(--x-color); }
        .mp-score-card.o-active { border-right: 4px solid var(--o-color); }

        .mp-controls-container {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="score-board">
        <div class="score-item">PLAYER (X) <span class="score-val" id="x-score">0</span></div>
        <div class="score-item" id="player-o-label">AI (O) <span class="score-val" id="o-score">0</span></div>
    </div>

    <div class="controls">
        Mode: 
        <select id="difficulty" onchange="onModeChange()">
            <option value="coop">2 Player (Local)</option>
            <option value="easy">VS AI (Easy)</option>
            <option value="medium">VS AI (Medium)</option>
            <option value="hard" selected>VS AI (Hard)</option>
            <option value="online">Online (Multiplayer)</option>
        </select>
    </div>

    <div id="online-lobby" class="online-lobby" style="display: none;">
        <h3>Online Match</h3>
        <div id="online-lobby-content"></div>
    </div>

    <div id="multiplayer-status" style="display: none; width: 100%; max-width: 500px;">
        <div class="mp-score-card" id="mp-score-card">
            <div class="mp-player-info">
                <p id="player-x-name" class="mp-player-name">Waiting...</p>
                <p id="player-x-score" class="mp-player-score" style="color: var(--x-color);">0</p>
            </div>
            
            <div id="mp-vs-badge" class="mp-vs-badge" data-target="3">VS</div>

            <div class="mp-player-info">
                <p id="player-o-name" class="mp-player-name">Waiting...</p>
                <p id="player-o-score" class="mp-player-score" style="color: var(--o-color);">0</p>
            </div>
        </div>
        
        <div id="multiplayer-controls" class="mp-controls-container">
            <!-- Buttons like Start Game, Rematch will go here -->
        </div>
    </div>

    <div class="board" id="board">
        <div id="game-status" class="game-status"></div>
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="turn-indicator" id="turn-indicator">X's Turn</div>

    <button id="btn-reset" onclick="resetGame(true)">Reset All</button>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let xScore = 0;
        let oScore = 0;
        let isGameActive = true;

        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('game-status');
        const turnDisplay = document.getElementById('turn-indicator');
        const difficulty = document.getElementById('difficulty');
        const oLabel = document.getElementById('player-o-label');

        // Online multiplayer state (one listener per match, one write per move)
        let onlineMatchId = null;
        let onlineRole = null;
        let onlineUnsubscribe = null;
        const GRID_SIZE = 3;

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));

        function handleCellClick(e) {
            const index = e.target.getAttribute('data-index');
            if (board[index] !== '' || !isGameActive) return;

            if (difficulty.value === 'online' && onlineMatchId) {
                const mySymbol = onlineRole === 'X' ? 'X' : 'O';
                if (currentPlayer !== mySymbol) return;
                makeOnlineMove(index);
                return;
            }

            executeMove(index, currentPlayer);

            if (checkWin(currentPlayer)) return;

            if (difficulty.value === 'coop') {
                swapTurn();
            } else {
                isGameActive = false; 
                turnDisplay.textContent = "AI is thinking...";
                setTimeout(aiTurn, 600);
            }
        }

        function aiTurn() {
            if (board.includes('')) {
                const mode = difficulty.value;
                let move;

                if (mode === 'hard') move = getBestMove();
                else if (mode === 'medium') move = Math.random() > 0.5 ? getBestMove() : getRandomMove();
                else move = getRandomMove();

                executeMove(move, 'O');

                if (!checkWin('O')) {
                    isGameActive = true;
                    currentPlayer = 'X';
                    turnDisplay.textContent = "X's Turn";
                }
            }
        }

        function executeMove(index, player) {
            board[index] = player;
            cells[index].textContent = player;
            cells[index].classList.add(player.toLowerCase());
        }

        function swapTurn() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            turnDisplay.textContent = `${currentPlayer}'s Turn`;
        }

        function checkWin(player) {
            let win = winConditions.some(condition => {
                return condition.every(index => board[index] === player);
            });

            if (win) {
                updateScore(player);
                const winMsg = (difficulty.value !== 'coop' && player === 'O') ? "AI Wins!" : player + " Wins!";
                announceResult(winMsg);
                return true;
            }

            if (!board.includes('')) {
                announceResult("Draw!");
                return true;
            }
            return false;
        }

        function updateScore(winner) {
            if (winner === 'X') {
                xScore++;
                document.getElementById('x-score').textContent = xScore;
            } else {
                oScore++;
                document.getElementById('o-score').textContent = oScore;
            }
        }

        function announceResult(message) {
            isGameActive = false;
            statusDisplay.textContent = message;
            statusDisplay.classList.add('show-status');
            setTimeout(resetGame, 2000);
        }

        function updateLabels() {
            if (difficulty.value === 'online') {
                oLabel.innerHTML = `OPPONENT (O) <span class="score-val" id="o-score">${oScore}</span>`;
            } else if (difficulty.value === 'coop') {
                oLabel.innerHTML = `PLAYER (O) <span class="score-val" id="o-score">${oScore}</span>`;
            } else {
                oLabel.innerHTML = `AI (O) <span class="score-val" id="o-score">${oScore}</span>`;
            }
        }

        function resetGame(fullReset = false) {
            if (difficulty.value === 'online' && onlineUnsubscribe) {
                onlineUnsubscribe();
                onlineUnsubscribe = null;
                onlineMatchId = null;
                onlineRole = null;
            }
            board = ['', '', '', '', '', '', '', '', ''];
            isGameActive = true;
            currentPlayer = 'X';
            turnDisplay.textContent = "X's Turn";
            statusDisplay.classList.remove('show-status');
            cells.forEach(cell => {
                cell.textContent = '';
                cell.className = 'cell';
            });

            if (fullReset) {
                xScore = 0; oScore = 0;
                document.getElementById('x-score').textContent = "0";
            }
            
            updateLabels();
            if (difficulty.value === 'online') renderOnlineLobby();
        }

        function getRandomMove() {
            const available = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            return available[Math.floor(Math.random() * available.length)];
        }

        function getBestMove() {
            for (let combo of winConditions) {
                let move = findMissingPiece(combo, 'O');
                if (move !== null) return move;
            }
            for (let combo of winConditions) {
                let move = findMissingPiece(combo, 'X');
                if (move !== null) return move;
            }
            if (board[4] === '') return 4;
            return getRandomMove();
        }

        function findMissingPiece(combo, player) {
            const pieces = combo.map(i => board[i]);
            if (pieces.filter(p => p === player).length === 2 && pieces.filter(p => p === '').length === 1) {
                return combo[pieces.indexOf('')];
            }
            return null;
        }

        function onModeChange() {
            if (difficulty.value === 'online') {
                document.getElementById('online-lobby').style.display = 'block';
                document.getElementById('btn-reset').textContent = 'Leave match';
                if (onlineUnsubscribe) { onlineUnsubscribe(); onlineUnsubscribe = null; onlineMatchId = null; }
                renderOnlineLobby();
            } else {
                document.getElementById('online-lobby').style.display = 'none';
                document.getElementById('btn-reset').textContent = 'Reset All';
                if (onlineUnsubscribe) { onlineUnsubscribe(); onlineUnsubscribe = null; onlineMatchId = null; }
            }
            updateLabels();
            resetGame(true);
        }

        function renderOnlineLobby() {
            const lobby = document.getElementById('online-lobby');
            const content = document.getElementById('online-lobby-content');
            if (difficulty.value !== 'online') return;

            if (onlineMatchId) {
                content.innerHTML = '<p class="online-status">In match. Play below.</p>';
                return;
            }

            const user = window.gameHubAuth && window.gameHubAuth.getCurrentUser ? window.gameHubAuth.getCurrentUser() : null;
            if (!user) {
                const hasModal = document.getElementById('auth-modal');
                content.innerHTML = '<p>Sign in to play online.</p>' + (hasModal
                    ? '<button onclick="window.gameHubAuth && window.gameHubAuth.openAuthModal && window.gameHubAuth.openAuthModal()">Sign In</button>'
                    : '<p><a href="index.html" style="color: var(--accent);">Go to Game Hub</a> to sign in, then return here.</p>');
                return;
            }

            if (!window.gameHubFirebase || !window.gameHubFirebase.db) {
                content.innerHTML = '<p>Database not ready.</p>';
                return;
            }

            content.innerHTML = `
                <button onclick="createOnlineMatch()">Create match</button>
                <button onclick="showJoinMatchList()">Join a match</button>
                <div id="join-match-list" style="display:none; margin-top: 12px;">
                    <p>Available matches:</p>
                    <ul class="match-list" id="match-list-el"></ul>
                    <button onclick="showJoinMatchList()">Refresh</button>
                </div>
            `;
        }

        function createOnlineMatch() {
            const user = window.gameHubAuth && window.gameHubAuth.getCurrentUser ? window.gameHubAuth.getCurrentUser() : null;
            if (!user || !window.gameHubFirebase || !window.gameHubFirebase.db) return;
            const db = window.gameHubFirebase.db;
            
            // Ask for target score
            const targetScore = parseInt(prompt("Enter target score to win (e.g. 3):", "3")) || 3;

            const displayName = user.displayName || (user.email || '').split('@')[0] || 'Player';
            
            // Try to get username from Firestore if available
            db.collection("users").doc(user.uid).get().then(doc => {
                const username = (doc.exists && doc.data().username) ? doc.data().username : displayName;
                const matchId = Math.random().toString(36).substring(2, 8).toUpperCase();
                const ref = db.collection('tictactoe_matches').doc(matchId);
                
                return ref.set({
                    creatorId: user.uid,
                    creatorName: username,
                    opponentId: null,
                    opponentName: null,
                    board: ['', '', '', '', '', '', '', '', ''],
                    turn: 'X',
                    firstTurn: 'X', // Track who started the round
                    status: 'waiting',
                    winner: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    targetScore: targetScore,
                    scores: { X: 0, O: 0 },
                    rematchRequested: { X: false, O: false }
                }).then(() => {
                    onlineMatchId = matchId;
                    onlineRole = 'X';
                    listenToMatch(ref);
                    document.getElementById('online-lobby-content').innerHTML = `
                        <p>Waiting for opponent...</p>
                        <p>Target Score: <strong>${targetScore}</strong></p>
                        <p>Share this link: <input type="text" id="match-link" readonly value="${window.location.origin + window.location.pathname + '?join=' + matchId}" onclick="this.select()" /></p>
                        <p class="online-status">Or they can click "Join a match" and pick yours.</p>
                    `;
                });
            }).catch(e => {
                alert('Failed to create match: ' + (e.message || e));
            });
        }

        function showJoinMatchList() {
            const db = window.gameHubFirebase.db;
            const listEl = document.getElementById('match-list-el');
            const listDiv = document.getElementById('join-match-list');
            if (!listEl || !listDiv) return;
            listDiv.style.display = 'block';
            listEl.innerHTML = '<li style="cursor:default;">Loading...</li>';
            db.collection('tictactoe_matches')
                .where('status', '==', 'waiting')
                .limit(15)
                .get()
                .then(snap => {
                    listEl.innerHTML = '';
                    if (snap.empty) {
                        listEl.innerHTML = '<li style="cursor:default;">No matches waiting. Create one!</li>';
                        return;
                    }
                    snap.forEach(doc => {
                        const d = doc.data();
                        if (d.creatorId === (window.gameHubAuth.getCurrentUser && window.gameHubAuth.getCurrentUser()?.uid)) return;
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <span>${d.creatorName} — ${doc.id}</span>
                            <span style="font-size: 10px; color: var(--accent);">First to ${d.targetScore || 3}</span>
                        `;
                        li.onclick = () => joinOnlineMatch(doc.id);
                        listEl.appendChild(li);
                    });
                })
                .catch(e => {
                    listEl.innerHTML = '<li style="cursor:default;">Error: ' + (e.message || 'list failed') + '</li>';
                });
        }

        function joinOnlineMatch(id) {
            const user = window.gameHubAuth && window.gameHubAuth.getCurrentUser ? window.gameHubAuth.getCurrentUser() : null;
            if (!user || !window.gameHubFirebase || !window.gameHubFirebase.db) return;
            const db = window.gameHubFirebase.db;
            const displayName = user.displayName || (user.email || '').split('@')[0] || 'Player';
            
            db.collection("users").doc(user.uid).get().then(doc => {
                const username = (doc.exists && doc.data().username) ? doc.data().username : displayName;
                const ref = db.collection('tictactoe_matches').doc(id);
                
                return ref.get().then(doc => {
                    if (!doc.exists || doc.data().status !== 'waiting' || doc.data().opponentId) {
                        alert('Match no longer available.');
                        showJoinMatchList();
                        return;
                    }
                    return ref.update({
                        opponentId: user.uid,
                        opponentName: username,
                        status: 'lobby' // Changed from 'playing' to 'lobby' to allow for Start Game button
                    });
                }).then(() => {
                    onlineMatchId = id;
                    onlineRole = 'O';
                    listenToMatch(ref);
                    document.getElementById('join-match-list').style.display = 'none';
                    document.getElementById('online-lobby-content').innerHTML = '<p class="online-status">Joined lobby. Wait for host to start.</p>';
                });
            }).catch(e => {
                alert('Could not join: ' + (e.message || e));
                showJoinMatchList();
            });
        }

        function listenToMatch(ref) {
            if (onlineUnsubscribe) onlineUnsubscribe();
            onlineUnsubscribe = ref.onSnapshot(doc => {
                if (!doc.exists) {
                    alert("Match has been closed.");
                    resetGame(true);
                    difficulty.value = 'coop';
                    onModeChange();
                    return;
                }
                const d = doc.data();
                board = Array.isArray(d.board) ? [...d.board] : ['', '', '', '', '', '', '', '', ''];
                currentPlayer = d.turn || 'X';
                
                // UI Updates
                const lobby = document.getElementById('online-lobby');
                const multiStatus = document.getElementById('multiplayer-status');
                const scoreBoard = document.querySelector('.score-board');
                
                if (d.status === 'waiting') {
                    lobby.style.display = 'block';
                    multiStatus.style.display = 'none';
                    scoreBoard.style.display = 'flex';
                    
                    // Show creator UI if host
                    if (onlineRole === 'X') {
                        document.getElementById('online-lobby-content').innerHTML = `
                            <p>Waiting for opponent...</p>
                            <p>Target Score: <strong>${d.targetScore || 3}</strong></p>
                            <p>Share this link: <input type="text" id="match-link" readonly value="${window.location.origin + window.location.pathname + '?join=' + doc.id}" onclick="this.select()" /></p>
                        `;
                    }
                } else {
                    lobby.style.display = 'none';
                    multiStatus.style.display = 'block';
                    scoreBoard.style.display = 'none';
                    
                    document.getElementById('player-x-name').textContent = d.creatorName || "Player X";
                    document.getElementById('player-o-name').textContent = d.opponentName || "Waiting...";
                    document.getElementById('player-x-score').textContent = d.scores?.X || 0;
                    document.getElementById('player-o-score').textContent = d.scores?.O || 0;
                    
                    const vsBadge = document.getElementById('mp-vs-badge');
                    vsBadge.setAttribute('data-target', d.targetScore || 3);

                    const scoreCard = document.getElementById('mp-score-card');
                    scoreCard.classList.remove('x-active', 'o-active');
                    if (d.status === 'playing') {
                        scoreCard.classList.add(currentPlayer === 'X' ? 'x-active' : 'o-active');
                    }

                    // Handle Controls
                    const controls = document.getElementById('multiplayer-controls');
                    controls.innerHTML = '';
                    
                    if (d.status === 'lobby') {
                        if (onlineRole === 'X') {
                            const startBtn = document.createElement('button');
                            startBtn.textContent = "Start Game";
                            startBtn.onclick = () => ref.update({ status: 'playing' });
                            controls.appendChild(startBtn);
                        } else {
                            const waitMsg = document.createElement('p');
                            waitMsg.className = 'text-xs italic';
                            waitMsg.textContent = "Waiting for host to start...";
                            controls.appendChild(waitMsg);
                        }
                    } else if (d.status === 'finished') {
                        const isMatchWinner = (d.winner === 'X' && d.scores.X >= d.targetScore) || (d.winner === 'O' && d.scores.O >= d.targetScore);
                        
                        if (isMatchWinner) {
                            const msg = document.createElement('p');
                            msg.className = 'text-xl font-bold mb-2';
                            const amIWinner = (onlineRole === 'X' && d.scores.X >= d.targetScore) || (onlineRole === 'O' && d.scores.O >= d.targetScore);
                            msg.textContent = amIWinner ? "MATCH WON!" : "MATCH LOST!";
                            msg.style.color = amIWinner ? "#4ade80" : "#fb7185";
                            controls.appendChild(msg);
                            
                            const leaveBtn = document.createElement('button');
                            leaveBtn.textContent = "Back to Lobby";
                            leaveBtn.onclick = () => {
                                ref.delete();
                                resetGame(true);
                                onModeChange();
                            };
                            controls.appendChild(leaveBtn);
                        } else {
                            // Round finished, show rematch/next round buttons
                            const rematchBtn = document.createElement('button');
                            const myRematch = d.rematchRequested?.[onlineRole];
                            rematchBtn.textContent = myRematch ? "Waiting..." : "Next Round";
                            rematchBtn.disabled = myRematch;
                            rematchBtn.onclick = () => {
                                const update = {};
                                update[`rematchRequested.${onlineRole}`] = true;
                                ref.update(update);
                            };
                            controls.appendChild(rematchBtn);

                            const leaveBtn = document.createElement('button');
                            leaveBtn.textContent = "Leave Match";
                            leaveBtn.style.borderColor = "#fb7185";
                            leaveBtn.style.color = "#fb7185";
                            leaveBtn.onclick = () => {
                                ref.delete();
                                resetGame(true);
                                onModeChange();
                            };
                            controls.appendChild(leaveBtn);

                            // Check if both requested rematch
                            if (d.rematchRequested?.X && d.rematchRequested?.O) {
                                if (onlineRole === 'X') { // One player resets
                                    ref.update({
                                        board: ['', '', '', '', '', '', '', '', ''],
                                        turn: d.firstTurn === 'X' ? 'O' : 'X',
                                        firstTurn: d.firstTurn === 'X' ? 'O' : 'X',
                                        status: 'playing',
                                        winner: null,
                                        rematchRequested: { X: false, O: false }
                                    });
                                }
                            }
                        }
                    }
                }

                isGameActive = d.status === 'playing';
                for (let i = 0; i < 9; i++) {
                    cells[i].textContent = board[i];
                    cells[i].className = 'cell' + (board[i] ? ' ' + board[i].toLowerCase() : '');
                }
                
                if (d.status === 'finished') {
                    const amIWinner = (onlineRole === 'X' && d.winner === 'X') || (onlineRole === 'O' && d.winner === 'O');
                    const isDraw = d.winner === 'draw';
                    
                    if (isDraw) {
                        statusDisplay.textContent = "Draw!";
                        statusDisplay.style.color = "white";
                    } else {
                        statusDisplay.textContent = amIWinner ? "You Won!" : "You Lost!";
                        statusDisplay.style.color = amIWinner ? "#4ade80" : "#fb7185";
                    }
                    statusDisplay.classList.add('show-status');
                    turnDisplay.textContent = "Round Over";
                } else if (d.status === 'playing') {
                    statusDisplay.classList.remove('show-status');
                    const isMyTurn = currentPlayer === onlineRole;
                    turnDisplay.textContent = isMyTurn ? "Your Turn" : "Opponent's Turn";
                } else if (d.status === 'lobby') {
                    turnDisplay.textContent = "Waiting in Lobby";
                }
            });
        }

        function makeOnlineMove(index) {
            if (board[index] !== '' || !onlineMatchId || !window.gameHubFirebase || !window.gameHubFirebase.db) return;
            const mySymbol = onlineRole;
            if (currentPlayer !== mySymbol) return;
            
            const newBoard = [...board];
            newBoard[index] = mySymbol;
            const nextTurn = mySymbol === 'X' ? 'O' : 'X';
            
            const won = winConditions.some(c => c.every(i => newBoard[i] === mySymbol));
            const draw = !won && !newBoard.includes('');
            
            const ref = window.gameHubFirebase.db.collection('tictactoe_matches').doc(onlineMatchId);
            
            ref.get().then(doc => {
                const d = doc.data();
                const update = {
                    board: newBoard,
                    turn: nextTurn
                };

                if (won || draw) {
                    update.status = 'finished';
                    update.winner = won ? mySymbol : 'draw';
                    if (won) {
                        const newScores = { ...d.scores };
                        newScores[mySymbol]++;
                        update.scores = newScores;
                    }
                }
                return ref.update(update);
            }).catch(e => alert('Move failed: ' + (e.message || e)));
        }

        (function checkJoinFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const joinId = params.get('join');
            if (joinId && window.gameHubFirebase && window.gameHubFirebase.db) {
                difficulty.value = 'online';
                document.getElementById('online-lobby').style.display = 'block';
                document.getElementById('btn-reset').textContent = 'Leave match';
                renderOnlineLobby();
                setTimeout(() => {
                    const user = window.gameHubAuth && window.gameHubAuth.getCurrentUser ? window.gameHubAuth.getCurrentUser() : null;
                    if (user) joinOnlineMatch(joinId.toUpperCase());
                    else document.getElementById('online-lobby-content').innerHTML = '<p>Sign in first.</p><p><a href="index.html" style="color: var(--accent);">Go to Game Hub to sign in</a>, then refresh this page.</p>';
                }, 500);
            }
        })();

        updateLabels();
    </script>
</body>
