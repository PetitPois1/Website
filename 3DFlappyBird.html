<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D First Person Flappy - Fixed Controls</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-touch-callout: none; touch-action: none;
        }

        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: none;
        }

        #hud-top {
            position: absolute; top: 20px; width: 90%;
            display: flex; justify-content: space-between;
            font-size: 2rem; font-weight: bold; color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8); display: none;
        }

        .coin-text { color: #ffd700; }

        .screen {
            background: rgba(15, 15, 25, 0.85); padding: 40px 60px;
            border-radius: 20px; text-align: center; color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.1);
            pointer-events: auto; display: none; backdrop-filter: blur(5px);
        }

        #title-screen { display: block; background: transparent; box-shadow: none; backdrop-filter: none; }
        
        h1 { font-size: 4rem; margin-bottom: 10px; text-shadow: 0 0 20px #ff4757; animation: float 2s ease-in-out infinite; }
        h2 { font-size: 3rem; margin-top: 0; color: #ff4757; text-shadow: 0 0 10px rgba(255,71,87,0.5); }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .btn {
            margin: 10px; padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            transition: transform 0.1s, filter 0.2s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-play { background: linear-gradient(45deg, #2ed573, #7bed9f); box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4); }
        .btn-shop { background: linear-gradient(45deg, #3742fa, #5352ed); box-shadow: 0 5px 15px rgba(55, 66, 250, 0.4); }

        .shop-item {
            background: rgba(255,255,255,0.1); margin: 15px 0; padding: 15px;
            border-radius: 10px; display: flex; justify-content: space-between;
            align-items: center; width: 300px;
        }
        .buy-btn {
            background: #ffd700; color: #000; padding: 8px 15px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .buy-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        .equipped-btn { background: #2ed573; color: white; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="title-screen" class="screen">
            <h1>FLAPPY 3D</h1>
            <button id="start-btn" class="btn btn-play">Tap to Fly</button>
            <br>
            <button id="open-shop-btn" class="btn btn-shop">Shop</button>
        </div>

        <div id="hud-top">
            <div>Score: <span id="score-display">0</span></div>
            <div class="coin-text">🪙 <span id="coin-display">0</span></div>
        </div>

        <div id="game-over-screen" class="screen">
            <h2>CRASH!</h2>
            <p>Score: <span id="final-score">0</span></p>
            <p>High Score: <span id="high-score">0</span></p>
            <p class="coin-text">Coins: <span id="final-coins">0</span></p>
            <button id="restart-btn" class="btn btn-play">Play Again</button>
            <button id="go-shop-btn" class="btn btn-shop">Shop</button>
        </div>

        <div id="shop-screen" class="screen">
            <h2>GARAGE</h2>
            <p class="coin-text">Balance: 🪙 <span id="shop-coin-display">0</span></p>
            
            <div class="shop-item">
                <span>Classic Red</span>
                <button id="equip-red" class="equipped-btn">Equipped</button>
            </div>
            <div class="shop-item">
                <span>Neon Green (50 🪙)</span>
                <button id="buy-green" class="buy-btn">Buy</button>
            </div>
            <div class="shop-item">
                <span>Solid Gold (150 🪙)</span>
                <button id="buy-gold" class="buy-btn">Buy</button>
            </div>

            <button id="close-shop-btn" class="btn btn-play" style="margin-top: 20px;">Back</button>
        </div>
    </div>

    <script>
        // --- SAFE SAVE DATA INITIALIZATION ---
        let savedData;
        try {
            const rawData = localStorage.getItem('flappy3DSave');
            if (rawData) {
                savedData = JSON.parse(rawData);
                if (!savedData.inventory) throw new Error("Old save format");
            } else {
                throw new Error("No save found");
            }
        } catch (e) {
            savedData = { highScore: 0, coins: 0, inventory: ['red'], equippedPipe: 'red' };
        }

        // --- GAME VARIABLES ---
        let scene, camera, renderer, light;
        let pipes = [];
        let gridHelper;
        
        let gameState = 'start'; 
        let score = 0;

        let playerY = 5;
        let velocityY = 0;
        const GRAVITY = -0.012;
        const JUMP_STRENGTH = 0.25;
        const FORWARD_SPEED = 0.35;
        
        const PIPE_SPAWN_Z = -80;
        const PIPE_DESPAWN_Z = 10;
        const PIPE_SPAWN_RATE = 75;
        let frameCounter = 0;

        const pipeColors = {
            'red': { color: 0xff4757, emissive: 0x4a0005 },
            'green': { color: 0x2ed573, emissive: 0x003311 },
            'gold': { color: 0xffd700, emissive: 0x332200 }
        };

        const ui = {};

        // --- INITIALIZATION ---
        function init() {
            ui.title = document.getElementById('title-screen');
            ui.hud = document.getElementById('hud-top');
            ui.gameOver = document.getElementById('game-over-screen');
            ui.shop = document.getElementById('shop-screen');
            ui.score = document.getElementById('score-display');
            ui.coins = document.getElementById('coin-display');
            ui.finalScore = document.getElementById('final-score');
            ui.highScore = document.getElementById('high-score');
            ui.finalCoins = document.getElementById('final-coins');
            ui.shopCoins = document.getElementById('shop-coin-display');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e); 
            scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, playerY, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('game-container').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(20, 50, 20);
            light.castShadow = true;
            scene.add(light);

            const pointLight = new THREE.PointLight(0x5352ed, 2, 50);
            pointLight.position.set(0, 5, -10);
            scene.add(pointLight);

            gridHelper = new THREE.GridHelper(200, 50, 0x3742fa, 0x3742fa);
            gridHelper.material.opacity = 0.3;
            gridHelper.material.transparent = true;
            gridHelper.position.y = 0;
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize, false);
            
            // THE FIX: Listeners for jumping
            document.addEventListener('touchstart', handleGameInput, { passive: false });
            document.addEventListener('mousedown', handleGameInput);
            
            // Button Listeners
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', resetGame);
            document.getElementById('open-shop-btn').addEventListener('click', openShop);
            document.getElementById('go-shop-btn').addEventListener('click', openShop);
            document.getElementById('close-shop-btn').addEventListener('click', closeShop);
            
            setupShopButtons();
            updateShopUI();
            
            ui.coins.innerText = savedData.coins;
            animate();
        }

        function createPipeMesh(yPos, isTop, material) {
            const group = new THREE.Group();
            const pipeGeo = new THREE.CylinderGeometry(1.5, 1.5, 30, 32);
            const mainMesh = new THREE.Mesh(pipeGeo, material);
            mainMesh.castShadow = true;
            mainMesh.receiveShadow = true;
            
            const lipGeo = new THREE.CylinderGeometry(1.8, 1.8, 2, 32);
            const lipMesh = new THREE.Mesh(lipGeo, material);
            lipMesh.castShadow = true;
            lipMesh.receiveShadow = true;

            if (isTop) {
                mainMesh.position.y = 15 + 1; 
                lipMesh.position.y = 1;       
            } else {
                mainMesh.position.y = -15 - 1; 
                lipMesh.position.y = -1;       
            }

            group.add(mainMesh);
            group.add(lipMesh);
            group.position.set(0, yPos, PIPE_SPAWN_Z);
            return group;
        }

        function spawnPipe() {
            const gapSize = 5.5; 
            const gapPosition = Math.random() * 8 + 4; 

            const style = pipeColors[savedData.equippedPipe] || pipeColors['red'];
            const pipeMat = new THREE.MeshStandardMaterial({ 
                color: style.color, 
                emissive: style.emissive,
                roughness: 0.2, 
                metalness: 0.6 
            });

            const bottomPipe = createPipeMesh(gapPosition - gapSize/2, false, pipeMat);
            const topPipe = createPipeMesh(gapPosition + gapSize/2, true, pipeMat);

            scene.add(bottomPipe);
            scene.add(topPipe);

            const coinGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.2, 16);
            coinGeo.rotateX(Math.PI / 2);
            const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.1, emissive: 0x443300 });
            const coinMesh = new THREE.Mesh(coinGeo, coinMat);
            coinMesh.position.set(0, gapPosition, PIPE_SPAWN_Z);
            scene.add(coinMesh);

            pipes.push({
                bottom: bottomPipe,
                top: topPipe,
                coin: coinMesh,
                gapTop: gapPosition + gapSize/2,
                gapBottom: gapPosition - gapSize/2,
                coinCollected: false,
                passed: false
            });
        }

        // THE FIX: Improved input handling
        function handleGameInput(e) {
            // 1. If we clicked/tapped a button, let the button do its job. Ignore it here.
            if (e.target.tagName === 'BUTTON') return; 
            
            // 2. Prevent zooming/scrolling ONLY if we tapped the background game area
            if (e.type === 'touchstart') e.preventDefault(); 
            
            // 3. Only jump if we are actively playing
            if (gameState !== 'playing') return;
            
            jump();
        }

        function jump() { velocityY = JUMP_STRENGTH; }

        function startGame() {
            ui.title.style.display = 'none';
            ui.hud.style.display = 'flex';
            gameState = 'playing';
            jump();
        }

        function resetGame() {
            pipes.forEach(p => {
                scene.remove(p.bottom); scene.remove(p.top); scene.remove(p.coin);
            });
            pipes = [];
            playerY = 5; velocityY = 0; score = 0; frameCounter = 0;
            
            ui.score.innerText = score;
            ui.gameOver.style.display = 'none';
            ui.hud.style.display = 'flex';
            gameState = 'playing';
            jump();
        }

        function gameOver() {
            gameState = 'gameover';
            ui.hud.style.display = 'none';
            ui.gameOver.style.display = 'block';
            
            if (score > savedData.highScore) savedData.highScore = score;
            saveData();

            ui.finalScore.innerText = score;
            ui.highScore.innerText = savedData.highScore;
            ui.finalCoins.innerText = savedData.coins;
        }

        function saveData() {
            localStorage.setItem('flappy3DSave', JSON.stringify(savedData));
        }

        function openShop() {
            ui.title.style.display = 'none';
            ui.gameOver.style.display = 'none';
            ui.shop.style.display = 'block';
            updateShopUI();
        }

        function closeShop() {
            ui.shop.style.display = 'none';
            if (score === 0 && playerY === 5) {
                ui.title.style.display = 'block'; 
            } else {
                ui.gameOver.style.display = 'block'; 
            }
        }

        function setupShopButtons() {
            const items = [
                { id: 'red', btn: 'equip-red', cost: 0 },
                { id: 'green', btn: 'buy-green', cost: 50 },
                { id: 'gold', btn: 'buy-gold', cost: 150 }
            ];

            items.forEach(item => {
                document.getElementById(item.btn).addEventListener('click', () => {
                    if (savedData.inventory.includes(item.id)) {
                        savedData.equippedPipe = item.id;
                    } else if (savedData.coins >= item.cost) {
                        savedData.coins -= item.cost;
                        savedData.inventory.push(item.id);
                        savedData.equippedPipe = item.id;
                    }
                    saveData();
                    updateShopUI();
                });
            });
        }

        function updateShopUI() {
            ui.shopCoins.innerText = savedData.coins;
            ui.coins.innerText = savedData.coins;

            const items = [
                { id: 'red', btn: 'equip-red', cost: 0 },
                { id: 'green', btn: 'buy-green', cost: 50 },
                { id: 'gold', btn: 'buy-gold', cost: 150 }
            ];

            items.forEach(item => {
                const btn = document.getElementById(item.btn);
                if (savedData.equippedPipe === item.id) {
                    btn.className = 'equipped-btn';
                    btn.innerText = 'Equipped';
                    btn.disabled = false;
                } else if (savedData.inventory.includes(item.id)) {
                    btn.className = 'buy-btn';
                    btn.innerText = 'Equip';
                    btn.disabled = false;
                } else {
                    btn.className = 'buy-btn';
                    btn.innerText = `Buy (${item.cost})`;
                    btn.disabled = savedData.coins < item.cost;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'playing') {
                velocityY += GRAVITY;
                playerY += velocityY;
                camera.position.y = playerY;

                gridHelper.position.z += FORWARD_SPEED;
                if (gridHelper.position.z >= 10) gridHelper.position.z = 0;

                if (playerY <= 0.5) gameOver();
                if (playerY > 25) { playerY = 25; velocityY = 0; }

                frameCounter++;
                if (frameCounter >= PIPE_SPAWN_RATE) {
                    spawnPipe();
                    frameCounter = 0;
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    let p = pipes[i];
                    
                    p.bottom.position.z += FORWARD_SPEED;
                    p.top.position.z += FORWARD_SPEED;
                    if(p.coin) {
                        p.coin.position.z += FORWARD_SPEED;
                        p.coin.rotation.z += 0.05; 
                    }

                    const pipeZ = p.bottom.position.z;

                    if (pipeZ > -2 && pipeZ < 2) {
                        if (playerY < p.gapBottom || playerY > p.gapTop) gameOver();
                    }

                    if (!p.coinCollected && p.coin && pipeZ > -1 && pipeZ < 3) {
                        const distY = Math.abs(playerY - p.coin.position.y);
                        if (distY < 1.5) {
                            p.coinCollected = true;
                            scene.remove(p.coin);
                            savedData.coins += 1; 
                            ui.coins.innerText = savedData.coins;
                            saveData();
                        }
                    }

                    if (!p.passed && pipeZ > 1) {
                        score++;
                        ui.score.innerText = score;
                        p.passed = true;
                    }

                    if (pipeZ > PIPE_DESPAWN_Z) {
                        scene.remove(p.bottom); scene.remove(p.top); 
                        if (p.coin) scene.remove(p.coin);
                        pipes.splice(i, 1);
                    }
                }
            }

            if (gameState === 'start' || gameState === 'gameover') {
                camera.position.y = 5 + Math.sin(Date.now() * 0.002) * 0.5;
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Delay initialization to ensure Three.js has time to load if on a slow connection
        window.onload = init;
    </script>
</body>
</html>
