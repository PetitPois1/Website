<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #8b5cf6;
            --player: #06b6d4;
            --ai: #f43f5e;
            --text: #f8fafc;
        }

        * {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Game Container: Not completely full screen */
        .game-wrapper {
            width: 100%;
            max-width: 500px;
            background-color: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-container {
            display: flex;
            gap: 15px;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .score-box {
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 12px;
        }

        .controls-row {
            display: flex;
            gap: 10px;
        }

        select {
            background: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 600;
            outline: none;
        }

        canvas {
            background-color: #000;
            border-radius: 16px;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            flex-grow: 1;
        }

        .btn:active { transform: scale(0.96); }
        .btn-secondary { background-color: #475569; }

        .footer-controls {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <header>
        <div class="score-container">
            <div class="score-box" style="color: var(--player)" id="pScore">0</div>
            <div class="score-box" style="color: var(--ai)" id="aScore">0</div>
        </div>
        <select id="difficulty">
            <option value="easy">Casual</option>
            <option value="medium" selected>Pro</option>
            <option value="hard">Elite</option>
        </select>
    </header>

    <canvas id="pong"></canvas>

    <div class="footer-controls">
        <button id="startBtn" class="btn" onclick="toggleGame()">Start Game</button>
        <button class="btn btn-secondary" onclick="location.reload()">↺</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");
    
    // Config
    const P_HEIGHT = 70;
    const P_WIDTH = 10;
    const B_RADIUS = 6;
    
    let gameState = {
        active: false,
        pY: 0,
        aY: 0,
        ball: { x: 0, y: 0, vx: 0, vy: 0, s: 0 },
        scores: { p: 0, a: 0 }
    };

    const diffs = {
        easy:   { bSpd: 4, aSpd: 3 },
        medium: { bSpd: 6, aSpd: 5 },
        hard:   { bSpd: 9, aSpd: 8 }
    };

    function init() {
        resize();
        resetPositions();
        
        canvas.addEventListener("touchstart", (e) => handleInput(e.touches[0].clientY), {passive: false});
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            handleInput(e.touches[0].clientY);
        }, {passive: false});
        canvas.addEventListener("mousemove", (e) => handleInput(e.clientY));

        requestAnimationFrame(loop);
    }

    function resize() {
        // Set internal resolution based on CSS width
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = 350; // Fixed aspect ratio for consistency
    }

    function handleInput(clientY) {
        const rect = canvas.getBoundingClientRect();
        const root = window.pageYOffset || document.documentElement.scrollTop;
        const y = clientY - rect.top;
        gameState.pY = Math.max(0, Math.min(canvas.height - P_HEIGHT, y - P_HEIGHT / 2));
    }

    function resetPositions() {
        gameState.pY = canvas.height/2 - P_HEIGHT/2;
        gameState.aY = canvas.height/2 - P_HEIGHT/2;
        spawnBall();
    }

    function spawnBall() {
        const d = diffs[document.getElementById("difficulty").value];
        gameState.ball.x = canvas.width/2;
        gameState.ball.y = canvas.height/2;
        gameState.ball.s = d.bSpd;
        
        let angle = (Math.random() - 0.5) * Math.PI/4;
        let side = Math.random() > 0.5 ? 1 : -1;
        gameState.ball.vx = side * gameState.ball.s * Math.cos(angle);
        gameState.ball.vy = gameState.ball.s * Math.sin(angle);
    }

    function update() {
        if (!gameState.active) return;
        const b = gameState.ball;
        const d = diffs[document.getElementById("difficulty").value];

        b.x += b.vx;
        b.y += b.vy;

        // Bounce Walls
        if (b.y < 0 || b.y > canvas.height) b.vy *= -1;

        // AI
        const aMid = gameState.aY + P_HEIGHT/2;
        if (b.vx > 0) {
            if (aMid < b.y - 10) gameState.aY += d.aSpd;
            else if (aMid > b.y + 10) gameState.aY -= d.aSpd;
        }
        gameState.aY = Math.max(0, Math.min(canvas.height - P_HEIGHT, gameState.aY));

        // Bounce Paddles (No teleporting)
        // Player Side
        if (b.vx < 0 && b.x <= P_WIDTH + B_RADIUS) {
            if (b.y > gameState.pY && b.y < gameState.pY + P_HEIGHT) {
                handleBounce(gameState.pY);
                b.x = P_WIDTH + B_RADIUS; // Snap to edge
            }
        }
        // AI Side
        if (b.vx > 0 && b.x >= canvas.width - P_WIDTH - B_RADIUS) {
            if (b.y > gameState.aY && b.y < gameState.aY + P_HEIGHT) {
                handleBounce(gameState.aY);
                b.x = canvas.width - P_WIDTH - B_RADIUS; // Snap to edge
            }
        }

        // Scoring
        if (b.x < 0) { gameState.scores.a++; spawnBall(); }
        else if (b.x > canvas.width) { gameState.scores.p++; spawnBall(); }

        document.getElementById("pScore").innerText = gameState.scores.p;
        document.getElementById("aScore").innerText = gameState.scores.a;
    }

    function handleBounce(paddleY) {
        const b = gameState.ball;
        const impact = (b.y - (paddleY + P_HEIGHT/2)) / (P_HEIGHT/2);
        const angle = impact * (Math.PI/3);
        
        b.s += 0.3; // Speed up
        const dir = b.vx > 0 ? -1 : 1;
        b.vx = dir * b.s * Math.cos(angle);
        b.vy = b.s * Math.sin(angle);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Center Net
        ctx.strokeStyle = "#1e293b";
        ctx.setLineDash([5, 8]);
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, 0);
        ctx.lineTo(canvas.width/2, canvas.height);
        ctx.stroke();

        // Player
        ctx.fillStyle = "#06b6d4";
        ctx.roundRect(0, gameState.pY, P_WIDTH, P_HEIGHT, 5);
        ctx.fill();

        // AI
        ctx.fillStyle = "#f43f5e";
        ctx.roundRect(canvas.width - P_WIDTH, gameState.aY, P_WIDTH, P_HEIGHT, 5);
        ctx.fill();

        // Ball
        ctx.setLineDash([]);
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(gameState.ball.x, gameState.ball.y, B_RADIUS, 0, Math.PI*2);
        ctx.fill();
    }

    // Helper for rounded rects
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function toggleGame() {
        gameState.active = !gameState.active;
        document.getElementById("startBtn").innerText = gameState.active ? "Pause" : "Resume";
    }

    init();
</script>
</body>
</html>
