<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Pro Pong</title>
    <style>
        :root {
            --primary: #6200ea;
            --accent: #03dac6;
            --bg: #121212;
        }
        * {
            /* Prevent accidental text selection and "pull-to-refresh" on mobile */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg);
            color: white;
            font-family: sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 15px;
            background-color: #1f1f1f;
            box-sizing: border-box;
            z-index: 10;
        }
        .score-board {
            font-size: 1.1rem;
            font-weight: bold;
        }
        select, button {
            padding: 6px 12px;
            font-size: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
        }
        canvas {
            background-color: #000;
            border-top: 2px solid #333;
            border-bottom: 2px solid #333;
            display: block;
        }
        .ui-overlay {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 10px;
        }
        #startButton {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<header>
    <div class="score-board">
        <span id="playerScore" style="color: var(--accent)">0</span> 
        : 
        <span id="aiScore" style="color: #ff4081">0</span>
    </div>
    <div style="display: flex; gap: 8px;">
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Med</option>
            <option value="hard">Hard</option>
        </select>
        <button onclick="location.reload()">Reset</button>
    </div>
</header>

<canvas id="pong"></canvas>

<div class="ui-overlay">
    <button id="startButton" onclick="toggleGame()">Start Game</button>
</div>

<script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");
    const startButton = document.getElementById("startButton");

    // Constants adjusted for mobile scale
    const PADDLE_WIDTH = 10;
    const PADDLE_HEIGHT = 80;
    const BALL_SIZE = 7;
    const MAX_BOUNCE_ANGLE = Math.PI / 3;

    let gameState = {
        running: false,
        playerY: 0,
        aiY: 0,
        ball: { x: 0, y: 0, dx: 0, dy: 0, speed: 0 },
        scores: { player: 0, ai: 0 }
    };

    const difficultySettings = {
        easy:   { ballSpeed: 5, aiSpeed: 3.5 },
        medium: { ballSpeed: 7, aiSpeed: 5.5 },
        hard:   { ballSpeed: 10, aiSpeed: 8.5 }
    };

    function init() {
        window.addEventListener('resize', resize);
        resize();
        resetPositions();
        
        // Touch events
        canvas.addEventListener("touchstart", handleTouch, {passive: false});
        canvas.addEventListener("touchmove", handleTouch, {passive: false});
        // Mouse fallback
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            updatePlayerPos(e.clientY - rect.top);
        });

        requestAnimationFrame(gameLoop);
    }

    function resize() {
        // Take up most of the screen height minus header/button space
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.7; 
        resetPositions();
    }

    function handleTouch(e) {
        e.preventDefault(); // Stop scrolling/bouncing
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        updatePlayerPos(touch.clientY - rect.top);
    }

    function updatePlayerPos(y) {
        gameState.playerY = y - PADDLE_HEIGHT / 2;
        // Keep in bounds
        if (gameState.playerY < 0) gameState.playerY = 0;
        if (gameState.playerY > canvas.height - PADDLE_HEIGHT) gameState.playerY = canvas.height - PADDLE_HEIGHT;
    }

    function resetPositions() {
        gameState.playerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
        gameState.aiY = canvas.height / 2 - PADDLE_HEIGHT / 2;
        resetBall();
    }

    function resetBall() {
        const diff = difficultySettings[document.getElementById("difficulty").value];
        gameState.ball.x = canvas.width / 2;
        gameState.ball.y = canvas.height / 2;
        gameState.ball.speed = diff.ballSpeed;
        
        let angle = (Math.random() * 0.4 - 0.2);
        let direction = Math.random() > 0.5 ? 1 : -1;
        gameState.ball.dx = direction * gameState.ball.speed * Math.cos(angle);
        gameState.ball.dy = gameState.ball.speed * Math.sin(angle);
    }

    function update() {
        if (!gameState.running) return;

        const ball = gameState.ball;
        const diff = difficultySettings[document.getElementById("difficulty").value];

        ball.x += ball.dx;
        ball.y += ball.dy;

        // Top/Bottom wall bounce
        if (ball.y - BALL_SIZE < 0 || ball.y + BALL_SIZE > canvas.height) {
            ball.dy *= -1;
            ball.y = ball.y < 0 ? BALL_SIZE : canvas.height - BALL_SIZE;
        }

        // AI Logic
        const aiCenter = gameState.aiY + PADDLE_HEIGHT / 2;
        if (ball.dx > 0) {
            if (aiCenter < ball.y - 15) gameState.aiY += diff.aiSpeed;
            else if (aiCenter > ball.y + 15) gameState.aiY -= diff.aiSpeed;
        }
        gameState.aiY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, gameState.aiY));

        // Paddle Collision detection
        let paddle = (ball.dx < 0) ? 
            { x: 0, y: gameState.playerY } : 
            { x: canvas.width - PADDLE_WIDTH, y: gameState.aiY };

        if (ball.x - BALL_SIZE < paddle.x + PADDLE_WIDTH && 
            ball.x + BALL_SIZE > paddle.x && 
            ball.y > paddle.y && 
            ball.y < paddle.y + PADDLE_HEIGHT) {
            
            let intersectY = (paddle.y + (PADDLE_HEIGHT / 2)) - ball.y;
            let normalizedIntersectY = (intersectY / (PADDLE_HEIGHT / 2));
            let bounceAngle = normalizedIntersectY * MAX_BOUNCE_ANGLE;

            let dir = ball.dx < 0 ? 1 : -1;
            ball.speed += 0.25; 
            ball.dx = dir * ball.speed * Math.cos(bounceAngle);
            ball.dy = ball.speed * -Math.sin(bounceAngle);
            
            // Push ball out of paddle to prevent double collision
            ball.x = (dir === 1) ? PADDLE_WIDTH + BALL_SIZE : canvas.width - PADDLE_WIDTH - BALL_SIZE;
        }

        // Scoring
        if (ball.x < 0) {
            gameState.scores.ai++;
            resetBall();
        } else if (ball.x > canvas.width) {
            gameState.scores.player++;
            resetBall();
        }

        document.getElementById("playerScore").innerText = gameState.scores.player;
        document.getElementById("aiScore").innerText = gameState.scores.ai;
    }

    function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Center line
        ctx.strokeStyle = "#222";
        ctx.setLineDash([5, 10]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();

        // Paddles
        ctx.fillStyle = "#6200ea";
        ctx.fillRect(0, gameState.playerY, PADDLE_WIDTH, PADDLE_HEIGHT);
        ctx.fillStyle = "#ff4081";
        ctx.fillRect(canvas.width - PADDLE_WIDTH, gameState.aiY, PADDLE_WIDTH, PADDLE_HEIGHT);

        // Ball
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(gameState.ball.x, gameState.ball.y, BALL_SIZE, 0, Math.PI * 2);
        ctx.fill();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function toggleGame() {
        gameState.running = !gameState.running;
        startButton.innerText = gameState.running ? "Pause" : "Resume";
    }

    init();
</script>
</body>
</html>
